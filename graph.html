<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>대한민국 AI 생태계 조감도</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090f;
  --mono: 'DM Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
body { font-family:'Noto Sans KR',sans-serif; color:#e2e8f0; }

/* ── Canvas bg grid ── */
#bg-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

/* ── SVG main ── */
#graph-svg { position:fixed; inset:0; z-index:1; }

/* ── Top bar ── */
.top-bar {
  position:fixed; top:0; left:0; right:0; z-index:30;
  display:flex; align-items:center; gap:14px;
  padding:14px 24px;
  background:linear-gradient(180deg,rgba(7,9,15,.95) 70%,transparent);
  pointer-events:none;
}
.top-bar > * { pointer-events:auto; }
.logo {
  display:flex; flex-direction:column; gap:2px; margin-right:8px;
}
.logo-title {
  font-size:15px; font-weight:900; letter-spacing:-.4px; color:#f1f5f9;
}
.logo-sub {
  font-family:var(--mono); font-size:9px; color:rgba(255,255,255,.3); letter-spacing:2px; text-transform:uppercase;
}
.search-box {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:10px; padding:8px 12px; width:200px;
}
.search-box input {
  background:transparent; border:0; outline:0; color:#e2e8f0;
  font-family:'Noto Sans KR',sans-serif; font-size:12px; width:100%;
}
.search-box input::placeholder { color:rgba(255,255,255,.25); }
.search-icon { color:rgba(255,255,255,.3); flex-shrink:0; }

/* filter pills */
.filter-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.f-pill {
  font-family:var(--mono); font-size:10px; padding:5px 10px; border-radius:999px;
  border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.45); cursor:pointer; transition:.15s; white-space:nowrap;
}
.f-pill:hover { border-color:rgba(255,255,255,.3); color:#fff; }
.f-pill.active { background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.4); color:#fff; }
.f-pill[data-layer="service"].active  { background:rgba(245,158,11,.15); border-color:#f59e0b; color:#fbbf24; }
.f-pill[data-layer="model"].active    { background:rgba(139,92,246,.15); border-color:#8b5cf6; color:#a78bfa; }
.f-pill[data-layer="data"].active     { background:rgba(6,182,212,.15);  border-color:#06b6d4; color:#22d3ee; }
.f-pill[data-layer="cloud"].active    { background:rgba(16,185,129,.15); border-color:#10b981; color:#34d399; }
.f-pill[data-layer="chip"].active     { background:rgba(239,68,68,.15);  border-color:#ef4444; color:#f87171; }

/* ── Controls (right side) ── */
.ctrl-panel {
  position:fixed; top:50%; right:20px; transform:translateY(-50%);
  z-index:30; display:flex; flex-direction:column; gap:8px;
}
.ctrl-btn {
  width:36px; height:36px; border-radius:10px;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.5); cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center; transition:.15s;
}
.ctrl-btn:hover { background:rgba(255,255,255,.13); color:#fff; }

/* ── Legend ── */
.legend {
  position:fixed; bottom:24px; left:24px; z-index:30;
  display:flex; flex-direction:column; gap:6px;
}
.legend-item {
  display:flex; align-items:center; gap:8px;
  font-size:11px; color:rgba(255,255,255,.5);
}
.legend-swatch { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.legend-div { width:32px; height:1px; margin:4px 0; background:rgba(255,255,255,.08); }

/* ── Detail panel ── */
.detail-panel {
  position:fixed; bottom:24px; right:24px; z-index:30;
  width:280px; background:rgba(12,16,28,.92); backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1); border-radius:18px;
  padding:20px; transition:opacity .25s,transform .25s;
  opacity:0; transform:translateY(12px); pointer-events:none;
}
.detail-panel.visible { opacity:1; transform:translateY(0); pointer-events:auto; }
.detail-layer {
  font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase;
  margin-bottom:6px; opacity:.6;
}
.detail-name { font-size:22px; font-weight:800; letter-spacing:-.5px; margin-bottom:4px; line-height:1.1; }
.detail-focus {
  font-family:var(--mono); font-size:10px; padding:3px 8px; border-radius:6px;
  display:inline-block; margin-bottom:10px;
  background:rgba(255,255,255,.07); color:rgba(255,255,255,.5);
}
.detail-summary { font-size:12px; line-height:1.65; color:rgba(255,255,255,.6); margin-bottom:12px; }
.detail-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px; }
.detail-tag {
  font-size:10px; padding:4px 8px; border-radius:999px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.5);
}
.detail-related-title { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,.25); margin-bottom:8px; }
.related-list { display:flex; flex-direction:column; gap:4px; max-height:120px; overflow-y:auto; }
.related-list::-webkit-scrollbar { width:3px; }
.related-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
.related-item {
  display:flex; align-items:center; gap:8px;
  font-size:11px; color:rgba(255,255,255,.5); padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.related-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.related-name { flex:1; font-weight:600; color:rgba(255,255,255,.75); }
.related-layer { font-size:9px; font-family:var(--mono); }
.close-btn {
  position:absolute; top:14px; right:14px;
  width:24px; height:24px; border-radius:6px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.3); cursor:pointer; font-size:12px;
  display:flex; align-items:center; justify-content:center;
}
.close-btn:hover { background:rgba(255,255,255,.12); color:#fff; }

/* ── Stats bar ── */
.stats-bar {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:30; display:flex; gap:0;
  background:rgba(12,16,28,.88); backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.08); border-radius:14px; overflow:hidden;
}
.stat-item {
  padding:10px 20px; display:flex; flex-direction:column; gap:2px;
  border-right:1px solid rgba(255,255,255,.06);
}
.stat-item:last-child { border-right:0; }
.stat-val { font-size:18px; font-weight:800; color:#f1f5f9; line-height:1; }
.stat-lbl { font-family:var(--mono); font-size:9px; color:rgba(255,255,255,.3); letter-spacing:1px; text-transform:uppercase; }

/* Node tooltip */
.node-tooltip {
  position:fixed; pointer-events:none; z-index:50;
  background:rgba(12,16,28,.95); border:1px solid rgba(255,255,255,.12);
  border-radius:10px; padding:8px 12px; font-size:12px;
  opacity:0; transition:opacity .1s; max-width:180px;
}
.node-tooltip.visible { opacity:1; }
.node-tooltip-name { font-weight:700; color:#f1f5f9; margin-bottom:2px; }
.node-tooltip-sub  { color:rgba(255,255,255,.4); font-size:10px; font-family:var(--mono); }
</style>
</head>

function drawBgGrid() {
  const cvs = document.getElementById('bg-canvas');
  cvs.width = window.innerWidth; cvs.height = window.innerHeight;
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  ctx.strokeStyle = 'rgba(255,255,255,0.028)';
  ctx.lineWidth = 1;
  const gs = 48;
  for (let x = 0; x < cvs.width; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cvs.height); ctx.stroke(); }
  for (let y = 0; y < cvs.height; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cvs.width,y); ctx.stroke(); }
}
drawBgGrid();
window.addEventListener('resize', drawBgGrid);

  .attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0)
  .attr('filter', d => `url(#glow-${d.layer})`);

// Main circle
nodeGSel.append('circle')
  .attr('class','node-circle')
  .attr('r', d => d.r)
  .attr('fill', d => d.accent)
  .attr('fill-opacity', d => d.type === 'enterprise' ? 0.9 : 0.65)
  .attr('stroke', d => d.accent)
  .attr('stroke-width', d => d.type === 'enterprise' ? 2 : 1)
  .attr('stroke-opacity', 0.9);

// Labels (only for enterprise or large nodes)
nodeGSel.append('text')
  .attr('class','node-label')
  .attr('text-anchor','middle')
  .attr('dy', d => d.r + 11)
  .attr('fill','rgba(255,255,255,0.7)')
  .attr('font-size', d => d.type === 'enterprise' ? '10px' : '8.5px')
  .attr('font-family','Noto Sans KR,sans-serif')
  .attr('font-weight', d => d.type === 'enterprise' ? '700' : '400')
  .attr('pointer-events','none')
  .text(d => d.id.length > 8 ? d.id.slice(0,7)+'…' : d.id);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  SIMULATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(140).strength(0.06))
  .force('charge', d3.forceManyBody().strength(-420))
  .force('collision', d3.forceCollide().radius(d => d.r + 18).strength(0.95))
  .force('cluster', () => {
    nodes.forEach(n => {
      const l = layerMap[n.layer];
      const tx = l.cx_pct * W, ty = l.cy_pct * H;
      const alpha = 0.032;
      n.vx += (tx - n.x) * alpha;
      n.vy += (ty - n.y) * alpha;
    });
  })
  .alphaDecay(0.010)
  .velocityDecay(0.42);

sim.on('tick', () => {
  linkSel
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeGSel.attr('transform', d => `translate(${d.x},${d.y})`);
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  INTERACTIONS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const tooltip = document.getElementById('node-tooltip');
const ttName  = document.getElementById('tt-name');
const ttSub   = document.getElementById('tt-sub');

function relatedIds(name) {
  const base = nodes.find(n => n.id === name); if (!base) return new Set();
  const baseSet = new Set(base.tags);
  return new Set(
    nodes.filter(n => n.id !== name && n.tags.some(t => baseSet.has(t))).map(n => n.id)
  );
}

function applyVisual() {
  const q = ST.query.toLowerCase();
  const rel = ST.selected ? relatedIds(ST.selected) : null;

  nodeGSel.each(function(d) {
    const el = d3.select(this);
    const isSelected = ST.selected === d.id;
    const isRelated  = rel && rel.has(d.id);
    const layerMatch = !ST.layerFilter || d.layer === ST.layerFilter;
    const queryMatch = !q || d.id.toLowerCase().includes(q) || (d.focus||'').toLowerCase().includes(q) || d.tags.some(t => t.toLowerCase().includes(q));
    const active = layerMatch && queryMatch;
    let opacity = 1;
    if (ST.selected) { opacity = isSelected ? 1 : isRelated ? 0.85 : 0.15; }
    else if (!active) { opacity = 0.12; }
    el.attr('opacity', opacity);
    el.select('.node-ring').attr('stroke-opacity', isSelected ? 0.9 : isRelated ? 0.5 : 0);
    el.select('.node-circle')
      .attr('fill-opacity', isSelected ? 1 : d.type === 'enterprise' ? 0.9 : 0.65)
      .attr('stroke-width', isSelected ? 3 : d.type === 'enterprise' ? 2 : 1);
  });

  linkSel.attr('stroke-opacity', d => {
    if (!ST.selected) return 0.18;
    const connected = d.source.id === ST.selected || d.target.id === ST.selected;
    return connected ? 0.75 : 0.04;
  }).attr('stroke-width', d => {
    if (!ST.selected) return 1;
    return (d.source.id === ST.selected || d.target.id === ST.selected) ? 2 : 1;
  });

  // Zone highlights
  LAYER_DEFS.forEach(l => {
    const active = !ST.layerFilter || ST.layerFilter === l.id;
    d3.select(`.zone-${l.id}`).attr('fill-opacity', active ? 0.06 : 0.02).attr('stroke-opacity', active ? 0.22 : 0.07);
    d3.select(`.zone-label-${l.id}`).attr('opacity', active ? 0.85 : 0.25);
  });
}

// Node click
nodeGSel.on('click', (ev, d) => {
  ev.stopPropagation();
  ST.selected = ST.selected === d.id ? null : d.id;
  applyVisual();
  updateDetail();
});

// Hover tooltip
nodeGSel
  .on('mouseover', (ev, d) => {
    ttName.textContent = d.id;
    ttSub.textContent  = `${d.layerName} · ${d.focus}`;
    tooltip.classList.add('visible');
  })
  .on('mousemove', ev => {
    tooltip.style.left = (ev.clientX + 16) + 'px';
    tooltip.style.top  = (ev.clientY - 10) + 'px';
  })
  .on('mouseleave', () => tooltip.classList.remove('visible'));

// SVG bg click = deselect
svg.on('click', () => {
  ST.selected = null;
  applyVisual();
  updateDetail();
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  DETAIL PANEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function updateDetail() {
  const panel = document.getElementById('detail-panel');
  if (!ST.selected) { panel.classList.remove('visible'); return; }
  const d = nodes.find(n => n.id === ST.selected); if (!d) return;

  // Related by tag similarity
  const baseSet = new Set(d.tags);
  const related = nodes
    .filter(n => n.id !== d.id && n.tags.some(t => baseSet.has(t)))
    .map(n => {
      const shared = n.tags.filter(t => baseSet.has(t));
      return { ...n, shared, score: shared.length * 10 + (n.layer === d.layer ? 3 : 0) };
    })
    .sort((a,b) => b.score - a.score)
    .slice(0, 8);

  document.getElementById('d-layer').textContent = d.layerName;
  document.getElementById('d-layer').style.color = d.accent;
  document.getElementById('d-name').textContent   = d.id;
  document.getElementById('d-focus').textContent  = d.focus || '';
  document.getElementById('d-summary').textContent = d.summary || '';
  document.getElementById('d-tags').innerHTML = (d.tags||[]).map(t =>
    `<span class="detail-tag">${t}</span>`).join('');
  document.getElementById('d-related').innerHTML = related.map(r =>
    `<div class="related-item">
      <div class="related-dot" style="background:${r.accent}"></div>
      <div class="related-name">${r.id}</div>
      <div class="related-layer" style="color:${r.accent}">${r.layerName}</div>
    </div>`).join('') || '<div style="font-size:11px;color:rgba(255,255,255,.2)">관련 플레이어 없음</div>';

  panel.classList.add('visible');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  UI COMPONENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Filter pills
const filterRow = document.getElementById('filter-row');
filterRow.innerHTML = `<button class="f-pill active" data-layer="">전체</button>` +
  LAYER_DEFS.map(l => `<button class="f-pill" data-layer="${l.id}">${l.name}</button>`).join('');
filterRow.querySelectorAll('.f-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    filterRow.querySelectorAll('.f-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ST.layerFilter = btn.dataset.layer || null;
    applyVisual();
  });
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  ST.query = e.target.value;
  applyVisual();
});

// Close detail
document.getElementById('close-detail').addEventListener('click', ev => {
  ev.stopPropagation();
  ST.selected = null;
  applyVisual();
  updateDetail();
});

// Zoom buttons
const fitZoom = () => {
  svg.transition().duration(700).call(
    zoom.transform,
    d3.zoomIdentity.translate(W/2, H/2).scale(0.88).translate(-W/2, -H/2)
  );
};
document.getElementById('btn-zi').addEventListener('click',  () => svg.transition().duration(300).call(zoom.scaleBy, 1.3));
document.getElementById('btn-zo').addEventListener('click',  () => svg.transition().duration(300).call(zoom.scaleBy, 0.77));
document.getElementById('btn-fit').addEventListener('click', fitZoom);

// ━━━ Legend ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('legend').innerHTML = `
  <div class="legend-item"><div class="legend-swatch" style="background:#fff;opacity:.9;width:14px;height:14px;border-radius:3px"></div>대기업·통신</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#fff;opacity:.5"></div>스타트업</div>
  <div class="legend-div"></div>
  ${Object.entries(REL_COL).map(([t,c]) => `<div class="legend-item"><div style="width:20px;height:2px;background:${c};border-radius:1px;${t==='invest'?'border-top:2px dashed '+c+';background:none':''}"></div>${{group:'그룹 계열사',tech:'기술협력',supply:'공급망',invest:'투자/파트너십'}[t]}</div>`).join('')}
`;

// ━━━ Stats bar ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const layerCounts = {};
LAYER_DEFS.forEach(l => { layerCounts[l.id] = nodes.filter(n => n.layer === l.id).length; });
document.getElementById('stats-bar').innerHTML = [
  { val: nodes.length, lbl:'총 기업' },
  ...LAYER_DEFS.map(l => ({ val: layerCounts[l.id], lbl: l.name, col: l.accent })),
].map(s => `<div class="stat-item"><div class="stat-val" ${s.col?`style="color:${s.col}"`:''}>${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');

// Initial zoom identity
setTimeout(() => {
  svg.call(zoom.transform, d3.zoomIdentity.translate(W * 0.01, H * 0.06).scale(0.78));
}, 100);

// Resize handler
window.addEventListener('resize', () => {
  const nW = window.innerWidth, nH = window.innerHeight;
  svg.attr('width', nW).attr('height', nH);
  drawBgGrid();
});
</script>
</body>
</html>
