<html lang="ko">
<head>
<meta charset="UTF-8"/>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; }
body {
  background:#1b1d23;
  font-family:'Noto Sans KR',sans-serif;
  color:#d4d8e2;
}

/* ── SVG canvas ── */
#graph-svg { position:fixed; inset:0; z-index:1; cursor:grab; }
#graph-svg:active { cursor:grabbing; }

/* ── Top bar ── */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:40;
  height:46px; display:flex; align-items:center; gap:10px;
  padding:0 14px;
  background:rgba(20,22,30,0.97);
  border-bottom:1px solid rgba(255,255,255,.07);
  pointer-events:none;
}
.topbar > * { pointer-events:auto; }
.title-block { display:flex; flex-direction:column; gap:1px; margin-right:8px; }
.title-main { font-size:13px; font-weight:800; letter-spacing:-.3px; color:#e8ecf4; }
.title-sub  { font-family:'JetBrains Mono',monospace; font-size:8.5px; color:rgba(255,255,255,.3); letter-spacing:1.5px; text-transform:uppercase; }

.search-wrap {
  display:flex; align-items:center; gap:6px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:6px; padding:5px 10px; width:200px;
}
.search-wrap:focus-within { border-color:#4f8ef7; }
.search-wrap input { background:transparent; border:0; outline:0; color:#e8ecf4; font-size:11px; font-family:'Noto Sans KR',sans-serif; width:100%; }
.search-wrap input::placeholder { color:rgba(255,255,255,.25); }

.layer-pills { display:flex; gap:4px; }
.lpill {
  font-family:'JetBrains Mono',monospace; font-size:9.5px; padding:4px 9px;
  border-radius:4px; border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05); color:rgba(255,255,255,.45);
  cursor:pointer; transition:all .14s; white-space:nowrap;
}
.lpill:hover { color:#e8ecf4; border-color:rgba(255,255,255,.22); }
.lpill.on { color:#e8ecf4; border-color:currentColor; }
.lpill[data-l="service"].on { background:rgba(245,158,11,.14); border-color:#f59e0b; color:#fbbf24; }
.lpill[data-l="model"].on   { background:rgba(139,92,246,.14); border-color:#8b5cf6; color:#a78bfa; }
.lpill[data-l="data"].on    { background:rgba(6,182,212,.14);  border-color:#06b6d4; color:#22d3ee; }
.lpill[data-l="cloud"].on   { background:rgba(16,185,129,.14); border-color:#10b981; color:#34d399; }
.lpill[data-l="chip"].on    { background:rgba(239,68,68,.14);  border-color:#ef4444; color:#f87171; }

.metric-select {
  font-family:'JetBrains Mono',monospace; font-size:9.5px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
  border-radius:5px; color:#c0c6d4; padding:4px 8px; cursor:pointer;
  outline:none;
}
.metric-select option { background:#1b1d23; }

.topbar-sep { width:1px; height:22px; background:rgba(255,255,255,.1); flex-shrink:0; }

/* ── Right stats panel (Gephi-style) ── */
.stats-panel {
  position:fixed; top:46px; right:0; bottom:0; width:240px; z-index:30;
  background:rgba(16,18,26,0.97); border-left:1px solid rgba(255,255,255,.07);
  display:flex; flex-direction:column; overflow:hidden;
}
.sp-section {
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:10px 12px;
}
.sp-title {
  font-family:'JetBrains Mono',monospace; font-size:8.5px;
  letter-spacing:1.6px; text-transform:uppercase;
  color:rgba(255,255,255,.3); margin-bottom:8px;
}
.sp-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.sp-label { font-size:10.5px; color:rgba(255,255,255,.52); }
.sp-val {
  font-family:'JetBrains Mono',monospace; font-size:10.5px;
  color:#7dd3fc; font-weight:500;
}
.sp-val.green { color:#4ade80; }
.sp-val.amber { color:#fbbf24; }
.sp-val.red   { color:#f87171; }

/* bar chart in panel */
.sp-bar-wrap { margin-top:6px; }
.sp-bar-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.sp-bar-label { font-size:9.5px; color:rgba(255,255,255,.45); width:68px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; }
.sp-bar-track { flex:1; height:5px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
.sp-bar-fill  { height:100%; border-radius:3px; transition:width .4s ease; }
.sp-bar-num   { font-family:'JetBrains Mono',monospace; font-size:8.5px; color:rgba(255,255,255,.35); width:22px; text-align:right; flex-shrink:0; }

/* degree distribution mini-chart */
.dist-canvas { width:100%; height:52px; margin-top:6px; }

/* node detail card */
.node-card {
  flex:1; overflow-y:auto; padding:10px 12px;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.1) transparent;
}
.node-card::-webkit-scrollbar { width:3px; }
.node-card::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
.nc-empty { font-size:11px; color:rgba(255,255,255,.2); margin-top:8px; text-align:center; padding-top:12px; }
.nc-layer { font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
.nc-name  { font-size:16px; font-weight:800; letter-spacing:-.3px; margin-bottom:3px; line-height:1.2; }
.nc-sub   { font-size:10.5px; color:rgba(255,255,255,.42); margin-bottom:10px; }
.nc-metrics { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
.nc-metric { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.07); border-radius:6px; padding:7px 8px; }
.nc-metric-val { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:#e8ecf4; }
.nc-metric-lbl { font-family:'JetBrains Mono',monospace; font-size:8px; color:rgba(255,255,255,.3); letter-spacing:1px; text-transform:uppercase; margin-top:1px; }
.nc-summary { font-size:11px; line-height:1.7; color:rgba(255,255,255,.5); margin-bottom:10px; }
.nc-tags { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:10px; }
.nc-tag { font-size:9.5px; padding:2px 7px; border-radius:3px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.45); }
.nc-conn-title { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:1.4px; text-transform:uppercase; color:rgba(255,255,255,.28); margin-bottom:5px; }
.nc-conn-list { display:flex; flex-direction:column; gap:2px; }
.nc-conn-item { display:flex; align-items:center; gap:6px; padding:4px 5px; border-radius:4px; cursor:pointer; transition:.12s; }
.nc-conn-item:hover { background:rgba(255,255,255,.06); }
.nc-conn-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.nc-conn-name { flex:1; font-size:10.5px; font-weight:600; color:rgba(255,255,255,.6); }
.nc-conn-type { font-family:'JetBrains Mono',monospace; font-size:8px; color:rgba(255,255,255,.3); }

/* ── Zoom ctrl ── */
.zoom-ctrl {
  position:fixed; bottom:24px; right:256px; z-index:35;
  display:flex; flex-direction:column; gap:4px;
}
.z-btn {
  width:30px; height:30px; border-radius:5px;
  background:rgba(20,22,30,.96); border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.5); cursor:pointer; font-size:15px;
  display:flex; align-items:center; justify-content:center; transition:.14s;
}
.z-btn:hover { background:rgba(255,255,255,.1); color:#e8ecf4; }

/* ── Bottom status bar (Gephi-like) ── */
.statusbar {
  position:fixed; bottom:0; left:0; right:240px; z-index:35; height:26px;
  background:rgba(14,16,22,.98); border-top:1px solid rgba(255,255,255,.06);
  display:flex; align-items:center; gap:0; overflow:hidden;
}
.sb-item {
  display:flex; align-items:center; gap:5px;
  padding:0 12px; border-right:1px solid rgba(255,255,255,.06);
  height:100%;
}
.sb-label { font-family:'JetBrains Mono',monospace; font-size:9px; color:rgba(255,255,255,.28); text-transform:uppercase; letter-spacing:.8px; }
.sb-val   { font-family:'JetBrains Mono',monospace; font-size:9.5px; color:#7dd3fc; font-weight:500; }

/* ── Tooltip ── */
.g-tooltip {
  position:fixed; z-index:50; pointer-events:none;
  background:rgba(14,16,22,.97); border:1px solid rgba(255,255,255,.14);
  border-radius:6px; padding:8px 11px; max-width:180px;
  opacity:0; transition:opacity .1s;
}
.g-tooltip.show { opacity:1; }
.g-tt-name { font-size:12px; font-weight:700; color:#e8ecf4; margin-bottom:2px; }
.g-tt-meta { font-family:'JetBrains Mono',monospace; font-size:9px; color:rgba(255,255,255,.45); line-height:1.55; }

/* node labels on SVG */
.n-label {
  font-family:'Noto Sans KR',sans-serif;
  pointer-events:none;
  paint-order:stroke;
  stroke:#1b1d23;
  stroke-linejoin:round;
}
</style>
</head>

// adjacency
const adj = new Map();
function addAdj(a,b,t){ if(!adj.has(a))adj.set(a,[]); const arr=adj.get(a); let e=arr.find(x=>x.id===b); if(!e){e={id:b,types:[]};arr.push(e);} if(!e.types.includes(t))e.types.push(t); }

/* ── Betweenness centrality (BFS approx) ── */
function computeBetweenness(nodes, edges) {
  const ids = nodes.map(n=>n.id);
  const idx = Object.fromEntries(ids.map((id,i)=>[id,i]));
  const N = ids.length;
  const graph = Array.from({length:N},()=>[]);
  edges.forEach(([a,b])=>{ if(idx[a]!==undefined&&idx[b]!==undefined){ graph[idx[a]].push(idx[b]); graph[idx[b]].push(idx[a]); } });
  const bc = new Float64Array(N);
  for(let s=0;s<N;s++){
    const stack=[], pred=Array.from({length:N},()=>[]);
    const sigma=new Float64Array(N); sigma[s]=1;
    const dist=new Int32Array(N).fill(-1); dist[s]=0;
    const queue=[s];
    let qi=0;
    while(qi<queue.length){
      const v=queue[qi++]; stack.push(v);
      for(const w of graph[v]){
        if(dist[w]<0){dist[w]=dist[v]+1;queue.push(w);}
        if(dist[w]===dist[v]+1){sigma[w]+=sigma[v];pred[w].push(v);}
      }
    }
    const delta=new Float64Array(N);
    while(stack.length){
      const w=stack.pop();
      for(const v of pred[w]) delta[v]+=sigma[v]/sigma[w]*(1+delta[w]);
      if(w!==s) bc[w]+=delta[w];
    }
  }
  const maxBC=Math.max(...bc)||1;
  const result=new Map();
  ids.forEach((id,i)=>result.set(id,bc[i]/maxBC));
  return result;
}

/* ── PageRank ── */
function computePageRank(nodes, edges, d=0.85, iter=50){
  const ids=nodes.map(n=>n.id);
  const idx=Object.fromEntries(ids.map((id,i)=>[id,i]));
  const N=ids.length;
  const out=new Float64Array(N);
  const graph=Array.from({length:N},()=>[]);
  edges.forEach(([a,b])=>{ if(idx[a]!==undefined&&idx[b]!==undefined){ graph[idx[a]].push(idx[b]); graph[idx[b]].push(idx[a]); out[idx[a]]++; out[idx[b]]++; } });
  let pr=new Float64Array(N).fill(1/N);
  for(let it=0;it<iter;it++){
    const next=new Float64Array(N).fill((1-d)/N);
    for(let v=0;v<N;v++) for(const w of graph[v]) next[w]+=d*pr[v]/(out[v]||1);
    pr=next;
  }
  const maxPR=Math.max(...pr)||1;
  const result=new Map();
  ids.forEach((id,i)=>result.set(id,pr[i]/maxPR));
  return result;
}

const bcMap = computeBetweenness(RAW_NODES, RAW_EDGES);
const prMap = computePageRank(RAW_NODES, RAW_EDGES);

/* ── Node radius by metric ── */
const SIZE_W = {large:1.6, mid:1.15, startup:0.8};
function nodeRadius(d, metric){
  const baseSize = SIZE_W[d.size] || 1;
  if(metric==='degree'){
    const deg = degMap.get(d.id)||0;
    return 5 + Math.sqrt(deg)*4.8*baseSize;
  }
  if(metric==='betweenness'){
    const bc = bcMap.get(d.id)||0;
    return 5 + bc*38*baseSize;
  }
  if(metric==='pagerank'){
    const pr = prMap.get(d.id)||0;
    return 5 + pr*36*baseSize;
  }
  return 8;
}

// connected components (union-find)
function countComponents(){
  const parent=new Map(RAW_NODES.map(n=>[n.id,n.id]));
  function find(x){return parent.get(x)===x?x:(parent.set(x,find(parent.get(x))),parent.get(x));}
  function union(a,b){parent.set(find(a),find(b));}
  RAW_EDGES.forEach(([a,b])=>union(a,b));
  return new Set(RAW_NODES.map(n=>find(n.id))).size;
}
const numComp = countComponents();

// modularity (approx using layer as community)
function approxModularity(){
  let Q=0; const m=E;
  RAW_NODES.forEach(u=>{
    RAW_NODES.forEach(v=>{
      if(u.layer===v.layer){
        const ku=degMap.get(u.id)||0, kv=degMap.get(v.id)||0;
        const Auv=RAW_EDGES.some(([a,b])=>(a===u.id&&b===v.id)||(a===v.id&&b===u.id))?1:0;
        Q+=Auv-(ku*kv)/(2*m);
      }
    });
  });
  return Math.max(0,Q/(2*m)).toFixed(3);
}
const modIndex = approxModularity();

function buildSim(){

    .force('link', d3.forceLink(links).id(d=>d.id)
      .distance(d=>{
        const rs=d.source.r+d.target.r;
        const base = d.type==='group'?rs+4:d.type==='supply'?rs+28:d.type==='invest'?rs+40:rs+18;
        return base;
      })
      .strength(d=>d.type==='group'?1.2:d.type==='supply'?0.7:d.type==='tech'?0.5:0.4)
    )
    .force('charge', d3.forceManyBody()
      .strength(d=>-(d.r*d.r*1.1+60))
      .distanceMax(350)
    )
    .force('collision', d3.forceCollide().radius(d=>d.r+3).strength(0.95).iterations(3))
    .force('center', d3.forceCenter(W/2, H/2).strength(0.05))
    .force('clusterX', d3.forceX(d=>W*LPOS[d.layer].cx).strength(0.09))
    .force('clusterY', d3.forceY(d=>H*LPOS[d.layer].cy).strength(0.09))
    .alphaDecay(0.018).alphaMin(0.01).velocityDecay(0.45);
}
let sim = buildSim();

sim.on('tick',()=>{
  linkSel
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeWrap.attr('transform',d=>`translate(${d.x},${d.y})`);
  labelSel.attr('transform',d=>`translate(${d.x},${d.y})`);
});

/* ═══════════════════════════════════════════
   FIT ZOOM
═══════════════════════════════════════════ */
function fitZoom(dur=700){
  requestAnimationFrame(()=>{
    const b=zoomG.node().getBBox();
    if(!b.width||!b.height)return;
    const pad=48;
    const sc=Math.min((W-pad*2)/b.width,(H-pad*2)/b.height,2.2);
    const tx=W/2-sc*(b.x+b.width/2);
    const ty=H/2-sc*(b.y+b.height/2);
    svg.transition().duration(dur).call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(sc));
  });
}
setTimeout(()=>fitZoom(800),1000);
setTimeout(()=>fitZoom(600),2800);
sim.on('end',()=>fitZoom(500));

/* ═══════════════════════════════════════════
   VISUAL STATE
═══════════════════════════════════════════ */
function getAdj(id){
  const arr=adj.get(id)||[];
  const set=new Set(arr.map(x=>x.id));
  const meta=new Map(arr.map(x=>[x.id,x]));
  return{set,meta};
}

function applyVisual(){
  const q=searchQ.trim().toLowerCase();
  const selAdj=selectedId?getAdj(selectedId):{set:new Set(),meta:new Map()};

  nodeWrap.each(function(d){
    const el=d3.select(this);
    const isSel=selectedId===d.id;
    const isAdj=selAdj.set.has(d.id);
    const layerOk=!filterLayer||d.layer===filterLayer;
    const qOk=!q||d.id.toLowerCase().includes(q)||(d.focus||'').toLowerCase().includes(q)||(d.tags||[]).some(t=>t.toLowerCase().includes(q));
    const active=layerOk&&qOk;

    let op=1;
    if(selectedId)      op=isSel?1:isAdj?0.95:0.05;
    else if(!active)    op=0.06;

    el.attr('opacity',op);
    el.select('.n-outer').attr('fill-opacity',isSel?0.22:isAdj?0.14:0);
    el.select('.n-main')
      .attr('stroke-opacity',isSel?1:isAdj?0.95:active?0.85:0.5)
      .attr('stroke-width', isSel?2.8:isAdj?2.2:1.5);
    el.select('.n-core').attr('fill-opacity',isSel?0.95:isAdj?0.82:0.65);
  });

  labelSel.each(function(d){
    const el=d3.select(this);
    const isSel=selectedId===d.id;
    const isAdj=selAdj.set.has(d.id);
    const layerOk=!filterLayer||d.layer===filterLayer;
    const deg=degMap.get(d.id)||0;
    const qOk=!q||d.id.toLowerCase().includes(q);
    let op=1;
    if(selectedId)    op=isSel?1:isAdj?0.9:0.04;
    else if(!layerOk) op=0.04;
    else              op=d.size==='large'?1:deg>=4?0.9:deg>=2?0.75:0.55;
    el.attr('opacity',op)
      .attr('font-weight',isSel||isAdj?(d.size==='large'?'800':'700'):d.size==='large'?'700':d.size==='mid'?'600':'500')
      .attr('font-size',isSel?'12px':isAdj?'11px':d.size==='large'?'11px':deg>=4?'10px':deg>=2?'9.5px':'8.5px');
  });

  linkSel
    .attr('stroke-opacity',d=>{
      if(!selectedId)return d.type==='group'?0.38:0.22;
      const c=d.source.id===selectedId||d.target.id===selectedId;
      return c?0.95:0.03;
    })
    .attr('stroke-width',d=>{
      if(!selectedId)return d.type==='group'?2:1;
      const c=d.source.id===selectedId||d.target.id===selectedId;
      return c?(d.type==='group'?3:2):1;
    });

  updateStatusBar();
}

/* ═══════════════════════════════════════════
   STATS PANEL POPULATION
═══════════════════════════════════════════ */
function populateStats(){
  document.getElementById('sp-nodes').textContent=N;
  document.getElementById('sp-edges').textContent=E;
  document.getElementById('sp-avgdeg').textContent=avgDeg;
  document.getElementById('sp-density').textContent=density;
  document.getElementById('sp-comp').textContent=numComp;
  document.getElementById('sp-mod').textContent=modIndex;

  // top hubs by degree
  const sorted=[...nodes].sort((a,b)=>(degMap.get(b.id)||0)-(degMap.get(a.id)||0)).slice(0,8);
  const maxDeg=degMap.get(sorted[0].id)||1;
  document.getElementById('sp-hubs').innerHTML=sorted.map(n=>{
    const deg=degMap.get(n.id)||0;
    const pct=(deg/maxDeg*100).toFixed(0);
    return `<div class="sp-bar-row">
      <div class="sp-bar-label" title="${n.id}">${n.id}</div>
      <div class="sp-bar-track"><div class="sp-bar-fill" style="width:${pct}%;background:${n.color}"></div></div>
      <div class="sp-bar-num">${deg}</div>
    </div>`;
  }).join('');

  // layer distribution
  const lc={};
  RAW_NODES.forEach(d=>lc[d.layer]=(lc[d.layer]||0)+1);
  const maxLC=Math.max(...Object.values(lc));
  document.getElementById('sp-layers').innerHTML=Object.entries(LAYERS).map(([id,l])=>{
    const cnt=lc[id]||0;
    const pct=(cnt/maxLC*100).toFixed(0);
    return `<div class="sp-bar-row">
      <div class="sp-bar-label" style="color:${l.color}">${l.name}</div>
      <div class="sp-bar-track"><div class="sp-bar-fill" style="width:${pct}%;background:${l.color}"></div></div>
      <div class="sp-bar-num">${cnt}</div>
    </div>`;
  }).join('');

  // degree distribution mini chart
  drawDegDist();
}

function drawDegDist(){
  const canvas=document.getElementById('dist-canvas');
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const cw=canvas.offsetWidth||216;
  const ch=52;
  canvas.width=cw*dpr; canvas.height=ch*dpr;
  canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,cw,ch);

  const degs=[...degMap.values()];
  const maxD=Math.max(...degs);
  const bins=new Array(maxD+1).fill(0);
  degs.forEach(d=>bins[d]++);
  const maxBin=Math.max(...bins);
  const bw=cw/(bins.length||1);

  bins.forEach((cnt,i)=>{
    const bh=(cnt/maxBin)*(ch-8);
    ctx.fillStyle='rgba(99,179,237,0.6)';
    ctx.fillRect(i*bw+1, ch-bh-4, Math.max(1,bw-2), bh);
  });

  // axis
  ctx.strokeStyle='rgba(255,255,255,.12)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,ch-4); ctx.lineTo(cw,ch-4); ctx.stroke();

  ctx.fillStyle='rgba(255,255,255,.28)';
  ctx.font=`${8/dpr*dpr}px JetBrains Mono`;
  ctx.fillText('0',2,ch-1);
  ctx.fillText(`${maxD}`,cw-14,ch-1);
}

/* ═══════════════════════════════════════════
   NODE DETAIL CARD
═══════════════════════════════════════════ */
function showNodeCard(id){
  const d=nodes.find(n=>n.id===id);
  if(!d){ document.getElementById('node-card').innerHTML='<div class="nc-empty">노드를 클릭하면<br>상세 분석 정보를 볼 수 있습니다</div>'; return; }
  const deg=degMap.get(d.id)||0;
  const bc=(bcMap.get(d.id)*100||0).toFixed(1);
  const pr=(prMap.get(d.id)*100||0).toFixed(1);
  const connArr=adj.get(d.id)||[];

  const html=`
    <div class="nc-layer" style="color:${d.color}">${d.layerName}</div>
    <div class="nc-name">${d.id}</div>
    <div class="nc-sub">${d.focus||''} · ${({large:'대기업',mid:'중견·스케일업',startup:'스타트업'})[d.size]}</div>
    <div class="nc-metrics">
      <div class="nc-metric"><div class="nc-metric-val" style="color:${d.color}">${deg}</div><div class="nc-metric-lbl">Degree</div></div>
      <div class="nc-metric"><div class="nc-metric-val" style="color:#7dd3fc">${bc}%</div><div class="nc-metric-lbl">Betweenness</div></div>
      <div class="nc-metric"><div class="nc-metric-val" style="color:#4ade80">${pr}%</div><div class="nc-metric-lbl">PageRank</div></div>
      <div class="nc-metric"><div class="nc-metric-val" style="color:#fbbf24">${connArr.length}</div><div class="nc-metric-lbl">연결</div></div>
    </div>
    <div class="nc-summary">${d.summary||''}</div>
    <div class="nc-tags">${(d.tags||[]).map(t=>`<span class="nc-tag">${t}</span>`).join('')}</div>
    ${connArr.length?`
    <div class="nc-conn-title">직접 연결 노드 (${connArr.length})</div>
    <div class="nc-conn-list">
      ${connArr.map(c=>{
        const cn=nodes.find(n=>n.id===c.id);
        const cc=cn?cn.color:'#888';
        const rl=(c.types||[]).map(t=>REL_LABEL[t]||t).join('·');
        return `<div class="nc-conn-item" data-id="${c.id}">
          <div class="nc-conn-dot" style="background:${cc}"></div>
          <div class="nc-conn-name">${c.id}</div>
          <div class="nc-conn-type" style="color:${REL_COL[c.types[0]]||cc}">${rl}</div>
        </div>`;
      }).join('')}
    </div>`:''}
  `;
  document.getElementById('node-card').innerHTML=html;
  document.querySelectorAll('.nc-conn-item[data-id]').forEach(el=>{
    el.addEventListener('click',()=>{selectedId=el.dataset.id;applyVisual();showNodeCard(selectedId);});
  });
}

/* ═══════════════════════════════════════════
   STATUS BAR
═══════════════════════════════════════════ */
function updateStatusBar(){
  const visNodes=filterLayer?nodes.filter(n=>n.layer===filterLayer).length:N;
  const selD=selectedId?nodes.find(n=>n.id===selectedId):null;
  let html=`
    <div class="sb-item"><span class="sb-label">Nodes</span><span class="sb-val">${visNodes}</span></div>
    <div class="sb-item"><span class="sb-label">Edges</span><span class="sb-val">${E}</span></div>
    <div class="sb-item"><span class="sb-label">Avg Degree</span><span class="sb-val">${avgDeg}</span></div>
    <div class="sb-item"><span class="sb-label">Density</span><span class="sb-val">${density}</span></div>
    <div class="sb-item"><span class="sb-label">Metric</span><span class="sb-val">${currentMetric}</span></div>
  `;
  if(selD) html+=`<div class="sb-item"><span class="sb-label">Selected</span><span class="sb-val" style="color:${selD.color}">${selD.id}</span></div>`;
  document.getElementById('statusbar').innerHTML=html;
}

/* ═══════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════ */
const tooltip=document.getElementById('g-tooltip');
nodeWrap
  .on('click',(ev,d)=>{
    ev.stopPropagation();
    selectedId=selectedId===d.id?null:d.id;
    applyVisual();
    showNodeCard(selectedId);
  })
  .on('mouseover',(ev,d)=>{
    const deg=degMap.get(d.id)||0;
    document.getElementById('tt-name').textContent=d.id;
    document.getElementById('tt-meta').innerHTML=`${d.layerName} · ${d.focus}<br>Degree: ${deg} · BC: ${(bcMap.get(d.id)*100||0).toFixed(1)}% · PR: ${(prMap.get(d.id)*100||0).toFixed(1)}%`;
    document.getElementById('tt-name').style.color=d.color;
    tooltip.classList.add('show');
  })
  .on('mousemove',ev=>{
    let x=ev.clientX+14, y=ev.clientY-10;
    if(x+185>window.innerWidth-240) x=ev.clientX-200;
    if(y+60>window.innerHeight) y=window.innerHeight-70;
    tooltip.style.left=x+'px'; tooltip.style.top=y+'px';
  })
  .on('mouseleave',()=>tooltip.classList.remove('show'));

svg.on('click',()=>{selectedId=null;applyVisual();showNodeCard(null);});

/* ═══════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════ */
// layer filter
document.querySelectorAll('.lpill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.lpill').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    filterLayer=btn.dataset.l||null;
    applyVisual();
  });
});

// metric selector → rebuild radii + restart sim
document.getElementById('metric-select').addEventListener('change',e=>{
  currentMetric=e.target.value;
  nodes.forEach(d=>{ d.r=nodeRadius(d,currentMetric); });
  // update circles
  nodeWrap.select('.n-outer').attr('r',d=>d.r+6);
  nodeWrap.select('.n-main').attr('r',d=>d.r);
  nodeWrap.select('.n-core').attr('r',d=>Math.max(2,d.r*0.55));
  labelSel.attr('dy',d=>d.r+12);
  sim.force('collision',d3.forceCollide().radius(d=>d.r+3).strength(0.95).iterations(3));
  sim.alpha(0.4).restart();
  updateStatusBar();
});

// search
document.getElementById('search-input').addEventListener('input',e=>{
  searchQ=e.target.value; applyVisual();
});

// zoom buttons
document.getElementById('btn-zi').addEventListener('click',()=>svg.transition().duration(220).call(zoom.scaleBy,1.35));
document.getElementById('btn-zo').addEventListener('click',()=>svg.transition().duration(220).call(zoom.scaleBy,0.74));
document.getElementById('btn-fit').addEventListener('click',()=>fitZoom(500));

// keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){selectedId=null;applyVisual();showNodeCard(null);}
  if(e.key==='0'&&document.activeElement.tagName!=='INPUT') fitZoom(500);
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('search-input').focus();}
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
populateStats();
applyVisual();
showNodeCard(null);
</script>
