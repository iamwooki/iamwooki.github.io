<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>대한민국 AI 생태계 조감도 · 확장판</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
 :root {
  --bg: #07090f;
  --panel: rgba(12,16,28,.92);
  --mono: 'DM Mono', monospace;
  --text-main: #e2e8f0;
  --text-soft: rgba(255,255,255,.56);
  --text-muted: rgba(255,255,255,.45);
  --text-faint: rgba(255,255,255,.3);
  --panel-border: rgba(255,255,255,.1);
  --surface-1: rgba(255,255,255,.06);
  --surface-2: rgba(255,255,255,.04);
  --surface-3: rgba(255,255,255,.07);
  --topbar-grad: linear-gradient(180deg,rgba(7,9,15,.97) 72%,transparent);
  --shadow-stroke: rgba(7,9,15,0.95);
  --grid-color: rgba(255,255,255,0.028);
}
html[data-theme="light"] {
  --bg: #f8fafc;
  --panel: rgba(255,255,255,.92);
  --text-main: #0f172a;
  --text-soft: rgba(15,23,42,.72);
  --text-muted: rgba(15,23,42,.58);
  --text-faint: rgba(15,23,42,.42);
  --panel-border: rgba(15,23,42,.14);
  --surface-1: rgba(255,255,255,.92);
  --surface-2: rgba(15,23,42,.04);
  --surface-3: rgba(15,23,42,.06);
  --topbar-grad: linear-gradient(180deg,rgba(248,250,252,.98) 72%,rgba(248,250,252,0));
  --shadow-stroke: rgba(255,255,255,0.98);
  --grid-color: rgba(15,23,42,0.055);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
body { font-family:'Noto Sans KR',sans-serif; color:#e2e8f0; }

#bg-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }
#graph-svg { position:fixed; inset:0; z-index:1; }

.top-bar {
  position:fixed; top:0; left:0; right:0; z-index:30;
  display:flex; align-items:flex-start; gap:14px;
  padding:14px 24px 18px;
  background:linear-gradient(180deg,rgba(7,9,15,.97) 72%,transparent);
  pointer-events:none;
}
.top-bar > * { pointer-events:auto; }
.logo {
  display:flex; flex-direction:column; gap:3px; margin-right:6px; min-width:180px;
}
.logo-title { font-size:16px; font-weight:900; letter-spacing:-.4px; color:#f8fafc; }
.logo-sub { font-family:var(--mono); font-size:9px; color:rgba(255,255,255,.34); letter-spacing:2px; text-transform:uppercase; }
.logo-note { font-size:11px; color:rgba(255,255,255,.45); line-height:1.4; margin-top:2px; max-width:200px; }

.bar-main { display:flex; flex-direction:column; gap:8px; flex:1; }
.search-box {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:10px; padding:8px 12px; width:230px;
}
.search-box input {
  background:transparent; border:0; outline:0; color:#e2e8f0;
  font-family:'Noto Sans KR',sans-serif; font-size:12px; width:100%;
}
.search-box input::placeholder { color:rgba(255,255,255,.26); }
.search-icon { color:rgba(255,255,255,.3); flex-shrink:0; }

.filter-wrap { display:flex; flex-direction:column; gap:6px; }
.filter-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.row-label {
  font-family:var(--mono); font-size:9px; color:rgba(255,255,255,.24);
  letter-spacing:1.4px; text-transform:uppercase; margin-right:4px;
}
.f-pill {
  font-family:var(--mono); font-size:10px; padding:5px 10px; border-radius:999px;
  border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.45); cursor:pointer; transition:.15s; white-space:nowrap;
}
.f-pill:hover { border-color:rgba(255,255,255,.28); color:#fff; }
.f-pill.active { background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.4); color:#fff; }
.f-pill[data-layer="service"].active  { background:rgba(245,158,11,.15); border-color:#f59e0b; color:#fbbf24; }
.f-pill[data-layer="model"].active    { background:rgba(139,92,246,.15); border-color:#8b5cf6; color:#a78bfa; }
.f-pill[data-layer="data"].active     { background:rgba(6,182,212,.15);  border-color:#06b6d4; color:#22d3ee; }
.f-pill[data-layer="cloud"].active    { background:rgba(16,185,129,.15); border-color:#10b981; color:#34d399; }
.f-pill[data-layer="chip"].active     { background:rgba(239,68,68,.15);  border-color:#ef4444; color:#f87171; }

.ctrl-panel {
  position:fixed; top:50%; right:20px; transform:translateY(-50%);
  z-index:30; display:flex; flex-direction:column; gap:8px;
}
.ctrl-btn {
  width:36px; height:36px; border-radius:10px;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.5); cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center; transition:.15s;
}
.ctrl-btn:hover { background:rgba(255,255,255,.13); color:#fff; }

.legend {
  position:fixed; bottom:24px; left:24px; z-index:30;
  display:flex; flex-direction:column; gap:6px;
  padding:14px 16px;
  background:rgba(12,16,28,.75); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.08); border-radius:14px;
  max-width:270px;
}
.legend-item {
  display:flex; align-items:center; gap:8px;
  font-size:11px; color:rgba(255,255,255,.56);
}
.legend-swatch { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.legend-div { width:100%; height:1px; margin:4px 0; background:rgba(255,255,255,.08); }

.detail-panel {
  position:fixed; bottom:24px; right:24px; z-index:30;
  width:320px; background:var(--panel); backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1); border-radius:18px;
  padding:20px; transition:opacity .25s,transform .25s;
  opacity:0; transform:translateY(12px); pointer-events:none;
}
.detail-panel.visible { opacity:1; transform:translateY(0); pointer-events:auto; }
.detail-layer {
  font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase;
  margin-bottom:6px; opacity:.72;
}
.detail-name { font-size:23px; font-weight:800; letter-spacing:-.5px; margin-bottom:4px; line-height:1.1; }
.detail-subcat { font-size:12px; color:rgba(255,255,255,.5); margin-bottom:10px; }
.detail-meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.detail-focus, .detail-size {
  font-family:var(--mono); font-size:10px; padding:4px 9px; border-radius:7px;
  display:inline-block; background:rgba(255,255,255,.07); color:rgba(255,255,255,.65);
  border:1px solid rgba(255,255,255,.08);
}
.detail-summary { font-size:12px; line-height:1.68; color:rgba(255,255,255,.62); margin-bottom:12px; }
.detail-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px; }
.detail-tag {
  font-size:10px; padding:4px 8px; border-radius:999px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.54);
}
.detail-related-title {
  font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
  color:rgba(255,255,255,.25); margin-bottom:8px;
}
.related-list { display:flex; flex-direction:column; gap:4px; max-height:140px; overflow-y:auto; }
.related-list::-webkit-scrollbar { width:4px; }
.related-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
.related-item {
  display:flex; align-items:center; gap:8px;
  font-size:11px; color:rgba(255,255,255,.5); padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.related-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.related-name { flex:1; font-weight:600; color:rgba(255,255,255,.78); }
.related-layer { font-size:9px; font-family:var(--mono); }
.close-btn {
  position:absolute; top:14px; right:14px; width:24px; height:24px; border-radius:6px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.3); cursor:pointer; font-size:12px;
  display:flex; align-items:center; justify-content:center;
}
.close-btn:hover { background:rgba(255,255,255,.12); color:#fff; }

.stats-bar {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:30; display:flex; gap:0;
  background:rgba(12,16,28,.88); backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.08); border-radius:14px; overflow:hidden;
}
.stat-item {
  padding:10px 18px; display:flex; flex-direction:column; gap:2px;
  border-right:1px solid rgba(255,255,255,.06);
}
.stat-item:last-child { border-right:0; }
.stat-val { font-size:18px; font-weight:800; color:#f1f5f9; line-height:1; }
.stat-lbl { font-family:var(--mono); font-size:9px; color:rgba(255,255,255,.3); letter-spacing:1px; text-transform:uppercase; }

.node-tooltip {
  position:fixed; pointer-events:none; z-index:50;
  background:rgba(12,16,28,.96); border:1px solid rgba(255,255,255,.12);
  border-radius:10px; padding:8px 12px; font-size:12px;
  opacity:0; transition:opacity .1s; max-width:220px;
}
.node-tooltip.visible { opacity:1; }
.node-tooltip-name { font-weight:700; color:#f1f5f9; margin-bottom:2px; }
.node-tooltip-sub  { color:rgba(255,255,255,.45); font-size:10px; font-family:var(--mono); line-height:1.5; }

.subpill text {
  font-size:10px; font-family:var(--mono); fill:rgba(255,255,255,.62); pointer-events:none;
}
.subpill rect {
  fill-opacity:.08; stroke-width:1; rx:9; ry:9;
}
.zone-label {
  font-family:'Noto Sans KR',sans-serif; font-weight:800; letter-spacing:-.2px;
}
.zone-count {
  font-family:var(--mono);
}


body { color: var(--text-main); }
.top-bar { background: var(--topbar-grad) !important; }
.logo-title { color: var(--text-main) !important; }
.logo-sub, .logo-note, .row-label, .stat-lbl, .detail-related-title { color: var(--text-faint) !important; }
.search-box, .ctrl-btn, .legend, .detail-panel, .stats-bar, .node-tooltip {
  background: var(--panel) !important;
  border-color: var(--panel-border) !important;
}
.search-box { background: var(--surface-1) !important; }
.search-box input { color: var(--text-main) !important; }
.search-box input::placeholder, .search-icon { color: var(--text-faint) !important; }
.f-pill {
  background: var(--surface-2) !important;
  border-color: var(--panel-border) !important;
  color: var(--text-muted) !important;
}
.f-pill:hover { color: var(--text-main) !important; }
.f-pill.active { color: var(--text-main) !important; }
.theme-pill.active[data-theme-mode="light"] {
  background: rgba(59,130,246,.12) !important;
  border-color: rgba(59,130,246,.45) !important;
  color: #2563eb !important;
}
.theme-pill.active[data-theme-mode="dark"] {
  background: rgba(148,163,184,.18) !important;
  border-color: rgba(148,163,184,.45) !important;
  color: #e2e8f0 !important;
}
html[data-theme="light"] .ctrl-btn,
html[data-theme="light"] .close-btn {
  color: rgba(15,23,42,.6) !important;
  background: rgba(255,255,255,.9) !important;
}
html[data-theme="light"] .ctrl-btn:hover,
html[data-theme="light"] .close-btn:hover {
  color: #0f172a !important;
  background: rgba(255,255,255,1) !important;
}
html[data-theme="light"] .legend-item,
html[data-theme="light"] .detail-summary,
html[data-theme="light"] .detail-subcat,
html[data-theme="light"] .related-item,
html[data-theme="light"] .node-tooltip-sub,
html[data-theme="light"] .stat-lbl {
  color: rgba(15,23,42,.64) !important;
}
html[data-theme="light"] .detail-name,
html[data-theme="light"] .node-tooltip-name,
html[data-theme="light"] .related-name,
html[data-theme="light"] .stat-val {
  color: #0f172a !important;
}
html[data-theme="light"] .detail-focus,
html[data-theme="light"] .detail-size,
html[data-theme="light"] .detail-tag {
  background: rgba(15,23,42,.04) !important;
  border-color: rgba(15,23,42,.1) !important;
  color: rgba(15,23,42,.7) !important;
}
html[data-theme="light"] .legend-div,
html[data-theme="light"] .related-item,
html[data-theme="light"] .stat-item {
  border-color: rgba(15,23,42,.08) !important;
  background-image: none !important;
}
html[data-theme="light"] .subpill text { fill: rgba(15,23,42,.72); }
html[data-theme="light"] .subpill rect { fill-opacity: .075; stroke-opacity: .25; }

</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<svg id="graph-svg"></svg>

<div class="top-bar">
  <div class="logo">
    <div class="logo-title">대한민국 AI 생태계</div>
    <div class="logo-sub">Ecosystem Overview · Expanded Map</div>
    <div class="logo-note">beta version</div>
  </div>
  <div class="bar-main">
    <div class="search-box">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" type="text" placeholder="기업명·세부구분·태그 검색…" autocomplete="off"/>

    <div class="filter-wrap">
      <div class="filter-row" id="filter-row"></div>
      <div class="filter-row" id="theme-row">
        <span class="row-label">테마</span>
        <button class="f-pill theme-pill" data-theme-mode="light">라이트</button>
        <button class="f-pill theme-pill" data-theme-mode="dark">다크</button>
      </div>
    </div>
  </div>
</div>

<div class="ctrl-panel">
  <button class="ctrl-btn" id="btn-zi" title="확대">+</button>
  <button class="ctrl-btn" id="btn-zo" title="축소">−</button>
  <button class="ctrl-btn" id="btn-fit" title="전체보기" style="font-size:12px">⊞</button>
</div>

<div class="legend" id="legend"></div>
<div class="stats-bar" id="stats-bar"></div>

<div class="detail-panel" id="detail-panel">

  <div class="detail-layer" id="d-layer"></div>

  <div class="detail-tags" id="d-tags"></div>
  <div class="detail-related-title">유사 플레이어</div>
  <div class="related-list" id="d-related"></div>
</div>

<div class="node-tooltip" id="node-tooltip">
  <div class="node-tooltip-name" id="tt-name"></div>
  <div class="node-tooltip-sub"  id="tt-sub"></div>
</div>

  .map(([a,b,type]) => ({ source:a, target:b, type }));

const defs = svg.append('defs');

LAYER_DEFS.forEach(l => {
  const f = defs.append('filter').attr('id', `glow-${l.id}`).attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');
  f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','5').attr('result','blur');
  const m = f.append('feMerge');
  m.append('feMergeNode').attr('in','blur');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

nodes.forEach(n => {
  defs.append('clipPath').attr('id', `clip-${n.id.replace(/[^a-zA-Z0-9가-힣]/g,'_')}`)
    .append('circle').attr('r', Math.max(6, n.r - 6)).attr('cx', 0).attr('cy', 0);
});

const zoomG = svg.append('g').attr('id','zoom-g');
const zoom = d3.zoom().scaleExtent([0.35, 4.5]).on('zoom', ev => {
  ST.zoomK = ev.transform.k;
  zoomG.attr('transform', ev.transform);
  updateLabelVisibility();
});
svg.call(zoom);

const zoneG = zoomG.append('g').attr('id','zones');

LAYER_DEFS.forEach(l => {
  const cx = l.cx_pct * W, cy = l.cy_pct * H, R = layerRadius[l.id];
  zoneG.append('circle').attr('cx',cx).attr('cy',cy)
    .attr('r', R * 1.22)
    .attr('fill', 'none')
    .attr('stroke', l.accent)
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.08)
    .attr('stroke-dasharray', '4 6');

  zoneG.append('circle').attr('cx',cx).attr('cy',cy)
    .attr('r', R)
    .attr('fill', l.accent)
    .attr('fill-opacity', 0.042)
    .attr('stroke', l.accent)
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.18)
    .attr('class', `zone zone-${l.id}`);

  zoneG.append('text')
    .attr('x', cx).attr('y', cy - R - 18)
    .attr('text-anchor','middle')
    .attr('fill', l.accent)
    .attr('font-size','14px')
    .attr('opacity',0.88)
    .attr('class',`zone-label zone-label-${l.id}`)
    .text(l.name);

  zoneG.append('text')
    .attr('x', cx).attr('y', cy - R + 2)
    .attr('text-anchor','middle')
    .attr('fill', l.accent)
    .attr('font-size','10px')
    .attr('opacity',0.48)
    .attr('class',`zone-count zone-count-${l.id}`)
    .text(`${layerCounts.get(l.id) || 0}개`);

  (SUBCAT_DEFS[l.id] || []).forEach(s => {
    const sx = cx + s.dx * R;
    const sy = cy + s.dy * R;
    const count = subCounts.get(`${l.id}:${s.id}`) || 0;
    const g = zoneG.append('g').attr('class', `subpill subpill-${l.id}`).attr('transform', `translate(${sx},${sy})`);
    const txt = g.append('text')
      .attr('text-anchor','middle')
      .attr('dominant-baseline','central')
      .text(`${s.name} · ${count}`);
    const bb = txt.node().getBBox();
    g.insert('rect', 'text')
      .attr('x', bb.x - 8).attr('y', bb.y - 4)
      .attr('width', bb.width + 16).attr('height', bb.height + 8)
      .attr('fill', l.accent).attr('stroke', l.accent).attr('stroke-opacity', 0.22);
  });
});

const linkG = zoomG.append('g').attr('id','links');
const linkSel = linkG.selectAll('line').data(links).join('line')
  .attr('stroke', d => REL_COL[d.type] || '#fff')
  .attr('stroke-width', 1)
  .attr('stroke-opacity', 0.16)
  .attr('stroke-dasharray', d => d.type === 'invest' ? '4,3' : null);

const nodeG = zoomG.append('g').attr('id','node-g');
const nodeGSel = nodeG.selectAll('g.node-wrap').data(nodes, d => d.id)
  .join('g').attr('class','node-wrap')
  .style('cursor','pointer')
  .call(
    d3.drag()
      .on('start', (ev, d) => { if (!ev.active) sim.alphaTarget(0.22).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end',   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
  );

nodeGSel.append('circle')
  .attr('class','node-ring')
  .attr('r', d => d.r + 7)
  .attr('fill', 'none')
  .attr('stroke', d => d.accent)
  .attr('stroke-width', 2)
  .attr('stroke-opacity', 0)
  .attr('filter', d => `url(#glow-${d.layer})`);

nodeGSel.append('circle')
  .attr('class','node-circle')
  .attr('r', d => d.r)
  .attr('fill', d => d.accent)
  .attr('fill-opacity', 0.16)
  .attr('stroke', d => d.accent)
  .attr('stroke-width', 1.8)
  .attr('stroke-opacity', 0.9);

nodeGSel.append('circle')
  .attr('class','node-core')
  .attr('r', d => Math.max(7, d.r - 1))
  .attr('fill', d => d.sizeColor)
  .attr('fill-opacity', 0.96);

nodeGSel.append('circle')
  .attr('class','node-logo-bg')
  .attr('r', d => Math.max(6, d.r - 6))
  .attr('fill', '#ffffff')
  .attr('fill-opacity', 0.95);

nodeGSel.append('circle')
  .attr('class','node-size-dot')
  .attr('cx', d => d.r * 0.55)
  .attr('cy', d => d.r * 0.55)
  .attr('r', 3.4)
  .attr('fill', d => d.sizeColor)
  .attr('stroke', '#fff')
  .attr('stroke-width', 1.2)
  .attr('opacity', 0.95);

nodeGSel.each(function(d) {
  const el = d3.select(this);
  const clipId = `clip-${d.id.replace(/[^a-zA-Z0-9가-힣]/g,'_')}`;
  if (d.logo) {
    const img = el.append('image')
      .attr('class','node-logo')
      .attr('href', d.logo)
      .attr('x', -Math.max(6, d.r - 6))
      .attr('y', -Math.max(6, d.r - 6))
      .attr('width', Math.max(12, (d.r - 6) * 2))
      .attr('height', Math.max(12, (d.r - 6) * 2))
      .attr('clip-path', `url(#${clipId})`)
      .attr('preserveAspectRatio','xMidYMid meet')
      .attr('opacity', 0);

    const imgEl = img.node();
    imgEl.addEventListener('load',  () => { d3.select(imgEl).attr('opacity', 1); el.select('.node-fallback').attr('opacity', 0); });
    imgEl.addEventListener('error', () => { d3.select(imgEl).remove(); el.select('.node-fallback').attr('opacity', 1); });
  }

  el.append('text')
    .attr('class','node-fallback')
    .attr('text-anchor','middle')
    .attr('dominant-baseline','central')
    .attr('fill', '#0f172a')
    .attr('font-size', d.r * 0.72)
    .attr('font-weight','900')
    .attr('font-family','Noto Sans KR,sans-serif')
    .attr('pointer-events','none')
    .attr('opacity', d.logo ? 0 : 1)
    .text(d.id.slice(0,1));
});

nodeGSel.append('text')
  .attr('class','node-label')
  .attr('text-anchor','middle')
  .attr('dy', d => d.r + 18)
  .attr('fill','rgba(255,255,255,0.9)')
  .attr('font-size', d => d.size === 'large' ? '11.5px' : d.size === 'mid' ? '10.5px' : '9.4px')
  .attr('font-family','Noto Sans KR,sans-serif')
  .attr('font-weight', d => d.size === 'large' ? '700' : d.size === 'mid' ? '600' : '500')
  .attr('stroke','rgba(7,9,15,0.95)')
  .attr('stroke-width', 3)
  .attr('paint-order','stroke')
  .attr('pointer-events','none')
  .text(d => d.id.length > 10 ? d.id.slice(0,9)+'…' : d.id);

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(150).strength(0.045))
  .force('charge', d3.forceManyBody().strength(d => d.size === 'large' ? -300 : d.size === 'mid' ? -220 : -170))
  .force('collision', d3.forceCollide().radius(d => d.r + 12).strength(0.96))
  .force('cluster', () => {
    nodes.forEach(n => {
      const alpha = 0.05;
      n.vx += (n.tx - n.x) * alpha;
      n.vy += (n.ty - n.y) * alpha;
    });
  })
  .alphaDecay(0.024)
  .velocityDecay(0.42);

sim.on('tick', () => {
  linkSel
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeGSel.attr('transform', d => `translate(${d.x},${d.y})`);
});

function applyTheme(theme) {
  ST.theme = theme === 'light' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', ST.theme);
  localStorage.setItem('korea-ai-ecosystem-theme', ST.theme);
  document.querySelectorAll('#theme-row .theme-pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.themeMode === ST.theme);
  });
  const labelFill = ST.theme === 'light' ? 'rgba(15,23,42,0.92)' : 'rgba(255,255,255,0.9)';
  const labelStroke = ST.theme === 'light' ? 'rgba(255,255,255,0.98)' : 'rgba(7,9,15,0.95)';
  nodeGSel.selectAll('.node-label')
    .attr('fill', labelFill)
    .attr('stroke', labelStroke);
  nodeGSel.selectAll('.node-fallback')
    .attr('fill', '#0f172a');
  drawBgGrid();
}

function queryMatch(d, q) {
  if (!q) return true;
  return d.id.toLowerCase().includes(q) ||
         (d.focus || '').toLowerCase().includes(q) ||
         (d.summary || '').toLowerCase().includes(q) ||
         (d.subName || '').toLowerCase().includes(q) ||
         (d.tags || []).some(t => (t || '').toLowerCase().includes(q));
}

function relatedIds(name) {
  const base = nodes.find(n => n.id === name);
  if (!base) return new Set();
  const baseSet = new Set(base.tags);
  return new Set(
    nodes.filter(n =>
      n.id !== name &&
      (n.sub === base.sub || n.tags.some(t => baseSet.has(t)))
    ).map(n => n.id)
  );
}

function labelOpacityFor(d, isSelected, isRelated, isActive, isQueryMatch) {
  if (!isActive) return 0;
  if (isSelected) return 1;
  if (ST.selected && !isRelated) return 0;
  if (d.size === 'large') return 0.95;
  if (d.size === 'mid') return 0.75;
  if (ST.zoomK > 1.35 || ST.query || isQueryMatch) return 0.66;
  return 0;
}

function updateLabelVisibility() {
  const q = ST.query.trim().toLowerCase();
  const rel = ST.selected ? relatedIds(ST.selected) : null;
  nodeGSel.each(function(d) {
    const isSelected = ST.selected === d.id;
    const isRelated = rel && rel.has(d.id);
    const layerMatch = !ST.layerFilter || d.layer === ST.layerFilter;
    const isQ = queryMatch(d, q);
    const isActive = layerMatch && isQ;
    d3.select(this).select('.node-label').attr('opacity', labelOpacityFor(d, isSelected, isRelated, isActive, isQ));
  });
}

function applyVisual() {
  const q = ST.query.trim().toLowerCase();
  const rel = ST.selected ? relatedIds(ST.selected) : null;

  nodeGSel.each(function(d) {
    const el = d3.select(this);
    const isSelected = ST.selected === d.id;
    const isRelated  = rel && rel.has(d.id);
    const layerMatch = !ST.layerFilter || d.layer === ST.layerFilter;
    const isQ = queryMatch(d, q);
    const active = layerMatch && isQ;
    let opacity = 1;
    if (ST.selected) opacity = isSelected ? 1 : isRelated ? 0.88 : 0.12;
    else if (!active) opacity = 0.10;

    el.attr('opacity', opacity);
    el.select('.node-ring').attr('stroke-opacity', isSelected ? 0.96 : isRelated ? 0.52 : 0);
    el.select('.node-circle')
      .attr('fill-opacity', isSelected ? 0.28 : d.size === 'large' ? 0.18 : 0.15)
      .attr('stroke-width', isSelected ? 3.1 : 1.8);
    el.select('.node-label').attr('opacity', labelOpacityFor(d, isSelected, isRelated, active, isQ));
  });

  linkSel
    .attr('stroke-opacity', d => {
      if (!ST.selected) return 0.16;
      const connected = d.source.id === ST.selected || d.target.id === ST.selected;
      return connected ? 0.76 : 0.035;
    })
    .attr('stroke-width', d => {
      if (!ST.selected) return 1;
      return (d.source.id === ST.selected || d.target.id === ST.selected) ? 2 : 1;
    });

  LAYER_DEFS.forEach(l => {
    const active = !ST.layerFilter || ST.layerFilter === l.id;
    d3.select(`.zone-${l.id}`).attr('fill-opacity', active ? 0.055 : 0.018).attr('stroke-opacity', active ? 0.22 : 0.07);
    d3.select(`.zone-label-${l.id}`).attr('opacity', active ? 0.9 : 0.22);
    d3.select(`.zone-count-${l.id}`).attr('opacity', active ? 0.48 : 0.16);
    d3.selectAll(`.subpill-${l.id}`).attr('opacity', active ? 1 : 0.18);
  });
}

function updateDetail() {
  const panel = document.getElementById('detail-panel');
  if (!ST.selected) { panel.classList.remove('visible'); return; }
  const d = nodes.find(n => n.id === ST.selected); if (!d) return;

  const baseSet = new Set(d.tags);
  const related = nodes
    .filter(n => n.id !== d.id && (n.sub === d.sub || n.tags.some(t => baseSet.has(t))))
    .map(n => {
      const shared = n.tags.filter(t => baseSet.has(t));
      return { ...n, score: (n.sub === d.sub ? 12 : 0) + shared.length * 5 };
    })
    .sort((a,b) => b.score - a.score)
    .slice(0, 8);

  document.getElementById('d-layer').textContent = d.layerName;
  document.getElementById('d-layer').style.color = d.accent;
  document.getElementById('d-name').textContent = d.id;
  document.getElementById('d-subcat').textContent = d.subName || '';
  document.getElementById('d-focus').textContent = d.focus || '';
  document.getElementById('d-size').textContent = d.sizeName;
  document.getElementById('d-size').style.borderColor = d.sizeColor;
  document.getElementById('d-size').style.color = d.sizeColor;
  document.getElementById('d-size').style.background = d.sizeColor + '1A';
  document.getElementById('d-summary').textContent = d.summary || '';
  document.getElementById('d-tags').innerHTML = (d.tags || []).map(t => `<span class="detail-tag">${t}</span>`).join('');
  document.getElementById('d-related').innerHTML = related.map(r => `
    <div class="related-item">
      <div class="related-dot" style="background:${r.accent}"></div>
      <div class="related-name">${r.id}</div>
      <div class="related-layer" style="color:${r.accent}">${r.subName}</div>
    </div>`).join('') || '<div style="font-size:11px;color:rgba(255,255,255,.24)">관련 플레이어 없음</div>';

  panel.classList.add('visible');
}

const tooltip = document.getElementById('node-tooltip');
const ttName  = document.getElementById('tt-name');
const ttSub   = document.getElementById('tt-sub');

nodeGSel.on('click', (ev, d) => {
  ev.stopPropagation();
  ST.selected = ST.selected === d.id ? null : d.id;
  applyVisual();
  updateDetail();
});

nodeGSel
  .on('mouseover', (ev, d) => {
    ttName.textContent = d.id;
    ttSub.textContent  = `${d.layerName} · ${d.subName} · ${d.sizeName}\n${d.focus}`;
    tooltip.classList.add('visible');
  })
  .on('mousemove', ev => {
    tooltip.style.left = (ev.clientX + 16) + 'px';
    tooltip.style.top  = (ev.clientY - 8) + 'px';
  })
  .on('mouseleave', () => tooltip.classList.remove('visible'));

svg.on('click', () => {
  ST.selected = null;
  applyVisual();
  updateDetail();
});

const filterRow = document.getElementById('filter-row');
filterRow.innerHTML = `<span class="row-label">축</span><button class="f-pill active" data-layer="">전체</button>` +
  LAYER_DEFS.map(l => `<button class="f-pill" data-layer="${l.id}">${l.name}</button>`).join('');
filterRow.querySelectorAll('.f-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    filterRow.querySelectorAll('.f-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ST.layerFilter = btn.dataset.layer || null;
    applyVisual();
  });
});

document.querySelectorAll('#theme-row .theme-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    applyTheme(btn.dataset.themeMode);
    applyVisual();
    updateDetail();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  ST.query = e.target.value;
  applyVisual();
});

document.getElementById('close-detail').addEventListener('click', ev => {
  ev.stopPropagation();
  ST.selected = null;
  applyVisual();
  updateDetail();
});

function fitZoom(duration = 700) {
  const bounds = zoomG.node().getBBox();
  const pad = 64;
  const scale = Math.min((W - pad * 2) / bounds.width, (H - pad * 2) / bounds.height, 1);
  const tx = W / 2 - scale * (bounds.x + bounds.width / 2);
  const ty = H / 2 - scale * (bounds.y + bounds.height / 2);
  svg.transition().duration(duration).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

document.getElementById('btn-zi').addEventListener('click', () => svg.transition().duration(250).call(zoom.scaleBy, 1.28));
document.getElementById('btn-zo').addEventListener('click', () => svg.transition().duration(250).call(zoom.scaleBy, 0.78));
document.getElementById('btn-fit').addEventListener('click', () => fitZoom(500));

document.getElementById('legend').innerHTML = `
  <div class="legend-item"><div class="legend-swatch" style="background:${SIZE_DEFS.large.color}"></div>대기업</div>
  <div class="legend-item"><div class="legend-swatch" style="background:${SIZE_DEFS.mid.color}"></div>중견·스케일업</div>
  <div class="legend-item"><div class="legend-swatch" style="background:${SIZE_DEFS.startup.color}"></div>스타트업</div>
  <div class="legend-div"></div>
  ${Object.entries(REL_COL).map(([t,c]) => `<div class="legend-item"><div style="width:20px;height:2px;background:${c};border-radius:1px;${t==='invest'?'border-top:2px dashed '+c+';background:none':''}"></div>${({group:'그룹 계열사',tech:'기술협력',supply:'공급망',invest:'투자/파트너십'})[t]}</div>`).join('')}
`;

document.getElementById('stats-bar').innerHTML = [
  { val: nodes.length, lbl:'총 기업' },
  ...LAYER_DEFS.map(l => ({ val: layerCounts.get(l.id) || 0, lbl: l.name, col: l.accent }))
].map(s => `<div class="stat-item"><div class="stat-val" ${s.col ? `style="color:${s.col}"` : ''}>${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');

applyTheme(ST.theme);
applyVisual();
updateLabelVisibility();

setTimeout(() => fitZoom(850), 1200);
window.addEventListener('resize', drawBgGrid);
</script>
</body>
</html>
