

<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>대한민국 AI 생태계 조감도</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;
  --bg-correlation:#0b1020;
  --panel:rgba(12,16,28,.92);
  --panel-light:rgba(255,255,255,.94);
  --panel-border:rgba(255,255,255,.12);
  --panel-border-light:rgba(15,23,42,.14);
  --surface-1:rgba(255,255,255,.06);
  --surface-2:rgba(255,255,255,.04);
  --surface-3:rgba(255,255,255,.08);
  --text-main:#e2e8f0;
  --text-soft:rgba(255,255,255,.72);
  --text-muted:rgba(255,255,255,.54);
  --text-faint:rgba(255,255,255,.34);
  --shadow-stroke:rgba(7,9,15,.94);
  --grid-color:rgba(255,255,255,.03);
  --accent-blue:#3b82f6;
  --corr-edge:#94a3b8;
  --corr-edge-muted:rgba(148,163,184,.26);
}
html[data-theme="light"]{
  --bg:#f8fafc;
  --bg-correlation:#edf1f5;
  --panel:rgba(255,255,255,.94);
  --panel-light:rgba(255,255,255,.97);
  --panel-border:rgba(15,23,42,.12);
  --panel-border-light:rgba(15,23,42,.12);
  --surface-1:rgba(15,23,42,.05);
  --surface-2:rgba(15,23,42,.04);
  --surface-3:rgba(15,23,42,.08);
  --text-main:#0f172a;
  --text-soft:rgba(15,23,42,.72);
  --text-muted:rgba(15,23,42,.58);
  --text-faint:rgba(15,23,42,.40);
  --shadow-stroke:rgba(255,255,255,.98);
  --grid-color:rgba(15,23,42,.055);
  --corr-edge:#64748b;
  --corr-edge-muted:rgba(100,116,139,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text-main);
  transition:background .25s ease,color .25s ease;
}
body[data-mode="correlation"]{
  background:var(--bg-correlation);
}
html[data-theme="light"] body[data-mode="correlation"]{
  --text-main:#0f172a;
  --text-soft:rgba(15,23,42,.72);
  --text-muted:rgba(15,23,42,.58);
  --text-faint:rgba(15,23,42,.42);
  --panel:rgba(255,255,255,.95);
  --panel-light:rgba(255,255,255,.97);
  --panel-border:rgba(15,23,42,.12);
  --panel-border-light:rgba(15,23,42,.12);
  --surface-1:rgba(15,23,42,.05);
  --surface-2:rgba(15,23,42,.04);
  --surface-3:rgba(15,23,42,.08);
  --shadow-stroke:rgba(255,255,255,.98);
  --corr-edge:#64748b;
  --corr-edge-muted:rgba(100,116,139,.28);
}
html[data-theme="dark"] body[data-mode="correlation"]{
  --text-main:#e2e8f0;
  --text-soft:rgba(226,232,240,.78);
  --text-muted:rgba(226,232,240,.58);
  --text-faint:rgba(226,232,240,.36);
  --panel:rgba(11,16,30,.92);
  --panel-light:rgba(11,16,30,.95);
  --panel-border:rgba(255,255,255,.10);
  --panel-border-light:rgba(255,255,255,.10);
  --surface-1:rgba(255,255,255,.06);
  --surface-2:rgba(255,255,255,.04);
  --surface-3:rgba(255,255,255,.08);
  --shadow-stroke:rgba(5,8,15,.96);
  --corr-edge:#8ea4c5;
  --corr-edge-muted:rgba(142,164,197,.24);
}
#bg-canvas{
  position:fixed; inset:0; z-index:0; pointer-events:none;
}
body[data-mode="correlation"] #bg-canvas{display:none}
#graph-svg{
  position:fixed; inset:0; z-index:1;
}
.top-bar{
  position:fixed; top:0; left:0; right:0; z-index:30;
  display:flex; gap:14px; align-items:flex-start;
  padding:14px 22px 18px;
  background:linear-gradient(180deg,rgba(7,9,15,.96) 72%, transparent);
  pointer-events:none;
}
html[data-theme="light"] .top-bar{
  background:linear-gradient(180deg,rgba(248,250,252,.98) 72%, rgba(248,250,252,0));
}
html[data-theme="light"] body[data-mode="correlation"] .top-bar{
  background:linear-gradient(180deg,rgba(239,243,247,.97) 70%, rgba(239,243,247,0));
}
html[data-theme="dark"] body[data-mode="correlation"] .top-bar{
  background:linear-gradient(180deg,rgba(8,12,24,.97) 72%, rgba(8,12,24,0));
}
.top-bar>*{pointer-events:auto}
.logo{
  min-width:170px;
  display:flex; flex-direction:column; gap:4px;
}
.logo-title{font-size:16px;font-weight:900;letter-spacing:-.4px}
.logo-sub{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:1.8px;
  text-transform:uppercase;
  color:var(--text-faint);
}
.logo-note{
  font-size:11px;
  color:var(--text-muted);
  line-height:1.45;
  max-width:220px;
}
.bar-main{
  display:flex; flex-direction:column; gap:8px; flex:1; min-width:0;
}
.top-row{
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.mode-switch{
  display:inline-flex; align-items:center; gap:4px;
  padding:4px;
  border-radius:999px;
  background:var(--surface-1);
  border:1px solid var(--panel-border);
  backdrop-filter:blur(10px);
}
.mode-pill{
  border:0;
  border-radius:999px;
  padding:7px 12px;
  background:transparent;
  color:var(--text-muted);
  cursor:pointer;
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:.3px;
  transition:.18s ease;
  white-space:nowrap;
}
.mode-pill:hover{color:var(--text-main)}
.mode-pill.active{
  background:rgba(255,255,255,.14);
  color:var(--text-main);
}
html[data-theme="light"] .mode-pill.active{
  background:rgba(15,23,42,.08);
}
body[data-mode="correlation"] .mode-pill[data-mode="correlation"].active{
  background:rgba(59,130,246,.16);
  color:#1d4ed8;
}
html[data-theme="dark"] body[data-mode="correlation"] .mode-pill[data-mode="correlation"].active{
  background:rgba(96,165,250,.20);
  color:#bfdbfe;
}
.search-box{
  display:flex; align-items:center; gap:8px;
  min-width:280px; max-width:100%;
  width:320px;
  padding:8px 12px;
  border-radius:10px;
  background:var(--surface-1);
  border:1px solid var(--panel-border);
  transition:border-color .2s, box-shadow .2s;
}
body[data-mode="correlation"] .search-box,
body[data-mode="correlation"] .range-wrap,
body[data-mode="correlation"] .ctrl-btn,
body[data-mode="correlation"] .legend,
body[data-mode="correlation"] .detail-panel,
body[data-mode="correlation"] .stats-bar,
body[data-mode="correlation"] .node-tooltip,
body[data-mode="correlation"] .onboard-hint{
  background:var(--panel-light);
  border-color:var(--panel-border-light);
}
.search-box:focus-within{
  border-color:var(--accent-blue);
  box-shadow:0 0 0 3px rgba(59,130,246,.14);
}
.search-box input{
  flex:1; min-width:0;
  background:transparent; border:0; outline:0;
  color:var(--text-main);
  font-size:12px;
  font-family:'Noto Sans KR',sans-serif;
}
.search-box input::placeholder{color:var(--text-faint)}
.search-icon{color:var(--text-faint);flex-shrink:0}
.search-kbd{
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:var(--text-faint);
  padding:2px 5px;
  border-radius:4px;
  background:var(--surface-2);
  border:1px solid var(--panel-border);
  white-space:nowrap;
}
.search-count{
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:var(--text-faint);
  min-width:34px;
  text-align:right;
}
.search-clear{
  display:none;
  width:18px;height:18px;
  border:0;border-radius:50%;
  align-items:center;justify-content:center;
  cursor:pointer;
  background:var(--surface-3);
  color:var(--text-muted);
  font-size:10px;
}
.search-clear.visible{display:flex}
.search-clear:hover{background:rgba(239,68,68,.14);color:#ef4444}
.filter-wrap{display:flex;flex-direction:column;gap:6px}
.filter-row{
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
}
.row-label{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:1.4px;
  text-transform:uppercase;
  color:var(--text-faint);
  margin-right:4px;
}
.f-pill{
  border:1px solid var(--panel-border);
  background:var(--surface-2);
  color:var(--text-muted);
  border-radius:999px;
  padding:5px 10px;
  font-size:10px;
  font-family:'DM Mono',monospace;
  cursor:pointer;
  white-space:nowrap;
  transition:.18s ease;
}
.f-pill:hover{color:var(--text-main);border-color:rgba(255,255,255,.28);transform:translateY(-1px)}
html[data-theme="light"] .f-pill:hover{border-color:rgba(15,23,42,.22)}
.f-pill.active{background:rgba(255,255,255,.14);color:var(--text-main)}
html[data-theme="light"] .f-pill.active{background:rgba(15,23,42,.08)}
.f-pill .pill-count{
  display:inline-block;
  font-size:8px;
  padding:1px 5px;
  margin-left:4px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
}
html[data-theme="light"] .f-pill .pill-count{background:rgba(15,23,42,.08)}
.range-wrap{
  display:flex; align-items:center; gap:8px;
  padding:5px 10px;
  border-radius:999px;
  background:var(--surface-1);
  border:1px solid var(--panel-border);
}
.range-wrap input[type="range"]{width:130px;accent-color:var(--accent-blue)}
.range-val{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--text-muted);
  min-width:42px;
  text-align:right;
}
.corr-controls{display:none}
body[data-mode="correlation"] .corr-controls{display:flex}
.ctrl-panel{
  position:fixed; right:16px; top:50%; transform:translateY(-50%);
  z-index:30;
  display:flex; flex-direction:column; gap:6px;
}
.ctrl-btn{
  width:36px;height:36px;
  border-radius:10px;
  border:1px solid var(--panel-border);
  background:var(--panel);
  color:var(--text-muted);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:15px;
  transition:.18s ease;
}
.ctrl-btn:hover{color:var(--text-main);transform:scale(1.06)}
.ctrl-btn[data-tooltip]{position:relative}
.ctrl-btn[data-tooltip]:hover::after{
  content:attr(data-tooltip);
  position:absolute;
  right:calc(100% + 8px);
  top:50%;
  transform:translateY(-50%);
  white-space:nowrap;
  font-size:11px;
  padding:4px 8px;
  border-radius:6px;
  border:1px solid var(--panel-border);
  background:var(--panel);
  color:var(--text-soft);
}
body[data-mode="correlation"] .ctrl-btn[data-tooltip]:hover::after{
  background:var(--panel-light);
  border-color:var(--panel-border-light);
}
.legend{
  position:fixed; left:24px; bottom:24px; z-index:30;
  max-width:285px;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--panel-border);
  background:var(--panel);
  backdrop-filter:blur(14px);
}
.legend-title{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:1.6px;
  text-transform:uppercase;
  color:var(--text-faint);
  margin-bottom:8px;
}
.legend-content{display:flex;flex-direction:column;gap:6px}
.legend-item{
  display:flex; align-items:center; gap:8px;
  font-size:11px; color:var(--text-soft);
}
.legend-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-line{width:22px;height:2px;border-radius:1px;flex-shrink:0}
.stats-bar{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:30;
  display:flex;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--panel-border);
  background:var(--panel);
  backdrop-filter:blur(14px);
}
.stat-item{
  padding:10px 14px;
  border-right:1px solid rgba(255,255,255,.06);
  display:flex; flex-direction:column; gap:2px;
}
.stat-item:last-child{border-right:0}
html[data-theme="light"] .stat-item{border-right-color:rgba(15,23,42,.06)}
.stat-val{font-size:16px;font-weight:800;line-height:1}
.stat-lbl{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--text-faint);
}
.detail-panel{
  position:fixed; right:24px; bottom:24px; z-index:30;
  width:360px; max-height:calc(100vh - 110px);
  overflow-y:auto; overscroll-behavior:contain;
  padding:20px;
  border-radius:18px;
  border:1px solid var(--panel-border);
  background:var(--panel);
  backdrop-filter:blur(18px);
  opacity:0; transform:translateY(12px) scale(.98); pointer-events:none;
  transition:opacity .24s ease, transform .24s ease;
}
.detail-panel.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.detail-panel::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--panel-border);border-radius:2px}
.close-btn{
  position:absolute; top:14px; right:14px;
  width:28px;height:28px;
  border-radius:8px;
  border:1px solid var(--panel-border);
  background:var(--surface-1);
  color:var(--text-faint);
  cursor:pointer;
}
.close-btn:hover{background:rgba(239,68,68,.12);color:#ef4444;border-color:rgba(239,68,68,.28)}
.detail-layer{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:6px;
  opacity:.8;
}
.detail-name{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.15;margin-bottom:4px}
.detail-subcat{font-size:12px;color:var(--text-muted);margin-bottom:10px}
.detail-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.detail-pill{
  font-family:'DM Mono',monospace;
  font-size:10px;
  padding:4px 9px;
  border-radius:8px;
  border:1px solid var(--panel-border);
  background:var(--surface-1);
  color:var(--text-soft);
}
.detail-summary{font-size:12px;line-height:1.72;color:var(--text-soft);margin-bottom:12px}
.detail-actions{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.detail-link-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--panel-border);
  background:var(--surface-1);
  color:var(--text-main);
  text-decoration:none;
  font-size:12px;
  font-weight:700;
  transition:.15s ease;
}
.detail-link-btn:hover{
  color:var(--accent-blue);
  border-color:rgba(59,130,246,.32);
  background:rgba(59,130,246,.12);
}
.detail-link-btn.disabled{
  pointer-events:none;
  cursor:default;
  color:var(--text-faint);
  background:var(--surface-2);
  border-color:var(--panel-border);
}
.detail-url-link{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--text-muted);
  text-decoration:none;
  word-break:break-all;
}
.detail-url-link:hover{color:var(--accent-blue)}
.detail-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.detail-tag{
  font-size:10px;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid var(--panel-border);
  background:var(--surface-1);
  color:var(--text-muted);
  cursor:pointer;
}
.detail-tag:hover{color:var(--accent-blue);border-color:rgba(59,130,246,.28);background:rgba(59,130,246,.10)}
.detail-related-title{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--text-faint);
  margin-bottom:8px;
}
.related-list{display:flex;flex-direction:column;gap:4px}
.related-group-label{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:1.4px;
  text-transform:uppercase;
  color:var(--text-faint);
  margin-top:8px;
  margin-bottom:4px;
}
.related-item{
  display:flex; gap:8px; align-items:flex-start;
  padding:7px 8px;
  border-radius:10px;
  cursor:pointer;
  transition:.15s ease;
}
.related-item:hover{background:var(--surface-1)}
.related-dot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0}
.related-main{flex:1;min-width:0}
.related-name{font-size:11px;font-weight:700;color:var(--text-soft)}
.related-sub{font-size:10px;color:var(--text-muted);line-height:1.45;margin-top:2px}
.related-score{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--text-faint);
  flex-shrink:0;
}
.node-tooltip{
  position:fixed;
  z-index:50;
  pointer-events:none;
  opacity:0;
  transition:opacity .12s ease;
  max-width:260px;
  padding:10px 13px;
  border-radius:10px;
  border:1px solid var(--panel-border);
  background:var(--panel);
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.node-tooltip.visible{opacity:1}
body[data-mode="correlation"] .node-tooltip{
  background:var(--panel-light);
  border-color:var(--panel-border-light);
}
.node-tooltip-name{font-weight:700;color:var(--text-main);margin-bottom:3px}
.node-tooltip-sub{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--text-muted);
  line-height:1.55;
  white-space:pre-line;
}
.node-tooltip-tags{
  display:flex; gap:4px; flex-wrap:wrap; margin-top:6px;
}
.node-tooltip-tags span{
  font-size:8px; padding:2px 5px;
  border-radius:999px;
  background:var(--surface-1);
  border:1px solid var(--panel-border);
  color:var(--text-faint);
}
.onboard-hint{
  position:fixed; left:50%; bottom:90px; transform:translateX(-50%);
  z-index:35;
  padding:8px 16px;
  border-radius:10px;
  border:1px solid var(--panel-border);
  background:var(--panel);
  color:var(--text-faint);
  font-size:11px;
  white-space:nowrap;
  transition:opacity .5s ease;
}
.onboard-hint.hidden{opacity:0}
.search-empty{
  position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
  z-index:25;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
}
.search-empty.visible{opacity:1}
.search-empty-icon{font-size:30px;opacity:.28;margin-bottom:6px}
.search-empty-text{font-size:13px;color:var(--text-muted)}
.search-empty-hint{font-size:11px;color:var(--text-faint);margin-top:4px}
.zone-group,.subzone,.subpill,
.zone-fill,.zone-outline,.zone-dash,.subzone-bg,.subzone-outline{
  pointer-events:none;
}
.zone-label,.zone-count,.subpill text,.community-label,.community-count,.node-label-out,.node-label-in{
  pointer-events:none;
  paint-order:stroke;
  stroke:var(--shadow-stroke);
  stroke-linejoin:round;
}
.zone-label{font-weight:800;letter-spacing:-.2px}
.zone-count,.subpill text,.community-count{
  font-family:'DM Mono',monospace;
}
.subzone-bg{
  fill-opacity:.05;
  stroke-width:1px;
}
.subzone-outline{
  fill:none;
  stroke-width:1.2px;
  stroke-dasharray:5 4;
}
.subpill text{
  font-size:10px;
  font-weight:700;
  fill:var(--text-soft);
  stroke-width:3.4px;
}
.subpill rect{
  rx:10; ry:10;
  fill-opacity:.16;
  stroke-width:1.1px;
}
.community-label{
  font-size:12px;
  font-weight:800;
  fill:var(--text-soft);
  stroke-width:6px;
}
.community-count{
  font-size:10px;
  fill:var(--text-muted);
  stroke-width:5px;
}
.node-link{
  fill:none;
  stroke-linecap:round;
}
.node-label-out{
  fill:var(--text-main);
  font-size:10px;
  stroke-width:3px;
}
.node-label-in{
  fill:#101828;
  font-weight:800;
  stroke:rgba(255,255,255,.96);
  stroke-width:4px;
}
html[data-theme="light"] body[data-mode="correlation"] .node-label-in{
  fill:#111827;
  stroke:rgba(255,255,255,.96);
}
html[data-theme="dark"] body[data-mode="correlation"] .node-label-in{

function getHomepageUrl(name){
  const raw = HOMEPAGE[name];
  if(!raw) return '';
  const normalized = String(raw).trim();
  if(!normalized) return '';
  return /^https?:\/\//i.test(normalized) ? normalized : `https://${normalized}`;
}

function getHomepageLabel(url){

function scorePair(a,b){
  let score = 0;
  const reasons = [];
  const explicitType = explicitMap.get(pairKey(a.id, b.id)) || null;
  const sharedTags = intersect(a.tagsLower, b.tagsLower);
  const sharedFocus = intersect(a.focusTokens, b.focusTokens);

  if(a.layer === b.layer){
    score += 0.6;
    reasons.push('동일 레이어');
  }
  if(a.sub === b.sub){
    score += 2.2;
    reasons.push('동일 세부구분');
  }
  if(sharedTags.length){
    const gain = Math.min(3.0, sharedTags.length * 1.05);
    score += gain;
    reasons.push(`공통 태그 ${sharedTags.slice(0,3).join(', ')}`);
  }
  if(sharedFocus.length){
    const gain = Math.min(1.2, sharedFocus.length * 0.35);
    score += gain;
    reasons.push(`유사 포커스 ${sharedFocus.slice(0,2).join(', ')}`);
  }
  if(explicitType){
    const explicitW = {group:5.2, tech:4.8, supply:4.6, invest:4.2}[explicitType] || 4.5;
    score += explicitW;
    reasons.unshift(`명시 관계 ${REL_LABELS[explicitType] || explicitType}`);
  }
  return {
    score: +score.toFixed(2),
    reasons,
    explicitType,
    sharedTags,
    sharedFocus
  };
}

function buildCorrelationGraph(){
  const candidates = [];
  for(let i=0;i<nodes.length;i+=1){
    for(let j=i+1;j<nodes.length;j+=1){
      const a = nodes[i];
      const b = nodes[j];
      const meta = scorePair(a,b);
      if(meta.explicitType || meta.score >= ST.threshold - 0.7){
        candidates.push({
          source:a.id,
          target:b.id,
          key:`corr:${pairKey(a.id,b.id)}`,
          weight:meta.score,
          reasons:meta.reasons,
          explicitType:meta.explicitType,
          sharedTags:meta.sharedTags,
          sharedFocus:meta.sharedFocus
        });
      }
    }
  }

  const byNode = new Map(nodes.map(n => [n.id, []]));
  candidates.forEach(e => {
    byNode.get(e.source).push(e);
    byNode.get(e.target).push(e);
  });

  const keep = new Set();
  byNode.forEach(arr => {
    arr
      .sort((a,b) => b.weight - a.weight || d3.ascending(a.key, b.key))
      .forEach((e, idx) => {
        if(e.explicitType || idx < 7) keep.add(e.key);
      });
  });

  correlationLinks = candidates.filter(e => (e.explicitType || e.weight >= ST.threshold) && keep.has(e.key));

  if(correlationLinks.length < Math.min(RELATIONS.length, 30)){
    const fallback = [...candidates].sort((a,b) => b.weight - a.weight).slice(0, 50);
    const exist = new Set(correlationLinks.map(e => e.key));
    fallback.forEach(e => {
      if(!exist.has(e.key)) correlationLinks.push(e);
    });
  }

  corrAdjacency = new Map(nodes.map(n => [n.id, []]));
  correlationLinks.forEach(link => {
    corrAdjacency.get(link.source).push({id:link.target, weight:link.weight, reasons:link.reasons, link});
    corrAdjacency.get(link.target).push({id:link.source, weight:link.weight, reasons:link.reasons, link});
  });

  nodes.forEach(n => {
    const adj = corrAdjacency.get(n.id) || [];
    n.corrDegree = adj.length;
    n.weightedDegree = d3.sum(adj, d => d.weight || 0);
  });

  detectCommunities();

  const extent = d3.extent(nodes, d => d.weightedDegree);
  const scale = d3.scaleSqrt().domain(extent[0] === extent[1] ? [0,1] : extent).range([0, 13]);
  nodes.forEach(n => {
    n.corrR = clamp(n.baseR + scale(n.weightedDegree), n.baseR, n.baseR + 13);
  });

  assignCommunityCenters();
  assignCommunityOffsets();
}

function detectCommunities(){
  const labels = new Map(nodes.map(n => [n.id, n.id]));
  for(let iter=0; iter<18; iter+=1){
    let changed = 0;
    const order = d3.shuffle([...nodes]);
    order.forEach(node => {
      const neighbors = corrAdjacency.get(node.id) || [];
      if(!neighbors.length) return;
      const scoreByLabel = new Map();
      neighbors.forEach(({id, weight}) => {
        const lbl = labels.get(id);
        scoreByLabel.set(lbl, (scoreByLabel.get(lbl) || 0) + weight);
      });
      const current = labels.get(node.id);
      let bestLabel = current;
      let bestScore = -Infinity;
      [...scoreByLabel.entries()].forEach(([lbl, score]) => {
        if(score > bestScore || (score === bestScore && lbl === current)){
          bestLabel = lbl;
          bestScore = score;
        }
      });
      if(bestLabel !== current){
        labels.set(node.id, bestLabel);
        changed += 1;
      }
    });
    if(!changed) break;
  }

  const groups = d3.groups(nodes, n => labels.get(n.id)).sort((a,b) => b[1].length - a[1].length);
  communityMeta = new Map();
  const nodeToComm = new Map();

  groups.forEach(([_, group], idx) => {
    const cid = `C${idx+1}`;
    group.forEach(n => nodeToComm.set(n.id, cid));
    const layerTop = d3.rollups(group, v => v.length, d => d.layer).sort((a,b) => b[1]-a[1])[0]?.[0] || group[0].layer;
    const subTop = d3.rollups(group, v => v.length, d => d.subName).sort((a,b) => b[1]-a[1])[0]?.[0] || '';
    communityMeta.set(cid, {
      id: cid,
      color: CORR_COLORS[idx % CORR_COLORS.length],
      size: group.length,
      label: group.length >= 4 ? `${layerMap[layerTop]?.name || layerTop} · ${subTop}` : `${layerMap[layerTop]?.name || layerTop}`
    });
  });

  nodes.forEach(n => {
    n.community = nodeToComm.get(n.id);
    n.communityColor = communityMeta.get(n.community)?.color || '#94a3b8';
  });
}

function assignCommunityCenters(){
  communityCenters = new Map();
  const ordered = [...communityMeta.values()].sort((a,b) => b.size - a.size);
  ordered.forEach((meta, idx) => {
    const slot = COMMUNITY_SLOTS[idx] || [0.5 + Math.cos(idx)*0.24, 0.5 + Math.sin(idx)*0.24];
    communityCenters.set(meta.id, {x:W*slot[0], y:H*slot[1]});
  });
}

function assignCommunityOffsets(){

    const step = Math.max(22, Math.min(54, 16 + Math.sqrt(group.length)*5));
    group.forEach((node, idx) => {
      node.corrBase = spiralOffset(idx, step + node.corrR*0.55);
    });
  });
}

function ecoSpreadForLayer(layerId){
  let spread = 0.84;
  if(ST.layerFilter === layerId) spread += 0.10;
  if(ST.selected){
    const selectedNode = nodesById.get(ST.selected);
    if(selectedNode && selectedNode.layer === layerId) spread += 0.06;
  }
  if(ST.zoomK > 1.55) spread += 0.03;
  return spread;
}
function getEcoLayoutRadius(layerId){

function hasEcoSubsetFocus(){

function getEcosystemSelectionContext(selectedId = ST.selected){
  const empty = { connected:new Map(), similar:new Set() };
  if(!selectedId || !nodesById.has(selectedId)) return empty;
  const base = nodesById.get(selectedId);
  const connected = new Map((relationAdjacency.get(base.id) || []).map(d => [d.id, d]));
  const baseTags = new Set(base.tags || []);
  const similar = new Set(
    nodes
      .filter(n => n.id !== base.id && !connected.has(n.id) && (n.sub === base.sub || n.tags.some(t => baseTags.has(t))))
      .slice(0, 12)
      .map(n => n.id)
  );
  return { connected, similar };
}
function getCorrelationSelectionContext(selectedId = ST.selected){
  const empty = { connected:new Map(), similar:new Set() };
  if(!selectedId || !nodesById.has(selectedId)) return empty;
  const base = nodesById.get(selectedId);
  const connected = new Map((corrAdjacency.get(base.id) || []).map(d => [d.id, d]));
  const sameComm = nodes
    .filter(n => n.id !== base.id && !connected.has(n.id) && n.community === base.community)
    .sort((a,b) => b.weightedDegree - a.weightedDegree || d3.ascending(a.id, b.id))
    .slice(0, 12)
    .map(n => n.id);
  return { connected, similar:new Set(sameComm) };
}
function isEcoRelevantNode(node, ctx = getEcosystemSelectionContext(ST.selected), q = ST.query.trim().toLowerCase()){
  if(ST.selected){
    return node.id === ST.selected || ctx.connected.has(node.id) || ctx.similar.has(node.id);
  }
  const layerMatch = !ST.layerFilter || node.layer === ST.layerFilter;
  const qMatch = !q || queryMatch(node, q);

}

function getEcoSubZoneData(useCurrent = ST.mode === 'ecosystem'){
  const focusMode = hasEcoSubsetFocus();
  return subpillData.map(def => {
    const allNodes = getEcoSubNodes(def.layer, def.id);
    const relevantNodes = focusMode ? getEcoRelevantNodes(def.layer).filter(n => n.sub === def.id) : allNodes;
    const layerCenter = getLayerCenter(def.layer);
    const R = getEcoLayoutRadius(def.layer);
    const spread = ecoSpreadForLayer(def.layer);
    const subOffsetScale = 0.74 + spread * 0.08;
    const fallbackX = layerCenter.x + def.dx * R * subOffsetScale;
    const fallbackY = layerCenter.y + def.dy * R * subOffsetScale;

    if(!allNodes.length){
      return {
        ...def,
        active:false,
        visibleCount:0,
        totalCount:0,
        center:{x:fallbackX, y:fallbackY},
        radius:18,
        labelY:fallbackY - 24
      };
    }

    const geomNodes = focusMode ? relevantNodes : allNodes;
    if(!geomNodes.length){
      return {
        ...def,
        active:false,
        visibleCount:0,
        totalCount:allNodes.length,
        center:{x:fallbackX, y:fallbackY},
        radius:18,
        labelY:fallbackY - 24
      };
    }

    const weightData = geomNodes.map(n => {
      const weight = n.size === 'large' ? 2.4 : n.size === 'mid' ? 1.7 : 1.2;
      const nx = useCurrent && Number.isFinite(n.x)
        ? n.x
        : (Number.isFinite(n.ecoTargetX) ? n.ecoTargetX : fallbackX);
      const ny = useCurrent && Number.isFinite(n.y)
        ? n.y
        : (Number.isFinite(n.ecoTargetY) ? n.ecoTargetY : fallbackY);
      return { n, weight, nx, ny };
    });

    const weightSum = d3.sum(weightData, d => d.weight) || 1;
    let cx = d3.sum(weightData, d => d.nx * d.weight) / weightSum;
    let cy = d3.sum(weightData, d => d.ny * d.weight) / weightSum;

    cx = cx * 0.88 + fallbackX * 0.12;
    cy = cy * 0.88 + fallbackY * 0.12;

    const pad = focusMode ? 9 : 12;
    const minRadius = Math.max(18, Math.sqrt(geomNodes.length) * 6 + 10);
    const maxRadius = Math.min(getEcoZoneRadius(def.layer, useCurrent) * 0.56, 96);
    const radius = clamp(
      d3.max(weightData, d => Math.hypot(d.nx - cx, d.ny - cy) + d.n.r + pad) || minRadius,
      minRadius,
      maxRadius
    );

    return {
      ...def,
      active: focusMode ? relevantNodes.length > 0 : (!ST.layerFilter || ST.layerFilter === def.layer),
      visibleCount: relevantNodes.length,
      totalCount: allNodes.length,
      center:{x:cx, y:cy},
      radius,
      labelY: cy - radius - 12
    };
  });
}

  const ecoCtx = getEcosystemSelectionContext(ST.selected);

function getEcoZoneRadius(layerId, useCurrent = ST.mode === 'ecosystem'){
  const center = getLayerCenter(layerId);
  const baseR = getEcoLayoutRadius(layerId);
  const allLayerNodes = nodes.filter(n => n.layer === layerId);
  if(!allLayerNodes.length) return baseR * 1.2;

  const focusMode = hasEcoSubsetFocus();
  const focusNodes = focusMode ? getEcoRelevantNodes(layerId) : allLayerNodes;
  if(!focusNodes.length){
    return focusMode ? Math.max(42, baseR * 0.46) : baseR * 1.2;
  }

  const padding = focusMode ? 14 : 18;
  const extent = d3.max(focusNodes, n => {
    const nx = useCurrent && Number.isFinite(n.x)
      ? n.x
      : (Number.isFinite(n.ecoTargetX) ? n.ecoTargetX : center.x);
    const ny = useCurrent && Number.isFinite(n.y)
      ? n.y
      : (Number.isFinite(n.ecoTargetY) ? n.ecoTargetY : center.y);
    return Math.hypot(nx - center.x, ny - center.y) + n.r + padding;
  }) || baseR;

  const minRadius = focusMode ? Math.max(48, baseR * 0.54) : baseR * 1.18;
  return Math.max(minRadius, extent);
}
function updateTargets(){
  nodes.forEach(node => {
    const layer = layerMap[node.layer];
    const sub = subMap[`${node.layer}:${node.sub}`];
    const center = getLayerCenter(layer);
    const R = getEcoLayoutRadius(node.layer);
    const spread = ecoSpreadForLayer(node.layer);
    const subOffsetScale = 0.74 + spread * 0.08;
    const localOffsetScale = 0.28 + spread * 0.085;
    node.ecoTargetX = center.x + (sub ? sub.dx * R * subOffsetScale : 0) + node.localBase.x * localOffsetScale;
    node.ecoTargetY = center.y + (sub ? sub.dy * R * subOffsetScale : 0) + node.localBase.y * localOffsetScale;

    const commCenter = communityCenters.get(node.community) || {x:W/2, y:H/2};
    node.corrTargetX = commCenter.x + node.corrBase.x;
    node.corrTargetY = commCenter.y + node.corrBase.y;
  });
}

function communityRenderData(){
  return [...communityMeta.values()].map(meta => {
    const fallback = communityCenters.get(meta.id) || {x:W/2,y:H/2};
    const groupNodes = nodes.filter(n => n.community === meta.id);
    const activeCount = groupNodes.filter(n => !ST.layerFilter || n.layer === ST.layerFilter).length;
    if(!groupNodes.length){
      return { ...meta, center:fallback, radius:56, activeCount, label:meta.label };
    }

    const weights = groupNodes.map(n => Math.max(1.2, (n.weightedDegree || 0) + n.r * 0.35));
    const weightSum = d3.sum(weights);
    const cx = d3.sum(groupNodes, (n, idx) => n.x * weights[idx]) / weightSum;
    const cy = d3.sum(groupNodes, (n, idx) => n.y * weights[idx]) / weightSum;
    const radius = clamp(
      d3.max(groupNodes, n => Math.hypot(n.x - cx, n.y - cy) + n.r + 22) || 48,
      46,
      190
    );
    const layerTop = d3.rollups(groupNodes, v => v.length, d => d.layer).sort((a,b) => b[1]-a[1])[0]?.[0] || groupNodes[0].layer;
    const subTop = d3.rollups(groupNodes, v => v.length, d => d.subName).sort((a,b) => b[1]-a[1])[0]?.[0] || '';
    const label = groupNodes.length >= 4
      ? `${layerMap[layerTop]?.name || layerTop} · ${subTop}`
      : `${layerMap[layerTop]?.name || layerTop}`;

    return {
      ...meta,
      center:{x:cx,y:cy},
      radius,
      activeCount,
      label
    };
  });
}

function ecoClusterForce(alpha){
  nodes.forEach(n => {
    const gain = (ST.layerFilter && ST.layerFilter === n.layer) ? 0.22 : 0.18;
    n.vx += (n.ecoTargetX - n.x) * gain * alpha;
    n.vy += (n.ecoTargetY - n.y) * gain * alpha;
  });
}
function corrClusterForce(alpha){
  nodes.forEach(n => {
    n.vx += (n.corrTargetX - n.x) * 0.14 * alpha;
    n.vy += (n.corrTargetY - n.y) * 0.14 * alpha;
  });
}

function configureSimulation(reheat=true){
  updateTargets();

  if(ST.mode === 'ecosystem'){
    sim
      .force('link', d3.forceLink(relationLinks).id(d => d.id)
        .distance(d => {
          const base = ({group:58, tech:74, supply:86, invest:92}[d.type] || 84);
          const crossLayer = d.source.layer !== d.target.layer;
          return base + (crossLayer ? 54 : 0);
        })
        .strength(d => {
          const base = ({group:.24, tech:.13, supply:.10, invest:.08}[d.type] || .09);
          const crossLayer = d.source.layer !== d.target.layer;
          return crossLayer ? base * 0.42 : base * 1.12;
        }))
      .force('charge', d3.forceManyBody().strength(d => d.size === 'large' ? -220 : d.size === 'mid' ? -174 : -138))
      .force('collision', d3.forceCollide().radius(d => d.r + 7).strength(.97))
      .force('cluster', ecoClusterForce)
      .force('centerX', d3.forceX(W/2).strength(.02))
      .force('centerY', d3.forceY(H/2).strength(.02));
  } else {
    sim
      .force('link', d3.forceLink(correlationLinks).id(d => d.id)
        .distance(d => clamp(138 - d.weight * 15, 42, 112))
        .strength(d => clamp(d.weight / 8, .08, .42)))
      .force('charge', d3.forceManyBody().strength(d => -110 - d.r * 7.6))
      .force('collision', d3.forceCollide().radius(d => d.r + 6).strength(.94))
      .force('cluster', corrClusterForce)
      .force('centerX', d3.forceX(W/2).strength(.02))
      .force('centerY', d3.forceY(H/2).strength(.02));
  }
  if(reheat) sim.alpha(.66).restart();
}

function edgePath(d){
  const sx = d.source.x, sy = d.source.y;
  const tx = d.target.x, ty = d.target.y;
  const dx = tx - sx, dy = ty - sy;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const nx = -dy / len, ny = dx / len;
  const key = edgeKey(d);
  const bendBase = ST.mode === 'correlation' ? .16 : .07;
  const bend = Math.min(ST.mode === 'correlation' ? 36 : 18, len * bendBase) * hashSign(key);
  const mx = (sx + tx) / 2 + nx * bend;
  const my = (sy + ty) / 2 + ny * bend;
  return `M${sx},${sy}Q${mx},${my} ${tx},${ty}`;
}

function queryMatch(d,q){
  if(!q) return true;
  return d.id.toLowerCase().includes(q)
    || (d.focus || '').toLowerCase().includes(q)
    || (d.summary || '').toLowerCase().includes(q)
    || (d.subName || '').toLowerCase().includes(q)
    || (d.tags || []).some(t => String(t).toLowerCase().includes(q));
}

function labelOpacityEcosystem(d, isActive, ctx){
  if(ST.selected === d.id) return 1;
  if(ctx.connected.has(d.id)) return .98;
  if(ctx.similar.has(d.id)) return .88;
  if(ST.selected) return 0;
  if(!isActive) return 0;
  if(d.size === 'large') return .98;
  if(d.size === 'mid') return (ST.zoomK > 0.82 || ST.query || ST.layerFilter) ? .9 : .8;
  if(ST.zoomK > 0.82 || ST.query || ST.layerFilter) return .76;
  return .46;
}
function labelOpacityCorrelation(d, isActive, ctx){
  if(ST.selected === d.id) return 1;
  if(ctx.connected.has(d.id)) return 1;
  if(ctx.similar.has(d.id)) return .9;
  if(ST.selected) return .08;
  if(!isActive) return .18;
  return ST.zoomK > .55 ? .98 : .66;
}

        .attr('opacity', 1)
        .attr('stroke', (isSelected || isConnected) ? 'rgba(255,255,255,.9)' : 'rgba(255,255,255,0)')
        .attr('stroke-width', isSelected ? 2 : 0);
      dot.attr('fill', d.sizeColor).attr('opacity', .95);
      labelOut.attr('opacity', labelOpacityEcosystem(d, active, ctx));
      labelIn.attr('opacity', 0);
    } else {
      const ringColor = isSelected ? '#2563eb' : d.accent;
      ring
        .attr('stroke', ringColor)
        .attr('stroke-width', isSelected ? 3 : isConnected ? 2.3 : 1.6)
        .attr('stroke-opacity', isSelected ? .98 : .78)
        .attr('filter', isSelected ? 'url(#selected-glow)' : null);
      body
        .attr('fill', d.communityColor)
        .attr('fill-opacity', isSelected ? .96 : .92)
        .attr('stroke', d.communityColor)
        .attr('stroke-width', isSelected ? 3 : 2)
        .attr('stroke-opacity', 1);
      core
        .attr('opacity', 0)
        .attr('fill-opacity', 0)
        .attr('stroke-width', 0);
      dot.attr('fill', d.sizeColor).attr('opacity', .85);
      labelOut.attr('opacity', 0);
      labelIn.attr('opacity', labelOpacityCorrelation(d, active, ctx));
    }
  });

  linkSel.each(function(d){
    const s = typeof d.source === 'string' ? nodesById.get(d.source) : d.source;
    const t = typeof d.target === 'string' ? nodesById.get(d.target) : d.target;
    const bothActive = (!ST.layerFilter || (s.layer === ST.layerFilter || t.layer === ST.layerFilter))
      && (!ST.query || queryMatch(s, q) || queryMatch(t, q));
    const selectedHit = ST.selected && (s.id === ST.selected || t.id === ST.selected);
    const path = d3.select(this);

    if(ST.mode === 'ecosystem'){
      path
        .attr('stroke', ST.selected ? (selectedHit ? relationColor(d.type) : 'rgba(255,255,255,.1)') : relationColor(d.type))
        .attr('stroke-width', ST.selected ? (selectedHit ? 2.4 : 1) : 1.2)
        .attr('stroke-opacity', ST.selected ? (selectedHit ? .92 : .03) : (bothActive ? .16 : .05))
        .attr('stroke-dasharray', d.type === 'invest' ? (ST.selected && selectedHit ? '6 4' : '4 3') : null)
        .attr('d', edgePath(d));
    } else {
      const sameComm = s.community && t.community && s.community === t.community;
      const baseColor = sameComm ? s.communityColor : getComputedStyle(document.body).getPropertyValue('--corr-edge').trim();
      path
        .attr('stroke', ST.selected ? (selectedHit ? baseColor : getComputedStyle(document.body).getPropertyValue('--corr-edge-muted').trim()) : baseColor)
        .attr('stroke-width', ST.selected ? (selectedHit ? clamp((d.weight || 2) * .55, 1.6, 4.8) : 1) : clamp((d.weight || 2) * .5, .9, 4.3))
        .attr('stroke-opacity', ST.selected ? (selectedHit ? .9 : .06) : (bothActive ? (sameComm ? .52 : .22) : .06))
        .attr('stroke-dasharray', d.explicitType === 'invest' ? '4 4' : null)
        .attr('d', edgePath(d));
    }
  });

  updateSearchFeedback();
  updateLegend();
  updateStatsBar();
}

sim.on('tick', () => {
  const ctx = getSelectionContext();
  linkSel.attr('d', edgePath);
  nodeSel.attr('transform', d => {
    const isSelected = ST.selected === d.id;
    const isConnected = ctx.connected.has(d.id);
    const isSimilar = ctx.similar.has(d.id);
    const scale = isSelected ? 1.12 : isConnected ? 1.06 : isSimilar ? 1.03 : 1;
    return `translate(${d.x},${d.y}) scale(${scale})`;
  });
  if(ST.mode === 'correlation'){
    updateCommunities();
  } else {
    updateSubpills();
  }
});

  .scaleExtent([0.35, 4.5])

svg.call(zoomBehavior);

function fitGraph(duration=700){
  const fitNodes = ST.mode === 'ecosystem' ? getEcoVisibleNodes() : nodes;
  const pts = fitNodes.map(n => ({
    x1:n.x - n.r - (ST.mode === 'ecosystem' ? 12 : 18),
    y1:n.y - n.r - (ST.mode === 'ecosystem' ? 12 : 18),
    x2:n.x + n.r + (ST.mode === 'ecosystem' ? 12 : 18),
    y2:n.y + n.r + (ST.mode === 'ecosystem' ? 12 : 18)
  }));

  if(ST.mode === 'ecosystem'){
    const zoneLayers = hasEcoSubsetFocus()
      ? LAYER_DEFS.filter(layer => getEcoRelevantNodes(layer.id).length > 0)
      : LAYER_DEFS;
    zoneLayers.forEach(layer => {
      const center = getLayerCenter(layer);
      const r = getEcoZoneRadius(layer.id, false) + 6;
      pts.push({
        x1:center.x - r,
        y1:center.y - r,
        x2:center.x + r,
        y2:center.y + r
      });
    });
  }

  const minX = d3.min(pts, d => d.x1);
  const minY = d3.min(pts, d => d.y1);
  const maxX = d3.max(pts, d => d.x2);
  const maxY = d3.max(pts, d => d.y2);
  if(!isFinite(minX) || !isFinite(maxX)) return;
  const width = Math.max(10, maxX - minX);
  const height = Math.max(10, maxY - minY);
  const pad = ST.mode === 'ecosystem' ? 18 : 56;
  const maxScale = ST.mode === 'ecosystem' ? 1.72 : 1.12;
  const scale = Math.min((W - pad*2)/width, (H - pad*2)/height, maxScale);
  const tx = W/2 - scale*(minX + width/2);
  const ty = H/2 - scale*(minY + height/2);
  svg.transition().duration(duration).call(zoomBehavior.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

function updateSearchFeedback(){
  const q = ST.query.trim().toLowerCase();
  const clearBtn = document.getElementById('search-clear');
  const countEl = document.getElementById('search-count');
  const emptyEl = document.getElementById('search-empty');

  if(!q){
    countEl.textContent = '';
    clearBtn.classList.remove('visible');
    emptyEl.classList.remove('visible');
    return;
  }
  clearBtn.classList.add('visible');
  const matched = nodes.filter(d => {
    const layerMatch = !ST.layerFilter || d.layer === ST.layerFilter;
    return layerMatch && queryMatch(d, q);
  });
  countEl.textContent = `${matched.length}건`;
  emptyEl.classList.toggle('visible', matched.length === 0);
}

      <div class="legend-item"><div class="legend-line" style="background:${REL_COL.group}"></div>그룹 계열</div>

      <div class="legend-item"><div class="legend-line" style="background:var(--corr-edge)"></div>상관 링크</div>
      <div class="legend-item"><div class="legend-line" style="background:none;border-top:2px dashed ${REL_COL.invest}"></div>명시 투자 링크</div>
      <div class="legend-item"><div class="legend-swatch" style="background:${SIZE_DEFS.mid.color}"></div>점 크기 = 연결 중심성</div>
      <div class="legend-item"><div class="legend-line" style="background:${layerMap.service.accent}"></div>외곽선 = 원래 레이어</div>
      <div class="legend-item" style="line-height:1.5;color:var(--text-muted)">임계값 ${ST.threshold.toFixed(1)} 이상만 남기고, 노드별 상위 연결을 보존합니다.</div>
    `;

function updateStatsBar(){
  const activeLayer = ST.layerFilter ? layerMap[ST.layerFilter]?.name || ST.layerFilter : '전체';
  const modeVal = ST.mode === 'ecosystem' ? '배치' : '상관';
  const extraVal = ST.mode === 'ecosystem' ? relationLinks.length : correlationLinks.length;
  const extraLabel = ST.mode === 'ecosystem' ? '직접 관계' : '상관 링크';
  document.getElementById('stats-bar').innerHTML = [
    {val:nodes.length, lbl:'총 기업'},
    ...LAYER_DEFS.map(l => ({val:layerCounts.get(l.id) || 0, lbl:l.name, col:l.accent})),
    {val:extraVal, lbl:extraLabel},
    {val:modeVal, lbl:'현재 모드'},
    {val:activeLayer, lbl:'레이어 필터'}
  ].map(s => `<div class="stat-item"><div class="stat-val"${s.col ? ` style="color:${s.col}"` : ''}>${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');
}

function updateDetail(){
  const panel = document.getElementById('detail-panel');
  if(!ST.selected || !nodesById.has(ST.selected)){
    panel.classList.remove('visible');
    return;
  }
  const d = nodesById.get(ST.selected);
  document.getElementById('d-layer').textContent = d.layerName;
  document.getElementById('d-layer').style.color = d.accent;
  document.getElementById('d-name').textContent = d.id;
  document.getElementById('d-subcat').textContent = d.subName;
  document.getElementById('d-focus').textContent = d.focus || '';
  document.getElementById('d-size').textContent = d.sizeName;
  document.getElementById('d-size').style.color = d.sizeColor;
  document.getElementById('d-size').style.borderColor = d.sizeColor;
  document.getElementById('d-size').style.background = `${d.sizeColor}1A`;
  document.getElementById('d-summary').textContent = d.summary || '';

  const homepageBtn = document.getElementById('d-homepage');
  const homepageUrlEl = document.getElementById('d-homepage-url');
  const homepageUrl = getHomepageUrl(d.id);
  if(homepageUrl){
    homepageBtn.href = homepageUrl;
    homepageBtn.textContent = '공식 홈페이지 열기 ↗';
    homepageBtn.classList.remove('disabled');
    homepageBtn.removeAttribute('aria-disabled');
    homepageBtn.setAttribute('aria-label', `${d.id} 공식 홈페이지 열기`);
    homepageUrlEl.href = homepageUrl;
    homepageUrlEl.textContent = getHomepageLabel(homepageUrl);
    homepageUrlEl.style.display = 'inline-flex';
  } else {
    homepageBtn.removeAttribute('href');
    homepageBtn.textContent = '홈페이지 정보 없음';
    homepageBtn.classList.add('disabled');
    homepageBtn.setAttribute('aria-disabled', 'true');
    homepageUrlEl.removeAttribute('href');
    homepageUrlEl.textContent = '';
    homepageUrlEl.style.display = 'none';
  }

  if(ST.mode === 'ecosystem'){
    const directCount = (relationAdjacency.get(d.id) || []).length;
    document.getElementById('d-extra').textContent = `직접 관계 ${directCount}건`;
    document.getElementById('d-related-title').textContent = '직접 관계·유사 플레이어';
  } else {
    const groupSize = nodes.filter(n => n.community === d.community).length;
    document.getElementById('d-extra').textContent = `군집 ${d.community} · ${groupSize}개`;
    document.getElementById('d-related-title').textContent = '강한 상관·같은 군집';
  }

  const tags = document.getElementById('d-tags');
  tags.innerHTML = (d.tags || []).map(t => `<span class="detail-tag" data-tag="${t}">${t}</span>`).join('');
  tags.querySelectorAll('.detail-tag').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById('search-input').value = el.dataset.tag;
      ST.query = el.dataset.tag;
      ST.selected = null;
      applyVisual();
      updateDetail();
    });
  });

  let html = '';
  if(ST.mode === 'ecosystem'){
    const direct = (relationAdjacency.get(d.id) || [])
      .map(meta => ({...meta, node:nodesById.get(meta.id)}))
      .filter(x => x.node)
      .sort((a,b) => d3.ascending(a.node.id, b.node.id))
      .slice(0, 10);
    const baseTags = new Set(d.tags || []);
    const similar = nodes
      .filter(n => n.id !== d.id && !direct.some(x => x.id === n.id) && (n.sub === d.sub || n.tags.some(t => baseTags.has(t))))
      .slice(0, 10);

    if(direct.length){
      html += `<div class="related-group-label">직접 관계</div>`;
      html += direct.map(item => `
        <div class="related-item" data-id="${item.node.id}">
          <div class="related-dot" style="background:${relationColor(item.type)}"></div>
          <div class="related-main">
            <div class="related-name">${item.node.id}</div>
            <div class="related-sub">${REL_LABELS[item.type] || item.type} · ${item.node.layerName}</div>
          </div>
          <div class="related-score">${item.type}</div>
        </div>
      `).join('');
    }
    if(similar.length){
      html += `<div class="related-group-label">유사 플레이어</div>`;
      html += similar.map(item => `
        <div class="related-item" data-id="${item.id}">
          <div class="related-dot" style="background:${item.accent}"></div>
          <div class="related-main">
            <div class="related-name">${item.id}</div>
            <div class="related-sub">${item.subName} · ${(item.tags || []).slice(0,2).join(', ')}</div>
          </div>
        </div>
      `).join('');
    }
  } else {
    const strong = (corrAdjacency.get(d.id) || [])
      .map(meta => ({...meta, node:nodesById.get(meta.id)}))
      .filter(x => x.node)
      .sort((a,b) => b.weight - a.weight || d3.ascending(a.node.id, b.node.id))
      .slice(0, 10);
    const cluster = nodes
      .filter(n => n.id !== d.id && n.community === d.community && !strong.some(x => x.id === n.id))
      .sort((a,b) => b.weightedDegree - a.weightedDegree || d3.ascending(a.id, b.id))
      .slice(0, 10);

    if(strong.length){
      html += `<div class="related-group-label">강한 상관</div>`;
      html += strong.map(item => `
        <div class="related-item" data-id="${item.node.id}">
          <div class="related-dot" style="background:${item.node.communityColor}"></div>
          <div class="related-main">
            <div class="related-name">${item.node.id}</div>
            <div class="related-sub">${item.reasons.slice(0,2).join(' · ') || item.node.subName}</div>
          </div>
          <div class="related-score">${item.weight.toFixed(1)}</div>
        </div>
      `).join('');
    }
    if(cluster.length){
      html += `<div class="related-group-label">같은 군집</div>`;
      html += cluster.map(item => `
        <div class="related-item" data-id="${item.id}">
          <div class="related-dot" style="background:${item.communityColor}"></div>
          <div class="related-main">
            <div class="related-name">${item.id}</div>
            <div class="related-sub">${item.subName || item.layerName} · 중심성 ${item.weightedDegree.toFixed(1)}</div>
          </div>
        </div>
      `).join('');
    }
  }

  document.getElementById('d-related').innerHTML = html || `<div style="font-size:11px;color:var(--text-faint)">관련 노드가 없습니다</div>`;
  document.querySelectorAll('.related-item[data-id]').forEach(el => {
    el.addEventListener('click', () => {
      ST.selected = el.dataset.id;
      applyVisual();
      updateDetail();
    });
  });

  panel.classList.add('visible');
}

const tooltip = document.getElementById('node-tooltip');
const ttName = document.getElementById('tt-name');
const ttSub = document.getElementById('tt-sub');
const ttTags = document.getElementById('tt-tags');

nodeSel
  .on('click', (ev, d) => {
    ev.stopPropagation();
    ST.selected = ST.selected === d.id ? null : d.id;
    applyVisual();
    updateDetail();
    hideOnboardHint();
  })
  .on('mouseover', (ev, d) => {
    ttName.textContent = d.id;
    const modeLine = ST.mode === 'ecosystem'
      ? `${d.layerName} · ${d.subName} · ${d.sizeName}\n${d.focus}`
      : `${d.layerName} · ${d.subName} · 군집 ${d.community}\n중심성 ${d.weightedDegree.toFixed(1)} · ${d.focus}`;
    ttSub.textContent = modeLine;
    ttTags.innerHTML = (d.tags || []).slice(0,4).map(t => `<span>${t}</span>`).join('');
    tooltip.classList.add('visible');
  })
  .on('mousemove', ev => {
    const pad = 14;
    let x = ev.clientX + pad;
    let y = ev.clientY - 10;
    if(x + 250 > window.innerWidth) x = ev.clientX - 250 - pad;
    if(y + 120 > window.innerHeight) y = window.innerHeight - 126;
    tooltip.style.left = `${x}px`;
    tooltip.style.top = `${y}px`;
  })
  .on('mouseleave', () => tooltip.classList.remove('visible'));

svg.on('click', () => {
  ST.selected = null;
  applyVisual();
  updateDetail();
});

function renderFilters(){
  const row = document.getElementById('filter-row');
  row.innerHTML = `<span class="row-label">레이어</span><button class="f-pill active" data-layer="">전체 <span class="pill-count">${nodes.length}</span></button>` +
    LAYER_DEFS.map(l => `<button class="f-pill" data-layer="${l.id}">${l.name} <span class="pill-count">${layerCounts.get(l.id) || 0}</span></button>`).join('');
  row.querySelectorAll('.f-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      row.querySelectorAll('.f-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      ST.layerFilter = btn.dataset.layer || null;
      configureSimulation(true);
      applyVisual();
    });
  });
}
renderFilters();

function applyTheme(theme){
  ST.theme = theme === 'light' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', ST.theme);
  localStorage.setItem('korea-ai-dual-theme', ST.theme);
  document.querySelectorAll('.theme-pill').forEach(btn => btn.classList.toggle('active', btn.dataset.themeMode === ST.theme));
  drawBgGrid();
  applyVisual();
  updateDetail();
}
document.querySelectorAll('.theme-pill').forEach(btn => {
  btn.addEventListener('click', () => applyTheme(btn.dataset.themeMode));
});

function switchMode(mode){
  ST.mode = mode === 'correlation' ? 'correlation' : 'ecosystem';
  document.body.dataset.mode = ST.mode;
  document.querySelectorAll('.mode-pill').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === ST.mode));
  drawBgGrid();
  configureSimulation(true);
  applyVisual();
  updateDetail();
  setTimeout(() => fitGraph(600), 90);
}
document.querySelectorAll('.mode-pill').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

document.getElementById('corr-threshold').addEventListener('input', e => {
  ST.threshold = +e.target.value;
  document.getElementById('corr-threshold-val').textContent = `${ST.threshold.toFixed(1)}+`;
  buildCorrelationGraph();
  updateTargets();
  updateCommunities();
  if(ST.mode === 'correlation'){
    configureSimulation(true);
  }
  applyVisual();
  updateDetail();
});
document.getElementById('btn-rebuild').addEventListener('click', () => {
  buildCorrelationGraph();
  updateTargets();
  updateCommunities();
  if(ST.mode === 'correlation') configureSimulation(true);
  applyVisual();
  updateDetail();
});

const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', e => {
  ST.query = e.target.value;
  applyVisual();
});
document.getElementById('search-clear').addEventListener('click', () => {
  searchInput.value = '';
  ST.query = '';
  applyVisual();
  searchInput.focus();
});

document.getElementById('close-detail').addEventListener('click', ev => {
  ev.stopPropagation();
  ST.selected = null;
  applyVisual();
  updateDetail();
});

document.getElementById('btn-zi').addEventListener('click', () => svg.transition().duration(240).call(zoomBehavior.scaleBy, 1.28));
document.getElementById('btn-zo').addEventListener('click', () => svg.transition().duration(240).call(zoomBehavior.scaleBy, 0.78));
document.getElementById('btn-fit').addEventListener('click', () => fitGraph(500));

let hintHidden = false;
function hideOnboardHint(){
  if(hintHidden) return;
  hintHidden = true;
  document.getElementById('onboard-hint').classList.add('hidden');
}
setTimeout(hideOnboardHint, 12000);

document.addEventListener('keydown', e => {
  if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k'){
    e.preventDefault();
    searchInput.focus();
    return;
  }
  if(e.key === 'Escape'){
    if(document.activeElement === searchInput){
      searchInput.blur();
      return;
    }
    if(ST.selected){
      ST.selected = null;
      applyVisual();
      updateDetail();
    }
    return;
  }
  if(e.key === '0' && document.activeElement !== searchInput){
    fitGraph(500);
  }
  if(e.key === '1' && document.activeElement !== searchInput){
    switchMode('ecosystem');
  }
  if(e.key === '2' && document.activeElement !== searchInput){
    switchMode('correlation');
  }
});

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    W = window.innerWidth;
    H = window.innerHeight;
    svg.attr('width', W).attr('height', H);
    updateTargets();
    updateCommunities();
    drawBgGrid();
    configureSimulation(true);
    applyVisual();
  }, 140);
});

applyTheme(ST.theme);
drawBgGrid();
configureSimulation(true);
applyVisual();
updateDetail();
setTimeout(() => fitGraph(850), 900);
