
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>대한민국 AI 생태계 맵 · 2025 보드형 UX 개선</title>
<style>
:root {
  --bg: #f4f7fb;
  --surface: rgba(255,255,255,.82);
  --surface-strong: #ffffff;
  --text: #0f172a;
  --text-sub: #475569;
  --text-muted: #7b8aa4;
  --line: #d9e1ee;
  --line-strong: #c6d2e6;
  --shadow: 0 18px 40px rgba(15,23,42,.08);
  --radius-xl: 24px;
  --hero-grad: linear-gradient(135deg, #0f172a 0%, #14213d 42%, #1d4ed8 100%);
  --chip-bg: #eef3fb;
  --chip-text: #334155;
  --card-pad: 16px;
  --container: min(1440px, calc(100vw - 32px));
}
body.dark {
  --bg: #07101d;
  --surface: rgba(15,23,42,.82);
  --surface-strong: #111827;
  --text: #e5eefc;
  --text-sub: #b5c4da;
  --text-muted: #8da0bb;
  --line: #243448;
  --line-strong: #334155;
  --shadow: 0 20px 46px rgba(2,6,23,.38);
  --hero-grad: linear-gradient(135deg, #020617 0%, #172554 42%, #1d4ed8 100%);
  --chip-bg: #132033;
  --chip-text: #d4def1;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
  background:
    radial-gradient(circle at top right, rgba(59,130,246,.12), transparent 28%),
    radial-gradient(circle at left 12%, rgba(139,92,246,.08), transparent 24%),
    var(--bg);
  color: var(--text);
}
button, input, a { font: inherit; }
button { border: 0; background: none; }
.hero {
  margin: 18px auto 14px;
  width: var(--container);
  border-radius: 28px;
  background: var(--hero-grad);
  color: #fff;
  padding: 28px 28px 22px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(15,23,42,.18);
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,.15), transparent 28%),
    radial-gradient(circle at 80% 15%, rgba(255,255,255,.12), transparent 22%),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: auto, auto, 34px 34px;
  pointer-events: none;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.35fr 1fr;
  gap: 22px;
  position: relative;
  z-index: 1;
}
.hero h1 { margin: 0 0 10px; font-size: clamp(26px,4vw,44px); line-height: 1.04; letter-spacing: -1.1px; }
.hero p  { margin: 0; color: rgba(255,255,255,.84); line-height: 1.65; font-size: 15px; }
.hero-note {
  display: inline-flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 7px 12px; border-radius: 999px;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.12); font-size: 12px; color: rgba(255,255,255,.9); backdrop-filter: blur(12px);
}
.hero-note .dot { width: 7px; height: 7px; border-radius: 50%; background: #60a5fa; box-shadow: 0 0 0 5px rgba(96,165,250,.14); }
.hero-right { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; align-content: start; }
.stat-card {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.12); backdrop-filter: blur(14px); border-radius: 18px; padding: 16px 16px 14px;
}
.stat-label { color: rgba(255,255,255,.72); font-size: 12px; margin-bottom: 8px; }
.stat-value { font-weight: 800; font-size: clamp(22px,2.6vw,34px); line-height: 1; }
.stat-sub { margin-top: 8px; color: rgba(255,255,255,.72); font-size: 12px; }

.layer-nav {
  width: var(--container);
  margin: 0 auto 14px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.layer-link {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 999px;
  background: var(--surface); border: 1px solid var(--line);
  color: var(--text-sub); font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 14px rgba(148,163,184,.08);
  text-decoration: none; transition: .15s;
}
.layer-link:hover { background: var(--surface-strong); border-color: #94a3b8; transform: translateY(-1px); }
.layer-link .swatch { width: 10px; height: 10px; border-radius: 50%; }

.toolbar-wrap {
  position: sticky;
  top: 10px;
  z-index: 25;
  width: var(--container);
  margin: 0 auto 14px;
}
.toolbar {
  background: var(--surface);
  backdrop-filter: blur(16px);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  border-radius: 22px;
  padding: 14px;
}
.toolbar-top {
  display: grid;
  grid-template-columns: minmax(0,1fr) auto;
  gap: 12px;
  align-items: center;
}
.toolbar-right {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.searchbox {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface-strong); border: 1px solid var(--line);
  border-radius: 14px; padding: 11px 13px;
}
.searchbox svg { flex: 0 0 auto; color: #64748b; }
.searchbox input { width: 100%; border: 0; outline: 0; background: transparent; color: var(--text); font-size: 14px; }

.toolbar-row {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
}
.left-stack { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.right-stack { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

.pill-group { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; min-width: 0; }
.pill-label { font-size: 11px; color: var(--text-muted); margin-right: 2px; }
.pill {
  border: 1px solid var(--line);
  background: var(--surface-strong);
  color: var(--text-sub);
  padding: 8px 12px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 12px;
  line-height: 1;
  transition: .18s;
  white-space: nowrap;
}
.pill:hover { border-color: #94a3b8; transform: translateY(-1px); }
.pill.active { background: #0f172a; border-color: #0f172a; color: #fff; box-shadow: 0 10px 24px rgba(15,23,42,.16); }
body.dark .pill.active { background: #3b82f6; border-color: #3b82f6; }
.pill.soft.active { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; box-shadow: none; }
body.dark .pill.soft.active { background: rgba(59,130,246,.18); border-color: #3b82f6; color: #bfdbfe; }
.pill.count-pill { display: inline-flex; align-items: center; gap: 6px; }
.count-badge {
  display: inline-flex; min-width: 18px; height: 18px; padding: 0 6px;
  align-items: center; justify-content: center; border-radius: 999px;
  font-size: 10px; font-weight: 700; background: rgba(15,23,42,.08); color: var(--text-muted);
}
body.dark .count-badge { background: rgba(255,255,255,.08); color: #cbd5e1; }

.theme-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: var(--surface-strong);
  color: var(--text-sub);
  cursor: pointer;
  transition: .18s;
}
.theme-toggle-btn:hover { border-color: #94a3b8; transform: translateY(-1px); }
.theme-toggle-btn .toggle-arrow {
  width: 18px; height: 18px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--chip-bg); color: var(--text-muted);
  transition: transform .18s ease;
}
.theme-toggle-btn.expanded .toggle-arrow { transform: rotate(180deg); }

.tag-panel {
  display: none;
  margin-top: 10px;
  border-top: 1px solid var(--line);
  padding-top: 12px;
}
.tag-panel.open { display: block; }
.tag-panel-top {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.tag-search {
  display: flex;
  align-items: center;
  gap: 8px;
  width: min(360px, 100%);
  background: var(--surface-strong);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 9px 11px;
}
.tag-search input {
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--text);
  font-size: 13px;
}
.tag-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  max-height: 280px;
  overflow: auto;
  padding-right: 4px;
}
.tag-cloud::-webkit-scrollbar { width: 8px; }
.tag-cloud::-webkit-scrollbar-thumb { background: rgba(148,163,184,.35); border-radius: 999px; }

.active-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.active-chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  border-radius: 999px;
  background: var(--chip-bg);
  border: 1px solid var(--line);
  color: var(--text-sub);
  font-size: 11px;
}
.active-chip button {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: rgba(15,23,42,.08);
  color: var(--text-sub);
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px;
}
body.dark .active-chip button {
  background: rgba(255,255,255,.08);
  color: #e2e8f0;
}

.info-line { display: flex; flex-wrap: wrap; gap: 8px; }
.info-chip {
  padding: 7px 10px;
  border-radius: 999px;
  font-size: 11px;
  color: var(--text-sub);
  background: var(--chip-bg);
  border: 1px solid var(--line);
}
.info-chip strong { color: var(--text); }

.layout {
  width: var(--container);
  margin: 0 auto 36px;
  display: grid;
  grid-template-columns: minmax(0,1fr) 380px;
  gap: 18px;
  align-items: start;
}
.main-col { min-width: 0; }

.layer-section {
  scroll-margin-top: 110px;
  margin-bottom: 18px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.layer-header {
  display: grid;
  grid-template-columns: 8px minmax(0,1fr) auto;
  gap: 16px;
  align-items: center;
  padding: 18px 20px;
  background: linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,.14));
  border-bottom: 1px solid var(--line);
}
body.dark .layer-header { background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)); }
.layer-accent-bar { width: 8px; align-self: stretch; border-radius: 999px; }
.layer-title { display: flex; flex-direction: column; gap: 4px; }
.layer-title h2 { margin: 0; font-size: 22px; letter-spacing: -.5px; }
.layer-title p  { margin: 0; font-size: 13px; color: var(--text-sub); }
.layer-meta { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.meta-pill { padding: 8px 12px; border-radius: 999px; background: var(--surface-strong); border: 1px solid var(--line); font-size: 12px; color: var(--text-sub); }
.layer-body { padding: 18px 20px 20px; }
.subgroup + .subgroup { margin-top: 18px; }
.subgroup-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
.subgroup-title { font-size: 14px; font-weight: 700; color: var(--text-sub); }
.subgroup-count { font-size: 12px; color: var(--text-muted); }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 12px;
}
.entity-card {
  position: relative;
  border-radius: 18px;
  background: linear-gradient(180deg, var(--surface-strong), rgba(255,255,255,.72));
  border: 1px solid var(--line);
  padding: var(--card-pad);
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 162px;
  cursor: pointer;
  transition: .18s ease;
  overflow: hidden;
}
body.dark .entity-card { background: linear-gradient(180deg, #0f172a, #111c2f); }
.entity-card:hover { transform: translateY(-2px); border-color: #94a3b8; box-shadow: 0 16px 36px rgba(15,23,42,.10); }
.entity-card.selected { border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,.10), 0 16px 36px rgba(29,78,216,.12); }
.entity-card.related  { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.08); }
.entity-card.dim      { opacity: .38; }
.entity-card::before  { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--accent, #94a3b8); }

.card-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: start;

  align-items: flex-start;
}
.card-name-wrap { min-width: 0; }
.card-name {
  margin: 0;
  font-size: 16px;
  line-height: 1.18;
  letter-spacing: -.3px;
}
.card-sub {
  margin-top: 4px;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.type-badge {
  flex: 0 0 auto;
  font-size: 9px;
  padding: 5px 8px;
  border-radius: 999px;
  border: 1px solid transparent;
  line-height: 1;

  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  min-width: 74px;
  padding: 5px 10px;
  letter-spacing: -0.2px;
}
.type-large   { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
.type-mid     { background: #dcfce7; border-color: #86efac; color: #166534; }
.type-startup { background: #e0f2fe; border-color: #7dd3fc; color: #075985; }

.card-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.kai-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  padding: 4px 7px;
  border-radius: 999px;
  background: #eff6ff;
  border: 1px solid #93c5fd;
  color: #1d4ed8;
  line-height: 1;
}
body.dark .kai-badge { background: rgba(59,130,246,.14); border-color: #3b82f6; color: #bfdbfe; }
.card-focus {
  align-self: flex-start;
  padding: 5px 9px;
  border-radius: 999px;
  background: var(--chip-bg);
  border: 1px solid var(--line);
  font-size: 11px;
  color: var(--text-sub);
}
.card-summary {
  margin: 0;
  font-size: 12px;
  line-height: 1.55;
  color: var(--text-sub);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; }
.tag {
  padding: 5px 8px;
  border-radius: 999px;
  background: var(--chip-bg);
  color: var(--chip-text);
  border: 1px solid var(--line);
  font-size: 10px;
  line-height: 1;
}

.aside {
  position: sticky;
  top: 110px;
  background: var(--surface);
  backdrop-filter: blur(16px);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: var(--shadow);
  min-height: 400px;
  overflow: hidden;
}
.aside-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,.3), rgba(255,255,255,.06));
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
body.dark .aside-head { background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)); }
.aside-head .eyebrow { font-size: 11px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
.detail-clear {
  padding: 7px 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface-strong);
  color: var(--text-sub);
  font-size: 12px;
  cursor: pointer;
}
.detail-clear:disabled { opacity: .45; cursor: default; }
.aside-body { padding: 18px 20px 22px; }
.placeholder { color: var(--text-sub); line-height: 1.7; font-size: 14px; }
.detail-title { margin: 4px 0 6px; font-size: 26px; line-height: 1.06; letter-spacing: -.8px; }
.detail-sub { margin: 0 0 10px; font-size: 13px; color: var(--text-sub); }
.detail-grid { display: grid; gap: 12px; }
.detail-box { padding: 14px; border-radius: 16px; background: rgba(255,255,255,.28); border: 1px solid var(--line); }
body.dark .detail-box { background: rgba(255,255,255,.03); }
.detail-box h4 { margin: 0 0 10px; font-size: 13px; color: var(--text); }
.detail-box p  { margin: 0; font-size: 14px; line-height: 1.65; color: var(--text-sub); }
.small-list { display: grid; gap: 8px; }
.small-item { display: flex; flex-direction: column; gap: 4px; padding: 10px 11px; border-radius: 14px; border: 1px solid var(--line); background: var(--surface-strong); }
.small-item-top { display: flex; justify-content: space-between; gap: 8px; }
.small-name { font-weight: 700; font-size: 14px; }
.small-meta { font-size: 11px; color: var(--text-muted); }
.shared-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.shared-tags span { font-size: 10px; padding: 5px 7px; border-radius: 999px; background: #f5f3ff; border: 1px solid #ddd6fe; color: #6d28d9; }

.homepage-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  margin-top: 4px;
  padding: 10px 16px;
  border-radius: 10px;
  background: var(--text);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: .16s ease;
  width: 100%;
  justify-content: center;
  letter-spacing: -.2px;
}
body.dark .homepage-btn { background: #2563eb; }

.footer {
  width: var(--container);
  margin: 0 auto 28px;
  padding: 18px 20px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 20px;
  color: var(--text-sub);
  line-height: 1.7;
  font-size: 13px;
}
.muted { color: var(--text-muted); }

@media (max-width: 1120px) {
  .layout { grid-template-columns: 1fr; }
  .aside  { position: static; order: -1; }
}
@media (max-width: 760px) {
  :root { --container: calc(100vw - 20px); --card-pad: 13px; }
  .hero { padding: 20px 18px 18px; border-radius: 20px; margin: 12px auto 12px; }
  .hero-grid { grid-template-columns: 1fr; gap: 0; }
  .hero h1   { font-size: 24px; margin-bottom: 8px; }
  .hero p    { font-size: 13px; line-height: 1.6; }
  .hero-right { display: none; }
  .hero-note  { font-size: 11px; padding: 5px 10px; margin-bottom: 10px; }
  .layer-nav { flex-wrap: nowrap; overflow-x: auto; scrollbar-width:none; padding-bottom:4px; margin-bottom:10px; }
  .layer-link { flex-shrink: 0; padding: 8px 12px; font-size: 12px; }
  .toolbar-wrap { position: static; top: unset; margin-bottom: 10px; }
  .toolbar { border-radius: 16px; padding: 12px; }
  .toolbar-top { grid-template-columns: 1fr; }
  .toolbar-right { justify-content:flex-start; }
  .searchbox { padding: 9px 11px; border-radius: 12px; }
  .layer-header { grid-template-columns: 6px minmax(0,1fr); padding: 14px 16px; gap: 12px; }
  .layer-title h2 { font-size: 18px; }
  .layer-title p { font-size: 12px; }
  .layer-meta { display:none; }
  .layer-body { padding: 14px 14px 16px; }
  .card-grid { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
  .entity-card { border-radius: 14px; min-height: auto; gap: 7px; }
  .card-name { font-size: 13px; }
  .card-sub { display:none; }
  .card-focus { font-size: 10px; padding: 4px 7px; }
  .card-summary { font-size: 11px; -webkit-line-clamp: 4; }
  .tag-row { display:none; }
  .subgroup-title { font-size: 12px; }
  .tag-panel-top { flex-direction: column; align-items: stretch; }
  .tag-search { width: 100%; }
  .aside { min-height:auto; border-radius:18px; }
  .aside-body { padding: 14px 16px 18px; }
  .detail-title { font-size: 20px; }
  .footer { border-radius: 16px; padding: 14px 16px; font-size: 12px; }
}
</style>

<meta name="color-scheme" content="light dark" />
<style id="krds-inline-overrides">

:root {
  --krds-primary: #246beb;
  --krds-primary-weak: rgba(36, 107, 235, 0.1);
  --krds-primary-strong: #0f4fcf;
  --krds-related: #6d28d9;
  --krds-related-weak: rgba(109, 40, 217, 0.08);
  --krds-success: #0f766e;
  --krds-success-weak: rgba(15, 118, 110, 0.08);
  --krds-warning: #b45309;
  --krds-warning-weak: rgba(180, 83, 9, 0.08);
  --krds-danger: #b42318;
  --krds-danger-weak: rgba(180, 35, 24, 0.08);
}

body.krds-refined {
  --bg: #f6f8fb;
  --surface: #ffffff;
  --surface-strong: #ffffff;
  --surface-alt: #f3f6fb;
  --text: #131927;
  --text-sub: #364152;
  --text-muted: #6c7a90;
  --line: #d7deea;
  --line-strong: #b6c2d6;
  --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
  --radius-xl: 20px;
  --container: min(1280px, calc(100vw - 48px));
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard GOV", "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
}

body.krds-refined.dark {
  --bg: #0f1726;
  --surface: #131d2d;
  --surface-strong: #162133;
  --surface-alt: #0f1726;
  --text: #edf2fb;
  --text-sub: #c7d3e6;
  --text-muted: #9aacc7;
  --line: #304157;
  --line-strong: #49607f;
  --shadow: 0 14px 32px rgba(2, 6, 23, 0.34);
}

body.krds-refined {
  background-image: none;
}

body.krds-refined .sr-only {
  position: absolute !important;
  width: 1px !important;
  height: 1px !important;
  padding: 0 !important;
  margin: -1px !important;
  overflow: hidden !important;
  clip: rect(0, 0, 0, 0) !important;
  white-space: nowrap !important;
  border: 0 !important;
}

body.krds-refined .skip-link {
  position: absolute;
  left: 16px;
  top: -48px;
  z-index: 999;
  padding: 10px 14px;
  border-radius: 12px;
  background: var(--krds-primary);
  color: #fff;
  text-decoration: none;
  font-weight: 700;
  transition: top 0.15s ease;
}

body.krds-refined .skip-link:focus {
  top: 12px;
}

body.krds-refined .hero {
  width: 100%;
  margin: 0;
  padding: 0;
  border-radius: 0;
  background: var(--surface-strong);
  color: var(--text);
  box-shadow: none;
  border-bottom: 1px solid var(--line);
}

body.krds-refined .hero::before {
  display: none;
}

body.krds-refined .hero-grid {
  width: var(--container);
  margin: 0 auto;
  padding: 28px 0 24px;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 20px;
}

body.krds-refined .hero-note {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: 999px;
  background: var(--surface-alt);
  border: 1px solid var(--line);
  color: var(--text-sub);
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 12px;
  backdrop-filter: none;
}

body.krds-refined .hero-note .dot {
  width: 8px;
  height: 8px;
  background: var(--krds-primary);
  box-shadow: none;
}

body.krds-refined .hero h1 {
  margin: 0 0 10px;
  font-size: clamp(2rem, 4vw, 2.75rem);
  line-height: 1.18;
  letter-spacing: -0.03em;
  color: var(--text);
}

body.krds-refined .hero p {
  margin: 0;
  max-width: 72ch;
  color: var(--text-sub);
  font-size: 15px;
  line-height: 1.7;
}

body.krds-refined .hero p + p {
  margin-top: 8px;
}

body.krds-refined .hero-right {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

body.krds-refined .stat-card {
  background: var(--surface-strong);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
  backdrop-filter: none;
}

body.krds-refined .stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
}

body.krds-refined .stat-value {
  color: var(--text);
  font-size: clamp(1.5rem, 2.5vw, 2rem);
  font-weight: 800;
}

body.krds-refined .stat-sub {
  margin-top: 8px;
  color: var(--text-sub);
  font-size: 12px;
}

body.krds-refined .krds-note {
  width: var(--container);
  margin: 16px auto 0;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text-sub);
  font-size: 14px;
  line-height: 1.65;
}

body.krds-refined .toolbar-wrap {
  top: 12px;
  margin: 16px auto 0;
}

body.krds-refined .toolbar {
  background: var(--surface);
  backdrop-filter: none;
  border: 1px solid var(--line);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 20px;
}

body.krds-refined .toolbar-top {
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
}

body.krds-refined .searchbox,
body.krds-refined .tag-search {
  min-height: 48px;
  border-radius: 12px;
  border: 1px solid var(--line-strong);
  background: var(--surface-strong);
  padding: 0 14px;
}

body.krds-refined .searchbox input,
body.krds-refined .tag-search input {
  font-size: 15px;
}

body.krds-refined .searchbox svg,
body.krds-refined .tag-search svg {
  color: var(--text-muted);
}

body.krds-refined .toolbar-row {
  margin-top: 16px;
  gap: 12px;
}

body.krds-refined .left-stack,
body.krds-refined .right-stack,
body.krds-refined .toolbar-right {
  gap: 12px;
}

body.krds-refined .pill-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-sub);
  margin-right: 6px;
}

body.krds-refined .pill,
body.krds-refined .theme-toggle-btn,
body.krds-refined .detail-clear {
  min-height: 38px;
  padding: 0 14px;
  border-radius: 999px;
  border: 1px solid var(--line-strong);
  background: var(--surface-strong);
  color: var(--text-sub);
  box-shadow: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

body.krds-refined .pill {
  cursor: pointer;
  transition: border-color 0.16s ease, background-color 0.16s ease, transform 0.16s ease;
}

body.krds-refined .pill:hover,
body.krds-refined .theme-toggle-btn:hover,
body.krds-refined .detail-clear:hover:not(:disabled) {
  transform: translateY(-1px);
  border-color: var(--krds-primary);
}

body.krds-refined .pill.active,
body.krds-refined .pill.soft.active {
  background: var(--krds-primary-weak);
  color: var(--krds-primary-strong);
  border-color: rgba(36, 107, 235, 0.45);
}

body.krds-refined.dark .pill.active,
body.krds-refined.dark .pill.soft.active {
  background: rgba(127, 177, 255, 0.14);
  border-color: rgba(127, 177, 255, 0.38);
  color: #dbeafe;
}

body.krds-refined .count-badge {
  background: var(--surface-alt);
  color: var(--text-sub);
  min-width: 20px;
  height: 20px;
}

body.krds-refined.dark .count-badge {
  background: rgba(255, 255, 255, 0.06);
  color: var(--text-sub);
}

body.krds-refined .theme-toggle-btn {
  border-radius: 12px;
}

body.krds-refined .theme-toggle-btn .toggle-arrow {
  background: var(--surface-alt);
}

body.krds-refined .tag-panel {
  border-top: 1px solid var(--line);
  padding-top: 16px;
  margin-top: 16px;
}

body.krds-refined .tag-panel-top {
  margin-bottom: 12px;
}

body.krds-refined .tag-cloud {
  max-height: 260px;
}

body.krds-refined .tag-cloud::-webkit-scrollbar-thumb {
  background: rgba(108, 122, 144, 0.35);
}

body.krds-refined .active-chip {
  background: var(--surface-alt);
  border: 1px solid var(--line);
  font-size: 12px;
}

body.krds-refined .active-chip button {
  width: 18px;
  height: 18px;
  background: transparent;
  border: 1px solid var(--line);
}

body.krds-refined .info-line {
  gap: 10px;
}

body.krds-refined .info-chip {
  padding: 8px 12px;
  font-size: 12px;
  background: var(--surface-alt);
  border: 1px solid var(--line);
}

body.krds-refined .layer-nav {
  display: none;
}

body.krds-refined .layout {
  width: var(--container);
  margin: 24px auto 40px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 344px;
  gap: 24px;
  align-items: start;
}

body.krds-refined .layer-section {
  margin-bottom: 18px;
  border-radius: 20px;
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  overflow: hidden;
}

body.krds-refined .layer-header {
  grid-template-columns: 10px minmax(0, 1fr) auto;
  gap: 16px;
  padding: 20px;
  background: var(--surface-alt);
  border-bottom: 1px solid var(--line);
}

body.krds-refined .layer-accent-bar {
  width: 10px;
}

body.krds-refined .layer-title h2 {
  margin: 0;
  font-size: clamp(1.45rem, 2.5vw, 1.9rem);
  letter-spacing: -0.03em;
}

body.krds-refined .layer-title p {
  font-size: 14px;
  line-height: 1.65;
  color: var(--text-sub);
}

body.krds-refined .meta-pill {
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface-strong);
  color: var(--text-sub);
}

body.krds-refined .layer-body {
  padding: 0 20px 20px;
}

body.krds-refined .subgroup {
  padding-top: 20px;
}

body.krds-refined .subgroup + .subgroup {
  margin-top: 0;
  border-top: 1px solid var(--line);
}

body.krds-refined .subgroup-head {
  margin-bottom: 12px;
}

body.krds-refined .subgroup-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
}

body.krds-refined .subgroup-count {
  font-size: 12px;
  color: var(--text-muted);
}

body.krds-refined .card-grid {
  grid-template-columns: repeat(auto-fill, minmax(242px, 1fr));
  gap: 12px;
}

body.krds-refined .entity-card {
  min-height: 184px;
  border-radius: 16px;
  background: var(--surface-strong);
  border: 1px solid var(--line);
  padding: 16px;
  box-shadow: none;
  transition: border-color 0.16s ease, transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
}

body.krds-refined .entity-card::before {
  height: 6px;
}

body.krds-refined .entity-card:hover {
  transform: translateY(-1px);
  border-color: var(--line-strong);
  box-shadow: none;
}

body.krds-refined .entity-card.selected {
  border-color: rgba(36, 107, 235, 0.55);
  box-shadow: 0 0 0 3px var(--krds-primary-weak);
}

body.krds-refined .entity-card.related {
  border-color: rgba(109, 40, 217, 0.35);
  box-shadow: 0 0 0 2px var(--krds-related-weak);
}

body.krds-refined .entity-card.dim {
  opacity: 0.42;
}

body.krds-refined .entity-card:focus-visible,
body.krds-refined .pill:focus-visible,
body.krds-refined .theme-toggle-btn:focus-visible,
body.krds-refined .detail-clear:focus-visible,
body.krds-refined .searchbox input:focus-visible,
body.krds-refined .tag-search input:focus-visible,
body.krds-refined .homepage-btn:focus-visible,
body.krds-refined .rail-link:focus-visible,
body.krds-refined .layer-link:focus-visible {
  outline: 3px solid var(--krds-primary);
  outline-offset: 2px;
}

body.krds-refined.dark .entity-card:focus-visible,
body.krds-refined.dark .pill:focus-visible,
body.krds-refined.dark .theme-toggle-btn:focus-visible,
body.krds-refined.dark .detail-clear:focus-visible,
body.krds-refined.dark .searchbox input:focus-visible,
body.krds-refined.dark .tag-search input:focus-visible,
body.krds-refined.dark .homepage-btn:focus-visible,
body.krds-refined.dark .rail-link:focus-visible,
body.krds-refined.dark .layer-link:focus-visible {
  outline-color: #7fb1ff;
}

body.krds-refined .card-name {
  font-size: 17px;
  letter-spacing: -0.02em;
}

body.krds-refined .card-sub,
body.krds-refined .card-summary {
  color: var(--text-sub);
}

body.krds-refined .type-badge {
  min-width: 84px;
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 700;
}

body.krds-refined .type-large {
  background: rgba(36, 107, 235, 0.08);
  border-color: rgba(36, 107, 235, 0.25);
  color: var(--krds-primary-strong);
}

body.krds-refined .type-mid {
  background: var(--krds-success-weak);
  border-color: rgba(15, 118, 110, 0.25);
  color: var(--krds-success);
}

body.krds-refined .type-startup {
  background: var(--krds-warning-weak);
  border-color: rgba(180, 83, 9, 0.28);
  color: var(--krds-warning);
}

body.krds-refined .card-focus,
body.krds-refined .tag,
body.krds-refined .kai-badge,
body.krds-refined .shared-tags span {
  border-radius: 999px;
  font-size: 11px;
}

body.krds-refined .card-focus,
body.krds-refined .tag {
  background: var(--surface-alt);
  border: 1px solid var(--line);
  color: var(--text-sub);
}

body.krds-refined .kai-badge {
  background: rgba(36, 107, 235, 0.08);
  border: 1px solid rgba(36, 107, 235, 0.22);
  color: var(--krds-primary-strong);
}

body.krds-refined.dark .kai-badge {
  background: rgba(127, 177, 255, 0.12);
  border-color: rgba(127, 177, 255, 0.28);
  color: #dbeafe;
}

body.krds-refined .aside {
  position: sticky;
  top: 120px;
  min-height: auto;
  background: transparent;
  border: none;
  box-shadow: none;
  overflow: visible;
  display: grid;
  gap: 16px;
}

body.krds-refined .selection-panel,
body.krds-refined .outline-panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 20px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

body.krds-refined .aside-head {
  padding: 18px 20px 14px;
  background: var(--surface-alt);
  border-bottom: 1px solid var(--line);
}

body.krds-refined .aside-body {
  padding: 16px 20px 20px;
}

body.krds-refined .eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

body.krds-refined .detail-title {
  font-size: 28px;
  letter-spacing: -0.04em;
}

body.krds-refined .detail-sub {
  font-size: 14px;
  line-height: 1.55;
}

body.krds-refined .detail-box {
  padding: 14px;
  border-radius: 16px;
  background: var(--surface-alt);
  border: 1px solid var(--line);
}

body.krds-refined .detail-box h4 {
  font-size: 13px;
  margin-bottom: 8px;
}

body.krds-refined .detail-box p {
  font-size: 14px;
  line-height: 1.7;
}

body.krds-refined .small-item {
  background: var(--surface-strong);
  border: 1px solid var(--line);
}

body.krds-refined .small-name {
  font-size: 14px;
}

body.krds-refined .shared-tags span {
  background: rgba(109, 40, 217, 0.08);
  border: 1px solid rgba(109, 40, 217, 0.15);
  color: #5b21b6;
}

body.krds-refined.dark .shared-tags span {
  background: rgba(167, 139, 250, 0.12);
  border-color: rgba(167, 139, 250, 0.24);
  color: #ddd6fe;
}

body.krds-refined .homepage-btn {
  width: auto;
  justify-content: center;
  border-radius: 12px;
  padding: 0 16px;
  min-height: 42px;
  background: var(--krds-primary);
  color: #fff;
}

body.krds-refined .homepage-btn:hover {
  filter: brightness(0.96);
}

body.krds-refined.dark .homepage-btn {
  background: #2f7bf4;
}

body.krds-refined .outline-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  gap: 6px;
}

body.krds-refined .rail-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  color: var(--text-sub);
  text-decoration: none;
  border: 1px solid transparent;
}

body.krds-refined .rail-link:hover {
  border-color: var(--line);
  background: var(--surface-alt);
}

body.krds-refined .rail-link.active {
  background: var(--krds-primary-weak);
  border-color: rgba(36, 107, 235, 0.26);
  color: var(--krds-primary-strong);
  font-weight: 700;
}

body.krds-refined.dark .rail-link.active {
  background: rgba(127, 177, 255, 0.14);
  border-color: rgba(127, 177, 255, 0.3);
  color: #dbeafe;
}

body.krds-refined .rail-swatch {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex: 0 0 auto;
}

body.krds-refined .rail-meta {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-muted);
}

body.krds-refined .placeholder {
  font-size: 14px;
  line-height: 1.75;
}

body.krds-refined .footer {
  width: var(--container);
  margin: 0 auto 32px;
  padding: 16px 18px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--surface);
  font-size: 13px;
  color: var(--text-sub);
}

body.krds-refined.dark .layer-header,
body.krds-refined.dark .aside-head,
body.krds-refined.dark .stat-card,
body.krds-refined.dark .info-chip,
body.krds-refined.dark .detail-box,
body.krds-refined.dark .active-chip,
body.krds-refined.dark .hero-note,
body.krds-refined.dark .rail-link:hover,
body.krds-refined.dark .card-focus,
body.krds-refined.dark .tag,
body.krds-refined.dark .info-chip,
body.krds-refined.dark .small-item,
body.krds-refined.dark .meta-pill,
body.krds-refined.dark .count-badge,
body.krds-refined.dark .theme-toggle-btn .toggle-arrow {
  background: var(--surface-alt);
}

body.krds-refined.dark .searchbox,
body.krds-refined.dark .tag-search,
body.krds-refined.dark .toolbar,
body.krds-refined.dark .selection-panel,
body.krds-refined.dark .outline-panel,
body.krds-refined.dark .layer-section,
body.krds-refined.dark .footer,
body.krds-refined.dark .hero,
body.krds-refined.dark .krds-note,
body.krds-refined.dark .entity-card,
body.krds-refined.dark .stat-card,
body.krds-refined.dark .meta-pill,
body.krds-refined.dark .pill,
body.krds-refined.dark .theme-toggle-btn,
body.krds-refined.dark .detail-clear {
  background: var(--surface);
}

body.krds-refined.dark .layer-title p,
body.krds-refined.dark .card-sub,
body.krds-refined.dark .card-summary,
body.krds-refined.dark .detail-sub,
body.krds-refined.dark .placeholder,
body.krds-refined.dark .footer,
body.krds-refined.dark .info-chip,
body.krds-refined.dark .hero p,
body.krds-refined.dark .stat-sub {
  color: var(--text-sub);
}

body.krds-refined.dark .type-large {
  background: rgba(127, 177, 255, 0.12);
  border-color: rgba(127, 177, 255, 0.3);
  color: #dbeafe;
}

body.krds-refined.dark .type-mid {
  background: rgba(94, 234, 212, 0.12);
  border-color: rgba(94, 234, 212, 0.24);
  color: #99f6e4;
}

body.krds-refined.dark .type-startup {
  background: rgba(251, 191, 36, 0.12);
  border-color: rgba(251, 191, 36, 0.22);
  color: #fcd34d;
}

@media (max-width: 1120px) {
  body.krds-refined .hero-right {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  body.krds-refined .layout {
    grid-template-columns: 1fr;
  }

  body.krds-refined .aside {
    position: static;
    top: auto;
    order: -1;
  }
}

@media (max-width: 760px) {
  body.krds-refined {
    --container: calc(100vw - 24px);
  }

  body.krds-refined .hero-grid {
    padding: 20px 0 18px;
  }

  body.krds-refined .hero h1 {
    font-size: 1.8rem;
  }

  body.krds-refined .hero-right {
    grid-template-columns: 1fr;
  }

  body.krds-refined .toolbar-wrap {
    position: static;
  }

  body.krds-refined .toolbar {
    padding: 16px;
    border-radius: 16px;
  }

  body.krds-refined .toolbar-top,
  body.krds-refined .tag-panel-top {
    grid-template-columns: 1fr;
    display: grid;
  }

  body.krds-refined .toolbar-right {
    justify-content: flex-start;
  }

  body.krds-refined .layer-nav {
    width: var(--container);
    margin: 12px auto 0;
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  body.krds-refined .layer-link {
    flex: 0 0 auto;
    padding: 10px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
    box-shadow: none;
  }

  body.krds-refined .layout {
    margin-top: 16px;
    gap: 16px;
  }

  body.krds-refined .card-grid {
    grid-template-columns: 1fr;
  }

  body.krds-refined .layer-header {
    grid-template-columns: 8px minmax(0, 1fr);
    padding: 16px;
  }

  body.krds-refined .layer-meta {
    display: none;
  }

  body.krds-refined .layer-body {
    padding: 0 16px 16px;
  }

  body.krds-refined .subgroup {

function applyTheme() {
  document.body.classList.toggle("dark", state.themeMode === "dark");
  localStorage.setItem("korea-ai-board-theme", state.themeMode);
}

function matches(e) {
  const q = state.query.trim().toLowerCase();
  const hay = [e.id, e.summary, e.focus || "", e.layerName, e.subName || "", ...(e.tags || [])].join(" ").toLowerCase();
  return (!q || hay.includes(q))
    && (state.size === "all" || e.size === state.size)
    && (state.tag === "all" || (e.tags || []).includes(state.tag))
    && (!state.kaiOnly || e.k_ai);
}

function countLayerEntities(layerId) {
  return ENTITIES.filter(e => e.layer === layerId).length;
}

function relatedEntities(id) {
  const base = ENTITIES.find(e => e.id === id);
  if (!base) return [];
  const baseTags = new Set(base.tags || []);
  return ENTITIES
    .filter(e => e.id !== id)
    .map(e => {
      const shared = (e.tags || []).filter(t => baseTags.has(t));
      const score = shared.length * 10 + (e.layer === base.layer ? 3 : 0) + (e.sub === base.sub ? 4 : 0);
      return { ...e, shared, score };
    })
    .filter(e => e.score > 0)
    .sort((a,b) => b.score - a.score || a.id.localeCompare(b.id, "ko"))
    .slice(0, 10);
}

  const totalCount = document.getElementById("tagTotalCount");
  const meta = document.getElementById("tagFilterMeta");
  const label = document.getElementById("tagToggleLabel");

  totalCount.textContent = TAGS.length;
  label.textContent = state.tag === "all" ? "전체 테마 보기" : `선택 테마: ${state.tag}`;
  toggleBtn.classList.toggle("expanded", state.tagPanelOpen);
  toggleBtn.setAttribute("aria-expanded", state.tagPanelOpen ? "true" : "false");
  panel.classList.toggle("open", state.tagPanelOpen);

  const filteredTags = TAGS.filter(tag => !state.tagQuery || tag.toLowerCase().includes(state.tagQuery.toLowerCase()));
  meta.textContent = `${filteredTags.length}개 테마 표시`;

  document.getElementById("tagFilters").innerHTML =
    filteredTags.map(tag => tagPill(tag, true)).join("") ||
    `<div class="muted">조건에 맞는 테마가 없습니다.</div>`;

  document.querySelectorAll("#tagFilters [data-tag-key]").forEach(btn => {
    btn.onclick = () => {
      state.tag = btn.dataset.tagKey;
      state.tagPanelOpen = false;
      renderAll();
    };
  });
}

function buildActiveSummary() {
  const items = [];
  if (state.query.trim()) items.push({ key: "query", label: `검색: ${state.query.trim()}` });
  if (state.size !== "all") items.push({ key: "size", label: `규모: ${TYPE_META[state.size].label}` });
  if (state.tag !== "all") items.push({ key: "tag", label: `테마: ${state.tag}` });
  if (state.kaiOnly) items.push({ key: "kai", label: "K-AI만" });

  const box = document.getElementById("activeSummary");
  box.innerHTML = items.map(item => `
    <span class="active-chip">
      <span>${item.label}</span>
      <button type="button" data-clear-key="${item.key}" aria-label="${item.label} 해제">✕</button>
    </span>
  `).join("");

  document.querySelectorAll("[data-clear-key]").forEach(btn => {
    btn.onclick = () => {
      const key = btn.dataset.clearKey;
      if (key === "query") {
        state.query = "";
        document.getElementById("searchInput").value = "";
      }
      if (key === "size") state.size = "all";
      if (key === "tag") state.tag = "all";
      if (key === "kai") state.kaiOnly = false;
      renderAll();
    };
  });
}

function buildLayerNav() {
  document.getElementById("layerNav").innerHTML = LAYER_DEFS.map(layer => `
    <a class="layer-link" href="#layer-${layer.id}">
      <span class="swatch" style="background:${layer.accent}"></span>
      <span>${layer.name}</span>
      <span class="muted">· ${countLayerEntities(layer.id)}</span>
    </a>`).join("");
}

function sizeLabel(size) {
  return TYPE_META[size]?.label || size;
}

function renderCard(entity) {
  const sel = state.selected === entity.id;
  const relNames = state.selected ? relatedEntities(state.selected).map(e => e.id) : [];
  const isRel = state.selected && relNames.includes(entity.id);
  const dim = state.selected && !sel && !isRel;

  return `<article class="entity-card ${sel ? 'selected' : ''} ${isRel ? 'related' : ''} ${dim ? 'dim' : ''}" data-entity-id="${entity.id}" style="--accent:${entity.accent}">
    <div class="card-top">
      <div class="card-name-wrap">
        <h3 class="card-name">${entity.id}</h3>
        <div class="card-sub">${entity.layerName}${entity.subName ? ` · ${entity.subName}` : ''}</div>
      </div>
      <div style="flex:0 0 auto"><span class="type-badge type-${entity.size}">${sizeLabel(entity.size)}</span></div>
    </div>
    <div class="card-meta-row">
      <span class="card-focus">${entity.focus || entity.layerName}</span>
      ${entity.k_ai ? `<span class="kai-badge">K-AI</span>` : ''}
    </div>
    <p class="card-summary">${entity.summary}</p>
    <div class="tag-row">${(entity.tags || []).slice(0, 4).map(t => `<span class="tag">${t}</span>`).join("")}</div>
  </article>`;
}

function groupByLayerAndSub() {
  return LAYER_DEFS.map(layer => {
    const subs = SUBCAT_DEFS[layer.id] || [];
    const grouped = subs.map(sub => {
      const items = ENTITIES.filter(e => e.layer === layer.id && e.sub === sub.id && matches(e));
      return { name: sub.name, items };
    }).filter(s => s.items.length > 0);
    return { layer, grouped };
  });
}

function renderMain() {
  const main = document.getElementById("mainCol");
  const groups = groupByLayerAndSub();
  let html = "";

  groups.forEach(({layer, grouped}) => {
    const visibleCount = grouped.reduce((n, g) => n + g.items.length, 0);
    if (!visibleCount) return;

    let bodyHtml = "";
    grouped.forEach(g => {
      bodyHtml += `<div class="subgroup">
        <div class="subgroup-head">
          <div class="subgroup-title">${g.name}</div>
          <div class="subgroup-count">${g.items.length}개</div>
        </div>
        <div class="card-grid">${g.items.map(renderCard).join("")}</div>
      </div>`;
    });

    html += `<section class="layer-section" id="layer-${layer.id}">
      <div class="layer-header">
        <div class="layer-accent-bar" style="background:${layer.accent}"></div>
        <div class="layer-title"><h2>${layer.name}</h2><p>${LAYER_DESCS[layer.id] || ''}</p></div>
        <div class="layer-meta">
          <span class="meta-pill">표시 ${visibleCount}개</span>
          <span class="meta-pill">전체 ${countLayerEntities(layer.id)}개</span>
        </div>
      </div>
      <div class="layer-body">${bodyHtml}</div>
    </section>`;
  });

  main.innerHTML = html || `<section class="layer-section"><div class="layer-body"><div class="placeholder">조건에 맞는 기업이 없습니다.</div></div></section>`;

  main.querySelectorAll("[data-entity-id]").forEach(card => {
    card.onclick = () => {
      const id = card.dataset.entityId;
      state.selected = state.selected === id ? null : id;
      renderAll(false);
    };
  });

  const vc = document.getElementById("visibleCount");
  if (vc) vc.textContent = ENTITIES.filter(matches).length;
}

function renderDetail() {
  const panel = document.getElementById("detailPanel");
  const clearBtn = document.getElementById("clearSelectionBtn");
  clearBtn.disabled = !state.selected;

  if (!state.selected) {
    panel.innerHTML = `<div class="placeholder">카드를 선택하면 상세 정보와 <strong>같은 세부군 또는 태그 기반 유사 플레이어</strong>가 나온다.<br/><span class="muted">현재 선택은 Esc 키 또는 ‘선택 해제’ 버튼으로 바로 닫을 수 있다.</span></div>`;
    return;
  }

  const e = ENTITIES.find(x => x.id === state.selected);
  const related = relatedEntities(state.selected);
  const homepageBtn = e.homepage ? `<a class="homepage-btn" href="${e.homepage}" target="_blank" rel="noopener noreferrer">홈페이지 바로가기</a>` : '';

  panel.innerHTML = `<div class="detail-grid">
    <div>
      <span class="type-badge type-${e.size}" style="display:inline-flex;margin-bottom:8px;flex:0 0 auto">${sizeLabel(e.size)}</span>
      ${e.k_ai ? `<span class="kai-badge">K-AI</span>` : ''}
      <h3 class="detail-title">${e.id}</h3>
      <p class="detail-sub">${e.layerName}${e.subName ? ` · ${e.subName}` : ''}${e.focus ? ` · ${e.focus}` : ''}</p>
    </div>
    ${homepageBtn}
    <div class="detail-box"><h4>설명</h4><p>${e.summary}</p></div>
    <div class="detail-box"><h4>태그</h4><div class="tag-row">${(e.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}</div></div>
    <div class="detail-box">
      <h4>유사 플레이어</h4>
      <div class="small-list">
        ${related.length ? related.map(r => `<div class="small-item">
          <div class="small-item-top"><div class="small-name">${r.id}</div><div class="small-meta">${r.layerName}</div></div>
          <div class="shared-tags">${r.shared.map(t => `<span>${t}</span>`).join("")}</div>
        </div>`).join("") : `<div class="muted">겹치는 태그 기반 연결이 없습니다.</div>`}
      </div>
    </div>
  </div>`;
}

document.getElementById("searchInput").addEventListener("input", e => {
  state.query = e.target.value;
  renderAll(false);
});

document.getElementById("tagSearchInput").addEventListener("input", e => {
  state.tagQuery = e.target.value;
  buildTagPanel();
});

document.getElementById("tagToggleBtn").addEventListener("click", () => {
  state.tagPanelOpen = !state.tagPanelOpen;
  buildTagPanel();
});

document.getElementById("kaiBtn").addEventListener("click", () => {
  state.kaiOnly = !state.kaiOnly;
  renderAll(false);
});

document.getElementById("resetBtn").addEventListener("click", () => {
  state.query = "";
  state.size = "all";
  state.tag = "all";
  state.selected = null;
  state.kaiOnly = false;
  state.tagQuery = "";
  state.tagPanelOpen = false;
  document.getElementById("searchInput").value = "";
  document.getElementById("tagSearchInput").value = "";
  renderAll();
});

document.getElementById("clearSelectionBtn").addEventListener("click", () => {
  if (!state.selected) return;
  state.selected = null;
  renderAll(false);
});

document.addEventListener("keydown", (e) => {
  const activeTag = document.activeElement && document.activeElement.tagName;
  if (e.key === "Escape") {
    if (state.tagPanelOpen) {
      state.tagPanelOpen = false;
      buildTagPanel();
      return;
    }
    if (state.selected) {
      state.selected = null;
      renderAll(false);
    }
  }
  if (e.key === "/" && activeTag !== "INPUT" && activeTag !== "TEXTAREA") {
    e.preventDefault();
    document.getElementById("searchInput").focus();
  }
});

</script>

<script id="krds-inline-patch">

(function () {
  if (typeof window === "undefined") return;
  if (typeof LAYER_DEFS === "undefined" || typeof ENTITIES === "undefined" || typeof state === "undefined") return;

  const sharedState = state;
  const LAYERS = LAYER_DEFS;
  const ENT_LIST = ENTITIES;
  const TYPE_MAP = TYPE_META;
  const ALL_TAGS = TAGS;
  const QUICK_TAG_LIST = QUICK_TAGS;
  const LAYER_DESC_MAP = LAYER_DESCS;
  const SUBCAT_MAP = SUBCAT_DEFS;
  const matchEntity = matches;
  const findRelatedEntities = relatedEntities;
  const countLayerItems = countLayerEntities;
  const TAG_COUNT_MAP = typeof TAG_COUNTS !== "undefined" ? TAG_COUNTS : {};

  let sectionObserver = null;

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function sizeLabel(size) {
    return TYPE_MAP[size]?.label || size;
  }

  function visibleEntities() {
    return ENT_LIST.filter(matchEntity);
  }

  function visibleGroups() {
    return LAYERS.map((layer) => {
      const grouped = (SUBCAT_MAP[layer.id] || [])
        .map((sub) => ({
          name: sub.name,
          items: ENT_LIST.filter((e) => e.layer === layer.id && e.sub === sub.id && matchEntity(e)),
        }))
        .filter((group) => group.items.length > 0);

      return {
        layer,
        grouped,
        visibleCount: grouped.reduce((sum, group) => sum + group.items.length, 0),
      };
    }).filter((group) => group.visibleCount > 0);
  }

    const tagSearchInput = document.getElementById("tagSearchInput");
    if (tagSearchInput) {
      tagSearchInput.setAttribute("aria-label", "테마 이름 검색");

    const hero = document.querySelector(".hero");
    if (hero) {

      if (note && !note.dataset.krdsLabel) {
        note.dataset.krdsLabel = "true";
        note.innerHTML = '<span class="dot"></span>정책 참고용 프로토타입';
      }

      const left = hero.querySelector(".hero-grid > div");
      if (left) {
        const heading = left.querySelector("h1");
        const firstParagraph = left.querySelector("p");

        if (heading && !left.querySelector(".krds-hero-desc")) {
          const desc = document.createElement("p");
          desc.className = "krds-hero-desc";
          desc.textContent =
            "서비스·모델·데이터·클라우드·반도체 관점에서 대한민국 AI 생태계 플레이어를 탐색하는 인터랙티브 보드입니다.";
          heading.insertAdjacentElement("afterend", desc);
        }

        if (firstParagraph) {
          firstParagraph.classList.add("krds-hero-contact");
          if (firstParagraph.textContent.includes("@") && !firstParagraph.textContent.trim().startsWith("문의:")) {
            firstParagraph.textContent = `문의: ${firstParagraph.textContent.trim()}`;
          }
        }
      }
    }

    if (!document.querySelector(".krds-note")) {
      const noteBox = document.createElement("section");
      noteBox.className = "krds-note";
      noteBox.innerHTML =
        "<strong>탐색 방식</strong> 검색, 규모, 주요 테마, K-AI 필터를 조합해 보세요. 카드를 선택하면 오른쪽 패널에 세부 정보와 유사 플레이어가 표시됩니다.";
      const toolbarWrap = document.querySelector(".toolbar-wrap");
      if (toolbarWrap) toolbarWrap.insertAdjacentElement("beforebegin", noteBox);
    }

    const aside = document.querySelector(".aside");
    if (aside && !aside.dataset.krdsReady) {
      const head = aside.querySelector(".aside-head");
      const body = aside.querySelector(".aside-body");

      aside.innerHTML = "";

      const outlinePanel = document.createElement("section");
      outlinePanel.className = "outline-panel";
      outlinePanel.innerHTML = `
        <div class="aside-head">
          <div class="eyebrow">in-page navigation</div>
        </div>
        <div class="aside-body">
          <nav aria-label="이 페이지의 구성">
            <ul id="outlineList" class="outline-list"></ul>
          </nav>
        </div>
      `;

      const selectionPanel = document.createElement("section");
      selectionPanel.className = "selection-panel";
      if (head) selectionPanel.appendChild(head);
      if (body) selectionPanel.appendChild(body);

      aside.appendChild(outlinePanel);
      aside.appendChild(selectionPanel);
      aside.dataset.krdsReady = "true";
    }

    const footer = document.querySelector(".footer");
    if (footer && !footer.dataset.krdsFooter) {
      footer.dataset.krdsFooter = "true";
      footer.textContent =
        "기업데이터: (사)한국인공지능협회 2024 기업편람, 과기정통부/NIPA 국내 대표 AI 기업·서비스 사례집 등 참고";
    }
  }

  window.applyTheme = function applyThemeKrds() {
    document.body.classList.toggle("dark", sharedState.themeMode === "dark");
    localStorage.setItem("korea-ai-board-theme", sharedState.themeMode);
  };

  window.buildStats = function buildStatsKrds() {

    const startups = ENT_LIST.filter((e) => e.size === "startup").length;

    const stats = [

      { label: "분류 축", value: layers, sub: "서비스·모델·데이터·클라우드·반도체" },
    ];

    const statsBox = document.getElementById("hero-stats");
    if (statsBox) {
      statsBox.innerHTML = stats
        .map(
          (card) => `
            <div class="stat-card">
              <div class="stat-label">${escapeHtml(card.label)}</div>
              <div class="stat-value">${escapeHtml(card.value)}</div>
              <div class="stat-sub">${escapeHtml(card.sub)}</div>
            </div>
          `
        )
        .join("");
    }

    const infoLine = document.getElementById("infoLine");
    if (infoLine) {
      infoLine.innerHTML = [
        `표시 카드 <strong id="visibleCount">-</strong>`,
        `전체 테마 <strong>${ALL_TAGS.length}</strong>종`,
        `주요 테마 <strong>${QUICK_TAG_LIST.length}</strong>개`,
        `K-AI <strong>${kai}</strong>개`,
      ]
        .map((text) => `<span class="info-chip">${text}</span>`)
        .join("");
    }
  };

  window.buildThemeModeFilters = function buildThemeModeFiltersKrds() {
    const target = document.getElementById("themeModeFilters");
    if (!target) return;

    target.innerHTML = `
      <span class="pill-label">화면 모드</span>
      <button class="pill ${sharedState.themeMode === "light" ? "active" : ""}" data-theme-mode="light">라이트 모드</button>
      <button class="pill ${sharedState.themeMode === "dark" ? "active" : ""}" data-theme-mode="dark">다크 모드</button>
    `;

    target.querySelectorAll("[data-theme-mode]").forEach((button) => {
      button.onclick = () => {
        sharedState.themeMode = button.dataset.themeMode;
        window.applyTheme();
        window.buildThemeModeFilters();
      };
    });
  };

  window.buildSizeFilters = function buildSizeFiltersKrds() {
    const target = document.getElementById("sizeFilters");
    if (!target) return;

    target.innerHTML =
      `<span class="pill-label">규모</span>` +
      Object.entries(TYPE_MAP)
        .map(
          ([key, meta]) =>
            `<button class="pill ${sharedState.size === key ? "active" : ""}" data-size-key="${escapeHtml(key)}">${escapeHtml(
              meta.label
            )}</button>`
        )
        .join("");

    target.querySelectorAll("[data-size-key]").forEach((button) => {
      button.onclick = () => {
        sharedState.size = button.dataset.sizeKey;
        window.renderAll();

  };

  function tagPill(tag, useCount = false) {
    const active = sharedState.tag === tag;
    return `
      <button class="pill soft count-pill ${active ? "active" : ""}" data-tag-key="${escapeHtml(tag)}">
        <span>${escapeHtml(tag)}</span>
        ${useCount ? `<span class="count-badge">${TAG_COUNT_MAP[tag] ?? ""}</span>` : ""}
      </button>
    `;
  }

  window.buildQuickTagFilters = function buildQuickTagFiltersKrds() {
    const target = document.getElementById("quickTagFilters");
    if (!target) return;

    const currentNotQuick =
      sharedState.tag !== "all" && !QUICK_TAG_LIST.includes(sharedState.tag) ? tagPill(sharedState.tag, false) : "";

    target.innerHTML =
      `<span class="pill-label">주요 테마</span>` +
      `<button class="pill soft ${sharedState.tag === "all" ? "active" : ""}" data-tag-key="all">전체</button>` +
      QUICK_TAG_LIST.map((tag) => tagPill(tag, false)).join("") +
      currentNotQuick;

    target.querySelectorAll("[data-tag-key]").forEach((button) => {
      button.onclick = () => {
        sharedState.tag = button.dataset.tagKey;
        window.renderAll();
      };
    });
  };

  window.buildTagPanel = function buildTagPanelKrds() {
    const toggleButton = document.getElementById("tagToggleBtn");
    const panel = document.getElementById("tagPanel");
    const count = document.getElementById("tagTotalCount");
    const label = document.getElementById("tagToggleLabel");
    const meta = document.getElementById("tagFilterMeta");
    const tagFilters = document.getElementById("tagFilters");

    if (!toggleButton || !panel || !count || !label || !meta || !tagFilters) return;

    count.textContent = ALL_TAGS.length;
    label.textContent = sharedState.tag === "all" ? "전체 테마 보기" : `선택 테마: ${sharedState.tag}`;
    toggleButton.classList.toggle("expanded", sharedState.tagPanelOpen);
    toggleButton.setAttribute("aria-expanded", sharedState.tagPanelOpen ? "true" : "false");
    panel.classList.toggle("open", sharedState.tagPanelOpen);

    const filteredTags = ALL_TAGS.filter((tag) =>
      !sharedState.tagQuery ? true : tag.toLowerCase().includes(sharedState.tagQuery.toLowerCase())
    );

    meta.textContent = `${filteredTags.length}개 테마 표시`;

    tagFilters.innerHTML =

    tagFilters.querySelectorAll("[data-tag-key]").forEach((button) => {

      };

  window.buildActiveSummary = function buildActiveSummaryKrds() {

    if (sharedState.query.trim()) items.push({ key: "query", label: `검색: ${sharedState.query.trim()}` });
    if (sharedState.size !== "all") items.push({ key: "size", label: `규모: ${TYPE_MAP[sharedState.size].label}` });
    if (sharedState.tag !== "all") items.push({ key: "tag", label: `테마: ${sharedState.tag}` });
    if (sharedState.kaiOnly) items.push({ key: "kai", label: "K-AI만" });

    const box = document.getElementById("activeSummary");
    if (!box) return;

    box.innerHTML = items
      .map(
        (item) => `
        <span class="active-chip">

        </span>
      `
      )
      .join("");

    box.querySelectorAll("[data-clear-key]").forEach((button) => {
      button.onclick = () => {
        const key = button.dataset.clearKey;
        if (key === "query") {
          sharedState.query = "";
          const input = document.getElementById("searchInput");
          if (input) input.value = "";
        }
        if (key === "size") sharedState.size = "all";
        if (key === "tag") sharedState.tag = "all";
        if (key === "kai") sharedState.kaiOnly = false;
        window.renderAll();
      };
    });
  };

  window.buildLayerNav = function buildLayerNavKrds() {
    const target = document.getElementById("layerNav");
    if (!target) return;

    target.innerHTML = visibleGroups()
      .map(
        ({ layer, visibleCount }) => `
        <a class="layer-link" href="#layer-${escapeHtml(layer.id)}" data-outline-id="${escapeHtml(layer.id)}">
          <span class="swatch" style="background:${escapeHtml(layer.accent)}"></span>
          <span>${escapeHtml(layer.name)}</span>
          <span class="muted">· ${visibleCount}</span>
        </a>
      `
      )
      .join("");
  };

  window.renderCard = function renderCardKrds(entity) {
    const selected = sharedState.selected === entity.id;
    const relatedIds = sharedState.selected ? findRelatedEntities(sharedState.selected).map((item) => item.id) : [];
    const isRelated = sharedState.selected && relatedIds.includes(entity.id);
    const dim = sharedState.selected && !selected && !isRelated;

    return `
      <article
        class="entity-card ${selected ? "selected" : ""} ${isRelated ? "related" : ""} ${dim ? "dim" : ""}"
        data-entity-id="${escapeHtml(entity.id)}"
        tabindex="0"
        role="button"
        aria-pressed="${selected ? "true" : "false"}"
        aria-label="${escapeHtml(entity.id)} 상세 정보 ${selected ? "접기" : "보기"}"
        style="--accent:${escapeHtml(entity.accent)}"
      >
        <div class="card-top">
          <div class="card-name-wrap">
            <h3 class="card-name">${escapeHtml(entity.id)}</h3>
            <div class="card-sub">${escapeHtml(entity.layerName)}${entity.subName ? ` · ${escapeHtml(entity.subName)}` : ""}</div>
          </div>
          <div style="flex:0 0 auto">
            <span class="type-badge type-${escapeHtml(entity.size)}">${escapeHtml(sizeLabel(entity.size))}</span>
          </div>
        </div>
        <div class="card-meta-row">
          <span class="card-focus">${escapeHtml(entity.focus || entity.layerName)}</span>
          ${entity.k_ai ? `<span class="kai-badge">K-AI</span>` : ""}
        </div>
        <p class="card-summary">${escapeHtml(entity.summary)}</p>
        <div class="tag-row">${(entity.tags || [])
          .slice(0, 4)
          .map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`)
          .join("")}</div>
      </article>
    `;
  };

  window.renderMain = function renderMainKrds() {
    const main = document.getElementById("mainCol");
    if (!main) return;

    const groups = visibleGroups();

    main.innerHTML =
      groups
        .map(
          ({ layer, grouped, visibleCount }) => `
          <section class="layer-section" id="layer-${escapeHtml(layer.id)}" data-layer-id="${escapeHtml(layer.id)}">
            <div class="layer-header">
              <div class="layer-accent-bar" style="background:${escapeHtml(layer.accent)}"></div>
              <div class="layer-title">
                <h2>${escapeHtml(layer.name)}</h2>
                <p>${escapeHtml(LAYER_DESC_MAP[layer.id] || "")}</p>
              </div>
              <div class="layer-meta">
                <span class="meta-pill">표시 ${visibleCount}개</span>
                <span class="meta-pill">전체 ${countLayerItems(layer.id)}개</span>
              </div>
            </div>
            <div class="layer-body">
              ${grouped
                .map(
                  (group) => `
                    <div class="subgroup">
                      <div class="subgroup-head">
                        <div class="subgroup-title">${escapeHtml(group.name)}</div>
                        <div class="subgroup-count">${group.items.length}개</div>
                      </div>
                      <div class="card-grid">${group.items.map(window.renderCard).join("")}</div>
                    </div>
                  `
                )
                .join("")}
            </div>
          </section>
        `
        )
        .join("") ||
      `<section class="layer-section"><div class="layer-body" style="padding-top:20px"><div class="placeholder">조건에 맞는 기업이 없습니다.</div></div></section>`;

    main.querySelectorAll("[data-entity-id]").forEach((card) => {
      const activate = () => {
        const id = card.dataset.entityId;
        sharedState.selected = sharedState.selected === id ? null : id;
        window.renderAll(false);
      };
      card.onclick = activate;
      card.onkeydown = (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          activate();
        }
      };
    });

    const visibleCount = document.getElementById("visibleCount");
    if (visibleCount) visibleCount.textContent = visibleEntities().length;
  };

  window.renderDetail = function renderDetailKrds() {
    const panel = document.getElementById("detailPanel");
    const clearButton = document.getElementById("clearSelectionBtn");
    if (!panel || !clearButton) return;

    clearButton.disabled = !sharedState.selected;

    if (!sharedState.selected) {
      panel.innerHTML = `
        <div class="placeholder">
          카드를 선택하면 <strong>핵심 설명</strong>, <strong>분류 정보</strong>, <strong>공유 태그 기반 유사 플레이어</strong>를 한곳에서 확인할 수 있습니다.<br/>
          <span class="muted">Esc 키 또는 ‘선택 해제’ 버튼으로 상세 패널을 닫을 수 있습니다.</span>
        </div>
      `;
      return;
    }

    const entity = ENT_LIST.find((item) => item.id === sharedState.selected);
    if (!entity) return;

    const related = findRelatedEntities(sharedState.selected);

    panel.innerHTML = `
      <div class="detail-grid">
        <div>
          <div class="card-meta-row" style="margin-bottom:8px">
            <span class="type-badge type-${escapeHtml(entity.size)}">${escapeHtml(sizeLabel(entity.size))}</span>
            ${entity.k_ai ? `<span class="kai-badge">K-AI</span>` : ""}
          </div>
          <h3 class="detail-title">${escapeHtml(entity.id)}</h3>
          <p class="detail-sub">${escapeHtml(entity.layerName)}${entity.subName ? ` · ${escapeHtml(entity.subName)}` : ""}${
      entity.focus ? ` · ${escapeHtml(entity.focus)}` : ""
    }</p>
        </div>

        ${
          entity.homepage
            ? `<a class="homepage-btn" href="${escapeHtml(
                entity.homepage
              )}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(entity.id)} 홈페이지 방문, 새 창">홈페이지 방문 (새 창)</a>`
            : ""
        }

        <div class="detail-box">
          <h4>핵심 설명</h4>
          <p>${escapeHtml(entity.summary)}</p>
        </div>

        <div class="detail-box">
          <h4>태그</h4>
          <div class="tag-row">${(entity.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
        </div>

        <div class="detail-box">
          <h4>유사 플레이어</h4>
          <div class="small-list">
            ${
              related.length
                ? related
                    .map(
                      (item) => `
                      <div class="small-item">
                        <div class="small-item-top">
                          <div class="small-name">${escapeHtml(item.id)}</div>
                          <div class="small-meta">${escapeHtml(item.layerName)}</div>
                        </div>
                        <div class="shared-tags">${item.shared.map((tag) => `<span>${escapeHtml(tag)}</span>`).join("")}</div>
                      </div>
                    `
                    )
                    .join("")
                : `<div class="muted">겹치는 태그 기반 연결이 없습니다.</div>`
            }
          </div>
        </div>
      </div>
    `;
  };

  function updateOutlineNav() {
    const outlineList = document.getElementById("outlineList");
    if (!outlineList) return;

    const groups = visibleGroups();
    outlineList.innerHTML =
      groups
        .map(
          ({ layer, visibleCount }) => `
            <li>
              <a class="rail-link" href="#layer-${escapeHtml(layer.id)}" data-outline-id="${escapeHtml(layer.id)}">
                <span class="rail-swatch" style="background:${escapeHtml(layer.accent)}"></span>
                <span>${escapeHtml(layer.name)}</span>
                <span class="rail-meta">${visibleCount}</span>
              </a>
            </li>
          `
        )
        .join("") || `<li class="placeholder">표시할 축이 없습니다.</li>`;

    syncOutlineActive();
  }

  function syncOutlineActive() {
    const activeId = sharedState.activeLayer || visibleGroups()[0]?.layer.id || "";
    document.querySelectorAll("[data-outline-id]").forEach((link) => {
      link.classList.toggle("active", link.dataset.outlineId === activeId);
    });
  }

  function observeSections() {
    if (sectionObserver) sectionObserver.disconnect();

    const sections = Array.from(document.querySelectorAll(".layer-section[data-layer-id]"));
    if (!sections.length) return;

    sectionObserver = new IntersectionObserver(
      (entries) => {
        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);

        if (visible[0]) {
          sharedState.activeLayer = visible[0].target.dataset.layerId;
          syncOutlineActive();
        }
      },
      {
        rootMargin: "-25% 0px -55% 0px",
        threshold: [0.1, 0.25, 0.5],
      }
    );

    sections.forEach((section) => sectionObserver.observe(section));

    if (!sharedState.activeLayer) {
      sharedState.activeLayer = sections[0].dataset.layerId;
      syncOutlineActive();
    }
  }

  window.renderAll = function renderAllKrds(rebuildFilters = true) {
    ensureScaffold();

    if (sharedState.selected && !visibleEntities().find((entity) => entity.id === sharedState.selected)) {
      sharedState.selected = null;
    }

    window.applyTheme();
    window.buildThemeModeFilters();

    if (rebuildFilters) {
      window.buildSizeFilters();
      window.buildQuickTagFilters();
      window.buildTagPanel();
    } else {
      window.buildQuickTagFilters();
      window.buildTagPanel();
    }

    window.buildActiveSummary();
    window.renderMain();
    window.buildLayerNav();
    updateOutlineNav();
    window.renderDetail();

    const kaiButton = document.getElementById("kaiBtn");
    if (kaiButton) {
      kaiButton.classList.toggle("active", sharedState.kaiOnly);
      kaiButton.textContent = `K-AI만 (${ENT_LIST.filter((entity) => entity.k_ai).length})`;
    }

    requestAnimationFrame(observeSections);
  };

  ensureScaffold();
  window.buildStats();
  window.buildLayerNav();
  window.renderAll();
})();

</script>

<script id="compact-top-banner-patch">
(function () {
  if (document.body.dataset.compactTopPatch === "true") return;
  document.body.dataset.compactTopPatch = "true";

  const originalRenderAll = window.renderAll;

  function forceKaiOff() {
    try {
      if (typeof state !== "undefined") state.kaiOnly = false;
    } catch (error) {}
  }

  function currentLayers() {
    try {
      return typeof LAYER_DEFS !== "undefined" ? LAYER_DEFS : [];
    } catch (error) {
      return [];
    }
  }

  function layerVisibleCount(layerId) {
    try {
      return ENTITIES.filter((entity) => entity.layer === layerId && matches(entity)).length;
    } catch (error) {
      return 0;
    }
  }

  function tuneHero() {
    document.body.classList.add("compact-top");
    forceKaiOff();

    const hero = document.querySelector(".hero");
    const toolbarWrap = document.querySelector(".toolbar-wrap");
    const nav = document.getElementById("layerNav");

    if (hero && nav && toolbarWrap && hero.nextElementSibling !== nav) {
      hero.insertAdjacentElement("afterend", nav);
    }

    const heroStats = document.getElementById("hero-stats");
    if (heroStats) heroStats.innerHTML = "";

    document.querySelector(".krds-note")?.remove();

    const infoLine = document.getElementById("infoLine");
    if (infoLine) infoLine.innerHTML = "";

    const kaiButton = document.getElementById("kaiBtn");
    if (kaiButton) kaiButton.style.display = "none";

    if (!hero) return;

    const left = hero.querySelector(".hero-grid > div");
    if (!left) return;

    const desc = left.querySelector(".krds-hero-desc") || left.querySelector("p");
    if (desc) {
      desc.classList.remove("krds-hero-contact");
      desc.classList.add("krds-hero-desc");
      desc.textContent = "상단 축별 수치는 현재 필터 결과를 반영합니다. 카드를 선택하면 오른쪽 패널에서 상세 정보를 바로 확인할 수 있습니다.";
    }

    left.querySelectorAll("p").forEach((paragraph) => {
      if (paragraph === desc) return;
      const text = paragraph.textContent.trim();
      if (text.includes("@") || text.startsWith("문의:")) {
        paragraph.remove();
      }
    });
  }

  function tuneAside() {
    const aside = document.querySelector(".aside");
    if (!aside) return;

    const outline = aside.querySelector(".outline-panel");
    if (outline) outline.remove();

    const selection = aside.querySelector(".selection-panel");
    if (selection) {
      aside.innerHTML = "";
      aside.appendChild(selection);
    }

    aside.classList.add("detail-only");
  }

  function optimizeToolbarFoot() {
    const infoLine = document.getElementById("infoLine");
    const activeSummary = document.getElementById("activeSummary");
    const footRow = infoLine?.closest(".toolbar-row");
    if (!footRow) return;

    const hasInfo = Boolean(infoLine && infoLine.children.length);
    const hasActive = Boolean(activeSummary && activeSummary.children.length);
    footRow.classList.toggle("compact-hidden", !hasInfo && !hasActive);
  }

  window.buildStats = function buildStatsCompactTop() {
    tuneHero();
    const statsBox = document.getElementById("hero-stats");
    if (statsBox) statsBox.innerHTML = "";
    const infoLine = document.getElementById("infoLine");
    if (infoLine) infoLine.innerHTML = "";
  };

  window.buildLayerNav = function buildLayerNavCompactTop() {
    tuneHero();
    const target = document.getElementById("layerNav");
    if (!target) return;

    target.setAttribute("aria-label", "축별 이동");
    target.innerHTML = currentLayers()
      .map((layer) => {
        const count = layerVisibleCount(layer.id);
        const content = `
          <span class="axis-name">
            <span class="swatch" style="background:${layer.accent}"></span>
            <span>${layer.name}</span>
          </span>
          <span class="axis-count">${count}</span>
        `;

        return count > 0
          ? `<a class="layer-link axis-link" href="#layer-${layer.id}" data-outline-id="${layer.id}">${content}</a>`
          : `<span class="layer-link axis-link disabled" aria-disabled="true" data-outline-id="${layer.id}">${content}</span>`;
      })
      .join("");
  };

  window.renderAll = function renderAllCompactTop(rebuildFilters = true) {
    forceKaiOff();
    if (typeof originalRenderAll === "function") originalRenderAll(rebuildFilters);
    tuneHero();
    tuneAside();
    optimizeToolbarFoot();
  };

  tuneHero();
  tuneAside();
  window.buildStats();
  window.renderAll(false);
})();
</script>

  body.krds-refined.compact-top .axis-overview .layer-nav {

    flex-wrap: nowrap;
    overflow-x: auto;
    gap: 10px;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  body.krds-refined.compact-top .axis-overview .layer-nav::-webkit-scrollbar {

  body.krds-refined.compact-top .layer-link.axis-link {

</style>
<script id="krds-airy-top-patch">
(function () {
  if (document.body.dataset.krdsAiryTopPatch === "true") return;
  document.body.dataset.krdsAiryTopPatch = "true";

  const previousBuildStats = window.buildStats;
  const previousRenderAll = window.renderAll;

  function ensureAxisOverview() {
    const hero = document.querySelector(".hero");
    const nav = document.getElementById("layerNav");
    const toolbarWrap = document.querySelector(".toolbar-wrap");

    if (!hero || !nav || !toolbarWrap) return;

    let section = document.querySelector(".axis-overview");
    if (!section) {
      section = document.createElement("section");
      section.className = "axis-overview";
      section.innerHTML = `
        <div class="axis-overview-inner">
          <p class="axis-overview-label">이 페이지의 구성</p>
        </div>
      `;
      hero.insertAdjacentElement("afterend", section);
    }

    const inner = section.querySelector(".axis-overview-inner");
    if (inner && nav.parentElement !== inner) {
      inner.appendChild(nav);
    }

    if (section.nextElementSibling !== toolbarWrap) {
      section.insertAdjacentElement("afterend", toolbarWrap);
    }
  }

  function refineHeroCopy() {
    const note = document.querySelector(".hero-note");
    if (note) {
      note.innerHTML = '<span class="dot"></span>Beta Version';
    }

    const desc = document.querySelector(".hero .hero-grid > div p");
    if (desc) {
      desc.classList.add("krds-hero-desc");
      desc.textContent =
        "검색·규모·테마 필터를 적용하면 5대 축별 기업 수와 목록이 함께 갱신됩니다. 카드를 선택하면 오른쪽 패널에서 세부 정보와 유사 플레이어를 확인할 수 있습니다.";
    }
  }

  function applyAiryTop() {
    ensureAxisOverview();
    refineHeroCopy();
  }

  window.buildStats = function buildStatsAiryTop() {
    if (typeof previousBuildStats === "function") previousBuildStats();
    applyAiryTop();
  };

  window.renderAll = function renderAllAiryTop(rebuildFilters = true) {
    if (typeof previousRenderAll === "function") previousRenderAll(rebuildFilters);
    applyAiryTop();
  };

  applyAiryTop();
})();
</script>
